body:
  text: 春秋講義春秋類提要臣等謹案春秋講義四卷宋戴溪撰溪有續吕氏家孰讀詩記已著録開禧中溪為資善堂説書纍轉太子詹事景獻太子命類易詩書春秋論語孟子通鑑各為説以進此即其春秋説也書中如有齊襄迫紀侯去國為托復讎以欺諸侯以秦與楚滅庸為由巴蜀通道以屢書公如晉至河乃復為晉人啓季氏出君之漸以定公戊辰即位為季氏有不立定公之心皆具有理解而時當韓托胄北伐敗衄和議再成故於內修外攘交鄰經武之道尤惓惓焉至卒葬之類並闕而不擇考宋代於喪服之制避忌頗深如何居居字語出檀弓禮部韻略即不載其他可知溪之不釋此類蓋當時講幄之體也嘉定癸未五月溪長子桷鋟木金陵學舍沈光序之寶慶丙戌牛大年復刻于泰州其序稱是書期於啓沃君聽天下學士不可得而聞蓋非經生訓詁家言故流傳未廣陳氏書録解題不著于録殆以是歟宋史藝文志作四卷王瓉溫州志作三卷朱彞尊經義考注曰已佚今外間絶無傳本惟永樂大典所採尚散見各條經文之下今謹為裒輯校正自僖公十四年秋至三十三年襄公十六年三月至三十一年永樂大典所缺則取黃震日抄所引補之仍從宋史釐為四卷而每卷又各分上下其所釋經文多從左氏故其間從公榖者並附案語于下方焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋講義原序漢儒誦其師説曰為人君父者不可不通春秋為人臣子者不可不通春秋至哉言乎漢人頗識此意東宫藩邸命夫惇誨故老名儒師傅授以是學仲舒相江都貫公為河間博士東平中山長沙梁王之傅三傳皆有師法而敏捷之疏亷直之嚴素剛之望之尤其妙一時之選者也然微辭奧旨或講焉而不精錯諸事業適以貽害天下如九世復讎一語差毫釐而謬千里追思異時師友何所逃罪甚哉講學之難乎非講學之難而所與共學者難其人耳故端明戴公身端行治雅邃麟經橫帙資善堂重席顓講明白正大義精語平天敘人彞春生秋殺粲然於口授指畫間有以發先儒所未言長子桷修葺舊聞鋟木金陵學舍屬光挂名編端光末學膚受安能窺公傳道授業之祕獨慨夫太史公執遷手而泣曰汝無忘吾所論著揚名後世以顯父母遷卒其業卓然以繼春秋自任今是書之傳恐司馬氏不得専美於漢公諱溪字少望以儒宗為宫端世號岷隱先生嘉定癸未夏五月鄞沈光序春秋三傳束髙閣獨抱遺經究終始然聖意宏深經法微隱是豈餘藴之所易究哉岷隱先生以儒宗為一世所尊顓席談經發明大旨凡經之所不書説之所未及者莫不昭然而義見雖然是書蓋期於啓沃君聽天下學士不可得而聞也今提舉寺丞建臺於此一日出家藏以惠多士僕亦以攝承郡事遂得拜手與觀蓋其發先聖之精微正後學之訛謬其功用豈小補之哉於是命工鋟木置之郡校以廣其傳嵗在丙戌重陽後一日淮海牛大年書於海陵郡齋
