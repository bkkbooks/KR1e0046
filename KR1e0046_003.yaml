body:
  text: 春秋講義卷三上宋戴溪撰宣公元年春王正月公即位魯之桓宣皆繼故而立無所畏懼偃然而行即位之禮春秋即其實而書之明著其罪也公子遂如齊逆女三月遂以夫人婦薑至自齊文公喪祭未終納幣於齊君子固已非之今宣公執親之喪才踰年爾遽遣人逆女人道廢矣薑不言氏貶夫人也稱婦薑者貶敬嬴也君臣父子婦姑之義皆失之不待貶絶而惡自見矣夏季孫行父如齊晉放其大夫胥甲父于衛公會齊侯于平州公子遂如齊六月齊人取濟西田子赤齊之出也齊方有難不暇為子赤地怵於仲遂之邪謀故子赤卒而宣公立然魯之君臣恐懼而不安百計以求悅于齊喪制未終而成昏固已咈天理而不顧季孫行父繼踵如齊然後宣公得會于平州以定其位已而賂齊人以濟西之田公子遂拜盟于後何汲汲也齊人取濟西田不言魯歸之為魯諱也書取甚易之辭也桓公之立也不義以許田賂鄭宣公之立也不義以濟西之田賂齊懷慚抱愧制命于人亦可哀矣秋邾子來朝楚子鄭人侵陳遂侵宋晉趙盾帥師救陳宋公陳侯衛侯曹伯會晉師于棐林伐鄭晉楚二國不務德而力爭陳鄭一彼一此皆不足以得二國之心鄭伯以晉人受賂之故而受盟于楚陳人以楚人無禮之故而受盟于晉故楚子鄭人侵陳及宋而趙盾亦帥師救陳陳宋怨鄭伯者也故復與衛曹會晉師以伐鄭既歸之後晉宋再復伐鄭當是之時晉靈公年少而侈楚莊王方有事于諸侯故晉不競于楚未幾而有桃園之難楚莊得盡力以圖諸侯入陳入鄭楚卒得志于二國楚莊以此稱霸春秋紀晉楚之爭霸陳鄭之叛服于此特詳焉冬晉趙穿帥師侵崇侵崇之役最為無名趙穿有言曰我侵崇秦必救之吾以求成焉是無名之師也穿新得政而専復謀竊晉之兵柄於是無名而興師桃園之禍其所由來者漸矣晉人宋人伐鄭二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元按左氏鄭人受命於楚伐宋宋華元御之則主兵者鄭也今書曰宋華元帥師及鄭公子歸生戰稱帥師者見宋主乎是戰也宋方得罪于王法不自修省而汲汲然報怨于鄭故鄭人伐宋宋自取之也兩國之卿親帥大衆尅日以戰其事重矣春秋書戰書敗績書獲辭嚴而不恕非以大鄭之功也宋之不義霸主不能討假手于鄭敗師失將所以快神人之憤示亂臣賊子之無所容也秦師伐晉秦之伐晉多矣或稱爵或稱人或稱師或止稱國其義不同各有攸在此稱師者言用大衆也夏晉人宋人衛人陳人侵鄭秋九月乙丑晉趙盾弒其君夷臯冬十月乙亥天王崩三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望郊禮先期卜牛而養之及既卜日則改牛為牲或卜日不吉或牛有傷則有免牛免牲之禮今也魯之郊牛其口傷故改卜牛改卜而牛又死知天災之甚也於是而不郊宣公以不義得國即位始郊獲罪於天故降災於牛以見其不饗也上天垂戒之意深矣葬匡王楚子伐陸渾之戎陸渾之戎近在伊雒中國不能問而楚人伐之然楚意不在戎也觀兵于天子之疆而問鼎之大小輕重其僣亂若此春秋是以謹書之也夏楚人侵鄭秋赤狄侵齊赤狄始見于經狄有赤狄有白狄有長狄其種類不一大抵自為部落相聚而冦掠爾他日晉人滅潞氏甲氏則赤狄之存無幾矣宋師圍曹冬十月丙戌鄭伯蘭卒葬鄭穆公四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向二國交怨有能平其怨而息其爭豈不甚善然非有以信服其心則勢力固未易平也譬如鄉鄰有鬬非有大人長者為之講解則其鬭豈易平哉莒郯之爭莒大而郯小故平莒為難平郯為易今公及齊侯平莒及郯郯之於魯有伯姬之親故宣公主乎是平也齊魯二君方得罪於諸侯豈足以信服乎莒不肯之辭傲然而不顧也宣公不勝其忿伐莒而取向夫取向則易而平莒則難用見勢力之不足恃也昔者魯桓公嘗欲平宋鄭矣數與宋公為會宋卒辭平桓公至於伐宋而與戰焉其事正與宣公類二公皆以不義得國諸侯誰其信之不能省躬而逞怒於人滋益罪矣秦伯稻卒夏六月乙酉鄭公子歸生弒其君夷赤狄侵齊秋公如齊公至自齊冬楚子伐鄭五年春公如齊夏公至自齊秋九月齊髙固來逆叔姬宣公連年如齊卑辱已甚今因如齊之役髙固使齊侯止公以求叔姬無乃太甚乎前此魯女多為諸侯夫人今下嫁於大夫固已少屈矣宣公又自主昏是以大夫自處也髙固之逆與子叔姬之偕來具書於春秋益可恥矣向者莊公之時莒慶來逆叔姬其後僖公及莒慶盟于洮皆魯之恥也叔孫得臣卒冬齊髙固及子叔姬來楚人伐鄭六年春晉趙盾衛孫免侵陳楚莊王圖霸刻意以爭陳鄭此豈一手一足所能定哉晉時有難趙盾之志不在諸侯僅與衛孫免侵陳示諸侯以為名而已非能回陳人從楚之心也夏四月秋八月螽冬十月七年春衛侯使孫良夫來盟魯衛兄弟也數會屢盟亦已久矣自文公會沓之後十餘年間衛未嘗通魯好也今兹孫良夫來盟衛始通魯且結信也魯宣自得國以來恐懼事齊視晉而下不以為意良夫之來不惟通好且謀會晉故委心於魯結盟以示信其意可謂勤矣然宣公方篤意事齊從晉之意未敢堅決衛人雖結信於魯猶無益也夏公會齊侯伐萊秋公至自伐萊左氏曰夏公會齊侯伐萊不與謀也魯方聽命於齊之不暇安敢勤動齊侯以伐人之國則伐萊之謀其出於齊侯之意也明矣齊志於伐國而魯助齊為虐春秋交譏焉大旱冬公會晉侯宋公衛侯鄭伯曹伯于黑壤按左氏黑壤王叔桓公臨之以謀不睦則是盟也有天子之卿士奉天子之命其事重矣春秋曷為不書盟左氏以為魯公不與盟之故非也誠如左氏所言則春秋當以公不與盟書豈得闕而不録靈公之難晉不討賊成公之立又不請命于天子于今四年新會諸侯天子縱不能問罪于晉又使卿士臨之赫然王命臨照諸侯而賞罰倒置莫此為甚春秋沒其事而不書以為不足乎揚也其旨深矣八年春公至自會夏六月公子遂如齊至黃乃復按昭公二十三年公如晉至河有疾乃復今也公子遂如齊不至而復未幾卒于途其有疾明矣春秋書至黃乃復不書有疾何也蓋諸侯適他國進退得専之已人臣銜君命而出則不可専也有如疾不可為猶當輿疾將事進退豈得而由已哉春秋書此示人臣不得専命之義也辛巳有事于大廟仲遂卒于垂壬午猶繹萬入去籥前書公子遂今書仲遂何也公子遂有德於宣公始死而賜諡所以寵賁其身後而無忘其子孫也春秋即其實而書之大抵君臣之義務存始終故人臣之卒當祭則不告終祭則不繹今也辛巳有事于大廟則既終祭矣明日賔尸禮不必講也壬午猶繹可已而不已也萬無聲之樂也入則用之籥有聲之樂也去而不用特不欲聲聞於外惟恐人之或知也宣公非恝然於仲遂也君臣之恩薄其來久矣知悼子在殯晉平公飲酒擊鐘於寢屠蒯入諫宣公去籥之意固已拳拳於仲遂矣彼仲遂之罪當棄絶於宗廟春秋非愛仲遂者特愛禮爾禮有終始所以待遇臣子垂訓後世不容以仲遂廢也戊子夫人嬴氏薨晉師白狄伐秦晉吕相絶秦之書曰白狄及君同州君之仇讐而我之婚姻也白狄之與晉固為婚姻晉之與秦獨非婚姻乎舍秦之婚姻而獨與白狄伐秦何哉昔也襄公與薑戎敗秦師于殽今焉成公又與白狄伐秦內外親踈之義皆倒置矣楚人滅舒蓼觀左氏所載隨絞州蓼伐楚師則蓼固當為一國而以春秋考之前乎此徐人取舒後乎此楚人滅舒鳩今之滅舒蓼者豈非舒鳩之類所謂羣舒者是歟按文公五年楚已滅蓼矣講義不引似疏秋七月甲子日有食之既冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬城平陽楚師伐陳九年春王正月公如齊公至自齊夏仲孫蔑如京師宣公即位九年親如齊者三而君臣未嘗至于周天子使人來徴聘仲孫蔑一至京師而已天子猶以有禮而厚賄之亦可嘆矣齊侯伐萊萊東夷也書曰萊夷作牧其地在青州於齊為近故齊侯必欲服之觀齊魯會夾谷之日萊人以兵劫魯侯則萊之服屬於齊有自來矣秋取根牟公羊曰根牟者邾婁之邑杜預曰根牟東夷之國經書根牟而不繫於邾知其為國明矣八月滕子卒九月晉侯宋公衛侯鄭伯曹伯會于扈晉荀林父帥師伐陳辛酉晉侯黑臀卒于扈黑壤之會謀不睦也而陳不與扈之會亦所以謀不睦也而陳又不與晉安得而不伐陳耶如左氏所言荀林父以諸侯之師伐陳春秋曷為不書諸侯蓋晉侯卒于扈則在會之諸侯猶未歸也荀林父受命而行聞晉侯卒乃還實未嘗伐陳也春秋豈得并諸侯而書之乎冬十月癸酉衛侯鄭卒宋人圍滕前書滕子卒今書宋人圍滕其伐喪之罪比事而觀不可逃矣滕之於宋非有深怨也特不事宋而已向也宋嘗執滕子嬰齊今兹又伐其喪明年宋復伐滕何其甚邪楚子伐鄭晉郤缺帥師救鄭按左氏楚子伐鄭晉郤缺救鄭鄭伯敗楚師於栁棼此鄭之雋功也春秋曷為不書楚連年伐鄭今兹親帥師徒至鄭之城下其勢未易抗也晉郤缺救鄭未嘗與楚人交戰鄭伯遽敗楚師于栁棼徼幸一勝不足以挫楚人之勢適足以稔鄭之禍春秋以為不足録也故略而不書陳殺其大夫泄冶十年春公如齊公至自齊齊人歸我濟西田夏四月丙辰日有食之已巳齊侯元卒齊崔氏出奔衛崔氏之奔不止一人其宗強於齊久矣異日莊公之禍崔氏實為之宗強故也春秋書尹氏武氏崔氏其義各有攸在或志其世卿或志其強宗此二者皆國之巨患也公如齊五月公至自齊癸巳陳夏徴舒弒其君平國六月宋師伐滕公孫歸父如齊葬齊惠公晉人宋人衛人曹人伐鄭往年救鄭今年伐鄭為晉師者不亦難乎德不足以庇鄭威不足以抗楚一救一伐徒自疲其力而已秋天王使王季子來聘天子使其母弟躬聘於魯其恩禮可謂厚矣然而自是以後周室日衰天子之使不復至魯春秋亦無得而書焉公孫歸父帥師伐邾取繹公孫歸父者仲遂之子也有寵于宣公故執魯兵柄伐邾以取邑已而懼齊人之見罪也親往謝罪于齊小人謀國假寵以肆威行險以求利類多若此久而未有不為國患者向使歸父不見逐于魯其為魯患多矣大水季孫行父如齊冬公孫歸父如齊齊侯使國佐來聘齊侯之卒也宣公既如齊弔矣公孫歸父繼往會葬焉已而行父歸父又有如齊之行一年之間魯之君大夫接踵在齊齊不得已僅一遣國佐報聘而已歷觀魯十二公其務為容悅以求媚於大國未有如宣公之甚者也飢宣公即位十八年春秋兩書飢始以大水而飢繼以蝝生而飢彼其不義得國乖戾致災自取之也民何罪焉故春秋書飢者為斯民憂也至其末年特書大有年者又為斯民喜也楚子伐鄭十有一年春王正月夏楚子陳侯鄭伯盟于辰陵楚自莊王以來力爭陳鄭有事于二國者屢矣二國或服或二莫適為主陳人從晉則二于楚鄭人從楚則二于晉紛紜而未定也至是陳鄭與楚盟于辰陵則二國俱服于楚矣陳鄭不足責也迫於社稷之故惟強可以庇民者是從晉主夏盟其可坐使陳鄭之至於此乎故自辰陵既盟繼而楚入陳圍鄭陳既亡而復存鄭幾亡而僅免操縱之權一制于楚春秋是以咎中國之霸者不能以自振也公孫歸父會齊人伐莒秋晉侯會狄于欑函狄人久為中國患自晉人敗之于箕稍知自警今乃會狄于欑函何哉為霸主者以外攘為己任縱不能攘獨可會乎誠使狄人知懼請成于晉猶可言也今晉乃求成于衆狄又親往會之其辱甚矣書會狄所以辨華戎之分書晉侯又見中國之自卑也冬十月楚人殺陳夏徴舒丁亥楚子入陳納公孫寧儀行父于陳陳人之罪天下之所得同討也中國不能討而使楚莊得藉手以為辭中國之愧多矣楚莊伐陳先入其國而後殺夏徴舒此先書殺者討賊之辭也然而楚人取陳以為縣則既滅陳矣春秋以入陳書何也春秋大改過喜遷善楚莊既縣陳而復還之其功豈可掩哉然而納公孫寧儀行父楚莊之為德亦不終矣始焉殺徴舒討其罪也終焉納公孫寧儀行父獨非罪乎致陳靈公之為亂者實二人之罪也獨可納乎春秋不以功掩過亦不以惡掩善故楚莊之事備書於春秋則功過善惡不可誣矣十有二年春葬陳靈公楚子圍鄭按公羊曰楚莊入鄭勝乎皇門放乎路衢由此觀之楚子固嘗入鄭矣春秋不言入何也去年楚子滅陳書入而不書滅今年楚子入鄭書圍而不書入聖人之意蓋有在矣陳既滅而復其國鄭既入而許其平聖人嘉楚莊能改過而遷善也當是之時中國無道十餘年間晉宋陳鄭皆有大罪楚莊因之遂有圖霸之心既得陳鄭矣不迫人以險猶有存亡恤難之意春秋安得而不嘉之按左氏鄭伯肉袒牽羊以逆楚子楚退三十里而與之平春秋何以不書存中國而抑荆蠻也夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績春秋二百四十二年晉楚之大戰三晉勝楚者二曰城濮曰鄢陵楚勝晉者一曰邲此三戰者春秋皆書曰晉及言中國主乎是戰不使楚人得以主之也然而城濮之戰楚之主兵者得臣也以邲之書法觀之當書曰晉侯及楚得臣戰不書得臣而書楚人者賤得臣不使與晉侯為敵也邲之戰荀林父不能制御諸將以至於敗林父之罪不可逃也然而城濮之戰楚殺其大夫公子側晉雖敗邲林父之罪不及焉君子是以知晉用法之恕楚御下之嚴也秋七月冬十有二月戊寅楚子滅蕭蕭附庸也其國至微楚人滅之易爾然楚莊能施德於陳鄭卒不免於滅蕭何也人之常情矯揉以為善者雖能勉強於一時不能持守於悠久楚莊始焉矯揉伏其好利之心一旦發其暴怒復還故常春秋即其實而書滅功罪不相掩矣晉人宋人衛人曹人同盟于清丘左氏曰晉原縠宋華椒衛孔達曹人同盟于清邱則是盟也原縠實主邲之戰原縠違命先濟遂至於敗得免於死已為厚幸豈得又主列國之盟乎盟猶可也豈得而同盟乎狠愎之資驕僣已甚卒不免於見殺削其名書人罪晉而惡原縠也宋師伐陳衛人救陳陳方受兵於楚僅復其國宋何事而遽伐之乎宋衛方盟衛人渝盟以救陳春秋不以為罪而以為善書救陳者善之也十有三年春齊師伐莒向也宣公會齊侯伐萊其後齊自伐萊向也公孫歸父會齊人伐莒今焉齊自伐莒蓋二國去齊為近齊人志在并吞始猶資助於人終則自専於已不勝其利欲之心而欲逞其虐小之威不饜其所欲則不已也夏楚子伐宋左氏曰以其救蕭也楚子滅蕭已有意於伐宋非以救蕭而起也明年圍宋意可見矣秋螽冬晉殺其大夫先縠十有四年春衛殺其大夫孔達夏五月壬申曹伯壽卒晉侯伐鄭按左氏晉侯伐鄭鄭伯如楚謀晉故也春秋曷為不書如楚中國不競諸侯相率南向以朝楚此春秋所嘆息也前者鄭伯許男如楚今兹鄭伯又復如楚春秋以為中國朝楚實自鄭始故諱而不書秋九月楚子圍宋楚莊連年有事於中國今兹圍宋宋人易子而食析骸而炊其急亦甚矣楚人屈於華元一言退三十里而與宋平其事與圍鄭相類故春秋書法一同葬曹文公冬公孫歸父會齊侯于榖宣公十有一年公孫歸父會齊人伐莒至是三年矣再會齊侯于榖向者君臣迭至于齊自歸田之後事齊浸簡君子是以知勢利之交不能久也十有五年春公孫歸父會楚子于宋僖公之時楚子伐宋公會諸侯盟于薄釋宋公宣公之時楚子圍宋公孫歸父會楚子于宋宋及楚平魯之謀國類出於此豈自治之道哉夏五月宋人及楚人平前者楚子圍鄭鄭及楚平春秋不書今兹圍宋宋及楚平春秋何以書蓋鄭伯效牽羊之逆乞平于楚春秋存中國而不書今焉宋華元楚子反親自結平兩國息爭亦春秋之所豫也故以宋人主乎是平不使楚人得以専之也然而二國之卿略而書人何也平者在下而不在上也下議其平取必於上春秋義存君臣故微之六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸戎狄之屬自為種落而種落之中又自分其族類蓋勢分無以相統屬故也若狄之種有赤狄白狄而赤狄之族亦有潞氏甲氏之類是也向者狄為中國患其後赤狄繼之今兹晉侯能滅赤狄潞氏執其君長而歸亦可以為功矣按程端學春秋或問云侵齊伐衛者狄耳潞氏前此未見於經不知其罪也戴氏之説非是潞子之夫人晉景公之姊也晉大國也彼白狄之與赤狄皆得結婚於晉其不自貴重亦甚矣一旦潞子之夫人見殺於酆舒然後興師滅之不亦晚乎潞何以稱子豈非亦嘗受命於天子乎四夷之君長雖大皆曰子秦人伐晉王札子殺召伯毛伯秋螽仲孫蔑會齊髙固于無婁髙固娶於子叔姬嘗與叔姬來魯則未知是會也其諸髙固借公事以為私行歟其亦繼公孫歸父會榖之好歟斷道之會髙固逃歸意其為人也必専輒而不用命者也自是而後齊魯之好踈矣初稅畝井田之法為田九百畝八家同井而居共受田八百畝名曰私田其中一百畝以二十畝為八家廬舍餘八十畝名曰公田八家共耕公田得其地利以供公上此之謂什一之稅外此一毫無有也今也宣公以公田之稅為公上所當得復於私田之中履畝而稅之其取於民也比舊增倍至于後世遵用之哀公所謂二吾猶不足是也春秋深惡之故書曰初稅畝著其作俑之罪也哀十二年復有田賦之法蓋于稅畝之外復用田以取賦為甲兵之用其剝民益甚矣然春秋不書初者作俑之罪宣公既任之矣稅畝之後繼以蝝生又繼以飢獲罪於天降災於下悲夫按程端學春秋或問云戴氏此説本公羊今考講義於私田之中履畝而稅云云實取杜預左傳注冬蝝生飢十有六年春王正月晉人滅赤狄甲氏及留吁去年晉滅潞氏執潞子嬰兒猶以為治酆舒之罪也今焉滅甲氏及留吁則又太甚矣中國之有夷狄猶陽之有隂也隂不可使勝陽然不能使無隂也古之王者攘却之則有之矣後世好大喜功之君不分别其事理而但以兵威取之則過矣前書晉師後書晉人春秋之義各有攸在夏成周宣榭火昔者成王定鼎于洛邑復于洛邑之東營邑以居頑民名之曰成周在書曰成周既成遷殷頑民是也按二語係書序以其地在東故或謂之東郊亦謂之東都春秋之書王城者謂洛邑也書成周者謂東都也成周宣榭火曷為書于春秋告于魯也宣榭者杜氏以為講武之屋無室曰榭公榖以為宣宮之榭樂器藏焉先儒之説以為不然曰宣榭者宣王之廟也合此三説而觀之竊意宣王中興復會諸侯于東都因田獵而選車徒是知宣榭者宣王講武之屋也後人思宣王之功烈即其榭而廟祀之嵗時享祭樂器藏焉容有是理不曰廟而曰榭何也廟有屋榭無室故也秋郯伯姬來歸魯之內女適于他國者多矣常事不書其書于春秋者必其有故者也春秋之法婦人謂嫁曰歸歸寧曰來大歸曰來歸大歸者棄于夫家而歸于宗國不可以復反也若郯伯姬杞叔姬之類是也夫婦之義終身與齊榖雖異室死則同穴或相棄背喪其妃耦此人倫之變也夫婦道失春秋交譏焉冬大有年春秋書飢書大飢一飢猶足以病民而况于大飢乎其書大者憂之甚也春秋書有年書大有年有年已足為斯民喜而况大有年乎其書大者喜之甚也十有七年春王正月庚子許男錫我卒丁未蔡侯申卒夏葬許昭公葬蔡文公六月癸卯日有食之己未公會晉侯衛侯曹伯邾子同盟于斷道秋公至自會向也同盟之禮諸侯猶有所憚而不敢數行其後大夫亦得而行之至是不復為重矣是盟也以討二為辭正為郤克報怨爾何至重煩諸侯為是大盟乎冬十有一月壬午公弟叔肸卒十有八年春晉侯衛世子臧伐齊晉郤克請于晉侯欲伐齊以報怨晉侯勿許亦可嘉矣已而盟于斷道齊人請盟而不得與遂有伐齊之師則是晉侯執德不堅交鄰不固卒奪于郤克之私而不能自制也同盟者五國衛侯獨使世子從于晉伐齊自非大不得已何至遣其世子從伐乎既與齊侯盟後二年復有鞍之戰故君子于晉侯伐齊之事有憾焉公伐杞夏四月秋七月邾人戕鄫子于鄫讀春秋至于邾鄫之事未嘗不為之悲傷忿恨也向也邾人嘗用鄫子于次睢之社此人理之所無者一時之人不以為怪今也復戕鄫子于鄫親至人國戕人之君春秋以來亦無是事也鄫夏餘也列于諸侯有社稷有民人何乃俯首受制于邾若此凡為鄫之臣子與邾有不共戴天之讎縱不能報之于前當其戕鄫子之時獨無一人出死力以衛其君者人倫天理于是絶矣是時晉主夏盟于邾鄫之事略而不問烏得無罪哉甲戌楚子旅卒公孫歸父如晉冬十月壬戌公薨于路寢歸父還自晉至笙遂奔齊仲遂有德于宣公而獲罪于魯國當宣公時其子歸父用事于魯其所以納交于齊晉者非不至也一旦宣公卒其家被遣歸父倉皇奔齊蓋人理之當然而天道之必復者也春秋于文公末年書公子遂如齊于宣公末年書公子歸父奔齊比事而觀亦可見天理之不僣矣成公元年春王正月公即位子承父統國無內難行即位之禮故以公即位書于春秋二月辛酉葬我君宣公無冰三月作丘甲先王之制九夫為井四井為邑四邑為邱四邱為甸甸出長轂一乘甲士三人步卒七十二人蓋四邑為邱每一邱為一百二十八家按永樂大典誤作一百四十二家今改正四邱為甸每甸合計五百一十二家古者使一甸之家共出甲士三人步卒七十二人今成公作邱甲始令一邱之人各出甲士一人步卒二十四人比于古制增三分之一矣先王藏兵于民合五百一十二家總步卒甲士共不過七十五人爾不敢窮民力也今無故而增三分之一是三甸而增一乘矣成公即位之初德政未聞而驟變古制輕用民力于公室實無所補徒為三家異日作三軍之地爾春秋特書作者著其作俑之罪也夏臧孫許及晉侯盟于赤棘齊未嘗得罪于魯也歸父如晉謀去三桓齊何與焉歸父奔齊齊人受之亦人情之常爾何至驟與齊怨謀伐其國懼有齊難先作邱甲聞齊欲出師亟與晉盟若此擾擾也重卿不行而僅使臧孫許往盟霸主幾于失禮矣亦賴晉侯急于伐齊俯從臧孫之盟不然滋益罪矣秋王師敗績于茅戎按左氏劉康公徼戎而伐之遂敗于徐吾氏不言伐者不以王師敵戎也不曰戎敗王師而曰王師敗績于茅戎者王師無敵誰得而敗之若曰王師自敗云爾戎伐凡伯而不言戎執王師敗績而不曰戎敗尊王室也冬十月二年春齊侯伐我北鄙宣公在位十八年與齊為好至親且密齊魯未嘗有疆場之爭故其民亦少安成公即位首與齊為仇斷道赤棘之盟將謀伐齊按斷道之盟宣公未薨戴氏誤也齊安得不為自救之計伐我北鄙抑魯有以自取之也首開兵端民何罪焉夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績伐齊之役衛世子臧實與晉侯偕行齊未有以報衛也衛孫良夫復帥師以侵齊道與齊師遇諸大夫欲還良夫不可一戰而敗良夫之罪也春秋書衛孫良夫帥師及齊師戰以良夫主乎是戰也六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師會晉郤克衛孫良夫曹公子首及齊侯戰于鞍齊師敗績秋七月齊侯使國佐如師己酉及國佐盟于袁婁易曰長子帥師弟子輿尸貞凶蓋用兵者必有主帥示權有所一也故春秋書帥師必以主帥書今也鞍之戰四大夫並書前此春秋無是事也春秋書四大夫繼之以帥師又繼之以會晉郤克而後繼之以及齊侯戰其罪魯之辭比諸列國尤嚴焉晉郤克懷一笑之怨衛孫良夫懲一敗之辱魯四大夫不愛其力迫齊侯而敗之自鞍至于袁婁追奔五百里諸大夫可謂志得意滿矣齊國佐如師固將以求盟也春秋不書曰國佐來盟而書曰及國佐盟見諸大夫汲汲于是盟而非國佐之所急也郤克欲以蕭同叔子為質而使齊之封內盡東其畝其暴橫無理若此齊國佐抗辭以對揖而去之郤克方眣魯衛之大夫使為齊請彼亦自知其非而歉然于中乎然則是盟也諸大夫之所欲也春秋即其情而書之惡大夫之専猶存君臣之義也八月壬午宋公鮑卒庚寅衛侯速卒取汶陽田齊師既敗反魯衛之侵地則汶陽之田固魯之舊也不書曰復歸而曰取何也得之不以其道故也連兵伐人迫而取之其與奪人之地何異春秋于諸侯歸田之事其以公義歸者則曰來歸若鄆歡龜隂田是也其以私情歸者則曰歸我若濟西田是也奪而得之者曰取若汶陽之田是也一字之辨而取豫明疆理正矣冬楚師鄭師侵衛十有一月公會楚公子嬰齊于蜀丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀前公孫歸父會楚子于宋祖僖公之故智也今成公會楚公子嬰齊于蜀襲歸父之故事也蓋楚人有伐魯之意于是魯之君大夫先往會之以求自免故魯在列國中不被楚兵由此故也自後襄昭皆朝于楚魯之卑辱有自來矣公既會嬰齊于蜀列國之大夫效尤皆至是以有蜀之盟春秋書公及者見是盟出于公之志繼以楚人書于列國之上者見楚之主乎是盟也楚人者嬰齊也不曰嬰齊而曰楚人不豫荆蠻之主盟也列國之大夫皆稱人貶之也前書公會次書公及前書會于蜀次書盟于蜀辭繁而不殺者荆蠻之大夫主中國之盟會自此始故春秋特重其事詳而志之雖欲為諱不可得也三年春王正月公會晉侯宋公衛侯曹伯伐鄭鄭人從楚伐晉敗晉于邲已而從楚師侵衛與公子嬰齊盟于蜀今晉侯帥諸侯以伐鄭鄭有餘罪矣然使晉侯自反修桓文之業則鄭決不至此其所以使鄭至此者是誰之咎歟辛亥葬衛穆公二月公至自伐鄭甲子新宫災三日哭公羊曰宣宫則曷為謂之新宫不忍言也榖梁曰迫近不敢稱諡恭也按文公二年書作僖公主又書躋僖公則既葬而後舉諡春秋之法也今宣公之喪三年矣不曰宣宫而曰新宫見當時之不忍稱猶以新宫目之春秋因其名而書之非成公不敢稱諡也乙亥葬宋文公夏公如晉左氏曰夏公如晉拜汶陽之田取田于齊拜賜于晉則豫奪之權制于人矣數年之後晉侯使韓穿來言汶陽歸之于齊魯人拱手聽命不敢違焉因人以為強弱者亦可鑒矣鄭公子去疾帥師伐許左氏曰許恃楚而不事鄭鄭子良伐許甚矣鄭人之不度德也鄭方得罪于中國晉帥諸侯以伐之鄭當恐懼謝罪顧以許不事已遽至興師去疾之役將尊師衆猶以為未足也至冬復伐許春秋遂從而狄之不稱人者惡之深也公至自晉秋叔孫僑如帥師圍棘汶陽之田魯故地也齊人奪而有之一旦復歸于魯則汶陽之遺民宜懷其舊主翕然聽命何至有不服之心耶昔者周襄王以陽樊溫原攢茅之田賜晉文公陽樊不服圍之蒼葛呼曰德以柔中國刑以畏四夷宜吾不敢服也夫以天子賜諸侯之地而其民猶有不服者今汶陽之田以干戈取之其義已不足以服人矣况魯有苛政稅畝創于前邱甲繼于後民將携持而去之安能懷其舊哉大雩晉郤克衛孫良夫伐牆咎如冬十有一月晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟二國同時聘魯皆有尋盟之請春秋不以來盟書者非前定之盟因聘而尋舊盟也以二大夫同時而聘同時而盟未害也魯方尊晉待其大夫不敢與列國齒丙午盟晉丁未盟衛事大之義固得之矣以君而與大夫盟無乃甚自卑乎不書公及者避其名也鄭伐許四年春宋公使華元來聘去年晉與衛二國同時聘魯今兹宋華元來聘魯之交鄰有道矣然公親如晉報荀庚之聘明年仲孫蔑報聘于宋獨于衛無報焉豈非畏晉而卑衛耶三月壬申鄭伯堅卒杞伯來朝左氏曰杞伯來朝歸叔姬故也文公之時杞桓公來朝請絶叔姬今杞共公來朝請歸叔姬父子兩世皆昏于魯叔姬二人皆絶于杞明年杞叔姬來歸已而杞叔姬卒春秋悉書之以杞事觀之杞桓公請絶叔姬而無絶昏杞共公逆叔姬之喪以歸則杞之父子固未嘗得罪于魯叔姬之不賢固自有以取之爾按杜預釋例云杞桓公以僖二十三年即位襄六年卒凡在位七十一年今考僖二十三年經書杞子卒左氏以為杞成公襄公六年經書葬杞桓公又僖二十七年左氏有杞桓公來朝之文足為杞桓在位七十一年之證先儒謂杞共公生惠公惠公生成公及桓公而史記陳杞世家謂共公卒子德公立德公卒子桓公立中脫成公一代非也要之共公為桓公祖灼然無疑又僖三十一年經書杞伯姬來求婦蓋子叔姬始歸杞桓也文十二年杞伯來朝子叔姬卒左氏曰杞桓公請絶叔姬而無絶昏杜氏注云謂立其娣為夫人孔穎達正義曰文成之世經書叔姬二人皆杞桓夫人也戴氏所釋殊為疏舛夏四月甲寅臧孫許卒公如晉左氏曰晉侯見公不敬公至自晉欲求成于楚而叛晉魯之事晉非不勤也一禮之不答遽有叛晉之心賴季文子之言而止不然所喪多矣舍中國而事外裔安保外裔之不吾慢也有如楚人不敬公其將何之使成公移事晉之心事周得之矣葬鄭襄公秋公至自晉冬城鄆鄆有二其一曰東鄆其一曰西鄆西鄆魯邑也東鄆莒邑魯之所爭者也今兹城鄆蓋西鄆也定公之時齊人嘗歸鄆歡龜隂之田杜氏以為此三邑者汶陽之田也魯既得汶陽之後故城鄆以為固爾杜氏謂欲叛晉而城鄆者非也鄭伯伐許去年鄭伐許不書人今兹鄭復伐許書曰鄭伯何也鄭襄公新卒未踰年而鄭悼公伐許特不過爭許田而已其甚也與許男親訟于楚其自卑辱若此不明言鄭伯將無以著其罪矣五年春王正月杞叔姬來歸仲孫蔑如宋夏叔孫僑如會晉荀首于穀左氏曰荀首如齊逆女宣伯餫諸榖若此則叔孫僑如之私行也經何以書魯畏晉故其大夫逆女非以公事行也而僑如饋之其諸奉命而往歟春秋書之用見魯之不能自強而區區求悅于大國也梁山崩秋大水冬十有一月己酉天王崩十有二月己丑公會晉侯齊侯宋公衛侯鄭伯曹伯邾子杞伯同盟于蟲牢鄭之二晉久矣一旦請成于晉晉所甚喜也故會諸侯以同盟舉行盛禮以侈鄭人之服晉景公于是有驕泰之心矣六年春王正月公至自會二月辛巳立武宫左氏云季文子以鞍之功立武宫非禮也聽于人以救其難不可以立武如左氏所言則武宫者猶邲之戰潘黨請于楚子欲築武軍之類是也公羊之説則不然曰武宫者武公之宫也杜預之注似以左氏之言為非其説曰魯人以鞍之功至築武軍又作先君武公之宫以告成事誠如杜氏所言合武軍武宫為一事春秋書法不應若是略也按明堂位曰魯公之廟文世室也武公之廟武世室也蓋魯以文德歸于魯公謂之文世室猶漢人尊文帝為太宗也以武功歸于武公謂之武世室猶漢人尊孝武為世宗也此二室者世世不毁然而武公之室至是十一世向者大室之屋壞書于春秋以伯禽之廟不修且壞而况武公之室亦毁壞僅存而已今魯人以鞍之勝歸功于武公故即武宫而一新之所以昭武功也其曰立者毁舊而復新也誠武公之廟不當毁耶則魯之子孫固當世祀之其當毁耶則不應因武功之故而復立若是不亦誣乎昭公十五年有事于武宫左氏曰禘于武公夫五年一禘當在大廟不應在武公之宫不然則禘者春祭之名也時祭于羣公之廟而别有祀于武宫乎是又未可知也取鄟取根牟取鄟取邿公羊皆以為邾婁之邑非也此三者皆微國也魯兼而有之邾婁何與焉孟子曰周公之封于魯為方百里也今魯方百里者五子以為有王者作則魯在所損乎在所益乎由此觀之則魯之兼國也多矣衛孫良夫帥師侵宋夏六月邾子來朝公孫嬰齊如晉壬申鄭伯費卒秋仲孫蔑叔孫僑如帥師侵宋楚公子嬰齊帥師伐鄭冬季孫行父如晉一年之間魯之大夫兩至于晉豈非以得汶陽田之故瀆禮以媚晉耶明年晉侯使韓穿來言汶陽之田歸之于齊初不以魯之媚已而為之輕重然則以非禮悅人者果何益哉晉欒書帥師救鄭按左氏欒書救鄭楚師遂還晉師因而侵蔡楚師救之晉之諸將欲戰欒書不欲全師而歸是時晉人成師而出欒書之佐十一人其不欲戰者三人而已欒書能信用善言晉無亡矢遺鏃之費而卒收救鄭之功此主將善御下者也春秋之書救善辭也若欒書救鄭抑又甚善矣楚勢日強有帥師之卿矣鄭之去就關繫夷夏之重輕其往來晉楚急則窮猿之投林緩則飽鷹之揚去情蓋叵測也然自會扈之後去晉二十五年而後同蟲牢之盟既來之則安之不容逆計後日之復叛此所以方伐而隨救也晉楚遇于繞角楚師還晉師遂侵蔡楚救蔡欒書亦以師還而侵蔡救蔡不書所以全晉人恤鄰救難衛中國之義七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛榖梁曰不言日急辭也過有司也郊牛日展觓角而知傷展道盡矣其所以備災之道不盡也改卜牛鼷鼠又食其角又有繼之辭也其緩辭也曰亡乎人矣非人之所能也所以免有司之過也乃免牛乃者亡乎人之辭也魯郊非禮也聖人作春秋譏之則不可勝譏故因不郊而致意焉屢卜不從猶有卜筮也災牛之傷猶有天道也聖人幸之曷敢過有司哉吳伐郯郯中國也故季文子曰中國不振旅蠻夷入伐而莫之或恤然而夫子嘗問官名于郯子其辭曰天子失官學在四夷猶信則郯固夷也帝王之舊典禮經郯能識之豈純乎夷哉荆之始見也入蔡吳之始見也伐郯中國莫之問故駸駸焉交亂中國聖人狄之于始其嚴矣哉夏五月曹伯來朝不郊猶三望秋楚公子嬰齊帥師伐鄭公會晉侯齊侯宋公衛侯曹伯莒子邾子杞伯救鄭八月戊辰同盟于馬陵公至自會楚再伐鄭晉再救鄭晉侯為之大會諸侯而鄭人亦能囚楚之鄖公鍾儀以獻于晉其勢可以有為矣曾未能得楚之要領而遽為馬陵之盟有驕大之意君子是以知其終無能為也吳入州來曷為不繫之楚州來故蠻也楚人取以為邑故名從其舊吳楚之爭自入州來始春秋謹而書之所以志吳楚盛衰所由始也冬大雩衛孫林父出奔晉八年春晉侯使韓穿來言汶陽之田歸之于齊晉韓宣子求環鄭商子産弗與曰是晉之縣鄙也何國之為蓋維持其國者固自有紀綱不如是不足以為國矣汶陽之田固因晉而得之然魯之舊也亦既歸于魯矣七年之間一豫一奪惟晉是聽無乃不足以為國乎設使晉侯念齊侯不飲酒食肉之故欲復反其地猶當使韓穿來聘謀之於魯使魯人得以自歸之猶可諉也一旦遽使韓穿來言歸之于齊是令之而已爾魯人不敢違命拱手歸之季文子雖有私言果何益哉春秋書此雖以見晉人豫奪之不常然亦以著魯之君臣不能以自立也晉欒書帥師侵蔡前年晉欒書救鄭因而伐蔡楚師救之不戰而還晉未得志故再伐蔡陳鄭蔡三國迫于強楚乍服乍二非其罪也善察天下之勢者當先用力于楚若楚以兵威臨之則此三國迫于強令亦勢所必至安保其不二乎苟不知此則雖救陳救鄭救蔡皆不足以為恩而伐陳伐鄭伐蔡皆不足以為威也公孫嬰齊如莒宋公使華元來聘夏宋公使公孫壽來納幣榖梁曰以伯姬之不得其所故盡其事也春秋書嫁女亦多矣獨伯姬之事為最詳其賢伯姬可知也內女之不得其所亦多矣賢伯姬而録之非謂其得所與不得所也男女人道之本也內女賢而詳録之以示人道也晉殺其大夫趙同趙括秋七月天子使召伯來賜公命文公即位之初天王嘗使毛伯來錫公命至是成公之時天子復使召伯來賜公命魯十二公獨文成二君身受王命文公拜命之後猶能遣叔孫得臣如京師成公無是也後四年因會伐秦道過京師息汗馬之勞爾臣子之禮有愧多矣然文公書天王此書天子文公書錫命此書賜命何也曲禮曰君天下曰天子臨諸侯畛于鬼神曰有天王某甫則天王之與天子固不當混一稱也始曰天王猶有臨諸侯之義焉終曰天子姑息之意不足以臨諸侯矣王制曰制三公一命卷若有加則賜也不過九命蓋王之三公八命特賜可加一等不過九命是出于天子之特恩也春秋之書賜命其亦若是乎此其所以為異也冬十月癸卯杞叔姬卒晉侯使士燮來聘叔孫僑如會晉士燮齊人邾人伐郯左氏曰晉士燮來聘言伐郯也去年吳伐郯中國不能救郯小國也力不能支而求成于吳非得已也晉為霸主不能用力治吳以絶其陵暴之漸顧乃亟謀加師于郯是徒利郯之易虐爾豈有補于中國之大計哉衛人來媵九年春王正月杞伯來逆叔姬之喪以歸公會晉侯齊侯宋公衛侯鄭伯曹伯莒子杞伯同盟于蒲公至自會晉景公嗣霸不務修德數勤諸侯相與同盟一曰斷道二曰蟲牢三曰馬陵四曰蒲皆同盟也同盟天子之禮諸侯僣用天子之禮一之謂甚而况率以為常乎蒲之盟誠非急務正以歸汶陽之故諸侯二晉爾季文子謂范文子曰德則不競尋盟何為則是盟也果足以服諸侯哉二月伯姬歸于宋夏季孫行父如宋致女晉人來媵伯姬既歸于宋行父如宋致女説者謂致勑戒之言于女也伯姬之賢聞于諸侯故三國來媵魯豈不知既嫁之後猶使人致勑戒之語耶蓋伯姬之賢魯人尊之故専使上卿致女所以撫問其已至非嫁女之常禮也秋七月丙子齊侯無野卒晉人執鄭伯晉欒書帥師伐鄭左氏曰鄭伯如晉晉人討其二于楚也執諸銅鞮明年五月鄭伯歸穀梁曰不言戰以鄭伯也今春秋所書其一不言鄭伯如晉而被執其二不言欒書以鄭伯伐鄭其三不言鄭伯歸何也執之非其道伐之非其正歸之非其義也冬十有一月葬齊頃公楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆左氏曰冬十一月楚子重伐莒圍渠邱渠邱城惡衆潰奔莒戊申楚入渠邱遂圍莒莒城亦惡庚申莒潰楚遂入鄆按如左氏之言楚克莒三都然而渠邱之潰春秋不書入鄆之事再書楚人何也渠邱非莒都不足乎言也莒魯爭鄆為日久矣書楚人入鄆若異事然言鄆非莒得有也秦人白狄伐晉晉嘗與白狄伐秦秦亦與白狄伐晉白狄反覆無常惟利是視不足罪也晉可愧矣鄭人圍許左氏曰示晉不急君也公孫申之謀于是為不韙矣昔秦伯獲晉侯晉大夫反首茇舍以從之秦伯卒歸晉侯豈有其君被執外示不急之意興師以伐人者有如激晉侯之怒其不重為君纍者鮮矣城中城春秋書城中城者二其一在定公六年杜氏以為中城魯之外邑榖梁之説則不然曰非外民也又曰三家張也其意以為魯有中城有外城成公修中城以自固委外城之民而不恤也定公之時三家益張故定公再城中城為自固之謀二説未知孰是以春秋再書城中城觀之知其為魯之內城非外邑之城也十年春衛侯之弟黑背帥師侵鄭凡春秋書兄弟帥師聘問甚至于刑戮者雖恩怨不同均之為私也皆譏之夏四月五卜郊不從乃不郊春秋書郊有書免牛者有書免牲者有書不郊者蓋卜郊不吉或郊牛有傷故卜免牛吉則免之不吉則不免其免者有司元端送之南郊其不免者繫而待來年再免牲然後左右之免牲亦然或曰免牛或曰免牲何也牛卜日曰牲未卜日曰牛其傷者亦曰牛其名不同其卜免之禮則一也既卜免矣宜乎其不郊也故春秋之法惟不免牲者書不郊既已免牲矣則不書不郊獨成公七年書免牲矣復書不郊春既免牲夏復三望中間異事故復申言之也五月公會晉侯齊侯宋公衛侯曹伯伐鄭按左氏此晉太子州蒲也晉景公有疾立太子為君使會諸侯故稱晉侯夫父在而子代從政春秋猶譏之况無王命父在而使為諸侯乎春秋譏齊世子光猶惡其父在而處乎諸侯之上况于會諸侯乎春秋正名之書也其必不然矣前書晉侯伐鄭後書晉侯獳卒其為景公明矣齊人來媵春秋經世之書也媵淺事也得書于春秋蓋二南王化之基也媵遇勞而無怨詩人美焉聖人不刪也伯姬之賢三國來媵推而大之王化之基也春秋豈得而略之丙午晉侯獳卒秋七月公如晉冬十月十有一年春王三月公至自晉晉侯使郤犨來聘己丑及郤犨盟左氏曰十一年春王三月公至自晉晉侯以公為二于楚故止公公請受盟而後使歸郤犨來聘且涖盟如左氏之言公請受盟于晉晉侯不肯與公盟公既反國晉使郤犨來盟是卑公也當文公之二年公如晉晉人使陽處父盟公以恥之春秋為公諱不書如晉今春秋不書郤犨來盟先書來聘次書及盟是晉猶有禮于魯春秋得以避請盟之事而為魯諱也夏季孫行父如晉按左氏季文子如晉報聘且涖盟也審如是春秋不書涖盟何也兩君相見不自為盟而各遣其臣以盟其君尊卑紊亂莫此為甚前書來聘而不言來盟後書如晉而不言涖盟略之者惡之也秋叔孫僑如如齊鞍之戰齊人返我汶陽之田而晉使韓穿來言歸田于齊齊未嘗遣使至魯是德晉而怨魯也今也僑如修好未幾而求昏齊卒無報聘之使然則魯為齊弱久矣冬十月十有二年春周公出奔晉春秋之法為尊者諱今周公出奔曷為以出奔言之為天子之三公外通于四海而至于出奔尊之義微矣故直書之言失其所以為尊也夏公會晉侯衛侯于瑣澤宋華元克合晉楚之成故會于瑣澤夫晉楚之成非細事也實始于瑣澤曷為三國同會見晉之得諸侯也狹所與謀者二國而已秋晉人敗狄于交剛春秋之時戎患輕狄患重齊霸之盛狄方為患桓公不能治也晉霸之衰狄人微弱晉乃能屢勝之春秋于晉敗狄之事纎悉備書幸中國之猶能自強也冬十月十有三年春晉侯使郤錡來乞師三月公如京師夏五月公自京師遂會晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦曹伯盧卒于師秋七月公至自伐秦左氏曰公及諸侯朝王遂從劉康公成肅公會晉侯伐秦由左氏之言則公嘗朝王矣不曰朝而曰如春秋原情之辭也公無朝王之心道過京師不得已而行朝王之禮用見天理之在人心者不可泯也春秋推見至隱書公如京師紀其實而不序其名書公自京師見京師之尊而諸侯之不得専也書公至自伐秦見初心之所存而終事之不可掩也春秋于君臣之際其嚴矣哉冬葬曹宣公十有四年春王正月莒子朱卒夏衛孫林父自晉歸于衛衛侯如晉晉侯強見孫林父定公不可既歸晉使郤犨送孫林父而見之則是晉人得以制衛大夫出入之權也其可乎書自晉晉與有罪焉秋叔孫僑如如齊逆女鄭公子喜帥師伐許九月僑如以夫人婦薑氏至自齊左氏曰稱族尊君命也舍族尊夫人也榖梁曰僑如之挈由上致之也左氏之辭深不如榖梁之義正也春秋之法已書族者一事不再見獨公子遂會雒戎盟于暴再書公子遂嚴華夷之辨也今以稱族為尊君命是逺有所伸也舍族為尊夫人是近有所降也其辭深矣恐春秋紀事之法不若是也冬十月庚寅衛侯臧卒秦伯卒十有五年春王二月葬衛定公三月乙巳仲嬰齊卒癸丑公會晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚晉侯執曹伯歸于京師公至自會左氏曰會于戚討曹成公也左氏之言過矣天子討而不伐諸侯伐而不討其曰討曹成公過矣曹伯自立豈得為無罪執曹伯稱晉侯非謂曹之無罪也惡晉侯之自専也同盟于戚其事専矣猶知歸于京師用見天理之在人心者不可泯也夏六月宋公固卒楚子伐鄭秋八月庚辰葬宋共公宋華元出奔晉宋華元自晉歸于宋華元出奔晉魚石自止華元于河上華元乃反則是華元奔未出境也元未嘗至晉晉未嘗納元春秋安得以奔晉自晉書之嗟夫此華元之意也元克合晉楚之成嘗有功于晉故挾晉以為重其奔也聲言出奔晉其入也聲言晉納之以此令于國人告于諸侯春秋因其告而書之著其志也宋殺其大夫山宋魚石出奔楚冬十有一月叔孫僑如會晉士燮齊髙無咎宋華元衛孫林父鄭公子鰌邾人會吳于鍾離公羊曰曷為殊會吳外吳也榖梁曰會又會外之也春秋信其為內諸夏外外裔也楚之始會也曷為其不外楚且既已內吳矣不宜復外也曷為戚不殊會而柤復殊會也是以知春秋非有意于外外裔也因其可外而外之爾雖然秦楚吳越由內而黜者也故進于中國則中國之許遷于葉春秋之時許遷國最數亦既亡復存春秋之末許國尚列于春秋亦見其居強國之間委曲遷就以求茍免至于此也其亦可哀也已十有六年春王正月雨木冰寒凝者雨欲下而為霰今雨而木冰是寒之甚也非異也物不常有而驟有之謂異事不當然而偶然之謂災故隕霜殺菽志寒也李梅實志燠也觀于萬物之變而雨㿩寒燠之變定矣夏四月辛未滕子卒鄭公子喜帥師侵宋按左氏滕文公卒鄭子罕伐宋滕宋之與國也鄭因滕之喪而伐宋宋人敗鄭汋陂鄭復敗宋汋陵春秋以侵書不言兩敗惡鄭之乘喪不與宋之恃勝也六月丙寅朔日有食之晉侯使欒黶來乞師甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績楚殺其大夫公子側鄢陵之戰與城濮同功然厲公所以異于文公者一勝之後無以居之觀沙隨之不見公季孫行父之見執而厲公之志驕矣觀郤錡郤犨與欒書之事而晉之禍慘矣然則非有功之難而保有其功者為難乎秋公會晉侯齊侯衛侯宋華元邾人于沙隨不見公公至自會春秋之法為尊者諱恥公會衛侯于桃邱弗遇者公弗與之遇也同盟于平邱公不與盟者公弗與于此盟也今而曰不見公不見在諸侯如其書弗及盟然何也厲公無道政在大夫信人臣之讒而踈其君春秋以為不恥也前書公會後書公至若已成事而反者此春秋抑強扶弱之義也當其時晉侯不見公春秋不書晉侯若諸侯之不見然莫適為主與齊侯弗及盟書法不同者此又聖人為君父隱之道也公會尹子晉侯齊國佐邾人伐鄭左氏曰公會尹武公及諸侯伐鄭春秋稱尹子者時未為公曰武公追稱也尹氏世為周卿士當春秋之初年嘗書尹氏卒末又書尹氏召伯毛伯以王子朝奔楚書尹氏于二伯之上則尹氏世固為公矣觀詩與春秋所載見尹氏之専政于周也甚矣曹伯歸自京師春秋書曹伯襄復歸于曹也襄稱名歸稱國今負芻不名直言自京師何也襄之歸出于晉負芻之歸出于天子故也晉文公執衛侯鄭也歸之于京師衛侯之歸王許之曷為書曰衛侯鄭歸于衛衛侯鄭之被執也納玉于王與晉侯皆十玨王許之其歸也以利而不以義故春秋以衛侯自歸為文負芻之入也公子喜時內平其國而待之外治諸京師而免之其歸也以公而不以私故春秋以歸自京師書之春秋之尊京師也至矣書自某歸于某則納與不納未可知也書歸自京師則通行而無所阻矣此天子無外之義也九月晉人執季孫行父舍之于苕丘公羊曰執未有言舍之者此其言舍之何仁之也曰在招邱悕矣榖梁曰執者不舍而舍公所也春秋明大法不循私恩使行父有罪而可執其罪在行父使行父無罪而被執其罪在晉人春秋其不以私恩仁行父也必矣曰在招邱悕矣此昵昵為之私言也由左氏之言公還待于鄆不曰公在苕邱如使公而在苕邱也則與行父並執也其不然明矣執未有言舍者此其言舍何執之于國都或執之于會而歸其國春秋不得而書也執而舍之是置之于其地也比于執則尤甚矣春秋安得而不備書之行父曷為不言至自晉公在會而未返其國也行父已免矣先書行父及郤犨盟次書公至自會見公之待行父也明矣冬十月乙亥叔孫僑如出奔齊十有二月乙丑季孫行父及晉郤犨盟于扈公至自會乙酉刺公子偃春秋書刺公子買也先書公子買不卒戌之罪次言刺見買之有罪也今不言其罪而直書其刺然則偃果無罪乎非也沙隨之不見季孫之被執魯之恥大矣次書僑如之出行父之盟公之至公子偃之刺則僑如公子偃之罪不可逃矣此又春秋比事之教也十有七年春衛北宫括帥師侵鄭按左氏鄭子駟侵晉衛北宫括救晉侵鄭春秋何以不書鄭侵晉衛救晉也以霸主而見侵于小國難其為言也以小國而侵小以為救不足乎揚也夏公會尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭六月乙酉同盟于柯陵秋公至自會前此諸侯屈天子之卿而為會者有之矣而未有屈二卿者屈天子之卿而為盟者有之矣而未有同盟者厲公之志其驕而僣也甚矣柯陵諸侯同盟伐鄭見厲公之無道諸侯離心盟以劫之也當悼公之霸也會諸侯伐鄭同盟于亳城北其事與柯陵類春秋于柯陵也書曰公至自會于亳城北也書曰公至自伐鄭從二君之志也厲公志欲服鄭而自以為功悼公德能服鄭而不敢為功春秋從其告至之意而書之柯陵先書致會後書致伐亳城北先書致伐後書致會始終之義定矣齊髙無咎出奔莒九月辛丑用郊公羊曰用者不宜用也或曰用然後郊榖梁曰用者不宜用也如公羊之説用然後郊若魯人將有事于上帝必先有事于頖宫是也夫魯之僣郊也久矣其僣也必先有事于頖宫不待今日用而後郊也大抵春秋于祭祀之禮多言用曰用牲用幣是也不特春秋在書亦曰用牲于郊蓋春秋之記魯郊也皆因事而書率不出于春夏之間獨九月最為不時魯知九月之不當郊也而用常郊之禮以祭故曰用郊二傳所謂不宜用者也晉侯使荀罃來乞師冬公會單子晉侯宋公衛侯曹伯齊人邾人伐鄭十有一月公至自伐鄭壬申公孫嬰齊卒于貍脤公羊曰非此月日也曷為以此月日卒之待君命然後卒大夫榖梁曰十一月無壬申乃十月也致公而後録臣子之義也春秋固不以日月為訓也然日月之差則亦不足以為信史也使十一月而無壬申春秋以十一月書焉則亦何以取信于來世春秋固以日月志大夫之卒矣然而公子益師卒世逺不書日春秋不得而強增也使春秋致公而録嬰齊之卒也其不必書壬申可也取非其日而繫之其月之下是天時可得而變也春秋其不然明矣昔者陳侯鮑之卒也書甲戌己丑傳者曰甲戌之日死己丑之日赴使嬰齊以十月壬申卒也十一月公至之日而命之為大夫然後卒之獨不用陳侯卒例乎然春秋書十二月丁巳朔則十一月果無壬申也其何以通之春秋信以傳信疑以傳疑舊史以壬申為十一月猶其為夏五也春秋豈得而改易之乎十有二月丁巳朔日有食之邾子貜且卒晉殺其大夫郤錡郤犨郤至楚人滅舒庸羣舒叛楚楚人滅舒庸又滅舒鳩夷狄相攻何足以勒春秋之書而春秋備載焉蓋楚之未通于中國也雖滅榖鄧而不書于春秋及其從事于中國也聘問會盟侵伐攻取往往來告故滅舒庸滅舒鳩之類春秋備載焉亦可以見中外盛衰之故矣十有八年春王正月晉殺其大夫胥童庚申晉弒其君州蒲齊殺其大夫國佐公如晉夏楚子鄭伯伐宋宋魚石復入于彭城左氏曰凡去其國國逆而立之曰入復其位曰復歸諸侯納之曰歸以惡曰復入如左氏之説歸為最善復入為最惡若公羊之説則不然復歸者出有惡歸無惡復入者出無惡入有惡入者出入惡歸者出入無惡夫歸與入不同歸為順為善入為逆為惡此不待辨而明也或言復歸或言復入者何歸為善矣而又言復歸善之善者也入為惡矣而又言復入惡之惡者也魚石挾夷狄之勢入于國以叛何惡如之故曰復入公至自晉晉侯使士丐來聘左氏曰君子謂晉于是乎有禮周禮曰凡諸侯之邦交世相朝也悼公即位公往朝之悼未始至魯其于周禮失相朝之義矣左氏猶以晉為有禮何也晉強魯弱久矣君朝而臣報則已為得禮何敢復望其相朝乎君子謂晉于是乎得春秋之禮矣秋杞伯來朝八月邾子來朝築鹿囿左氏曰書不時也公羊曰譏有囿矣又為也榖梁曰山林藪澤之利所以與民共也虞之非正也合三傳之説成公之罪不可逃也不時一也泰侈二也奪民之利三也然猶有遺罪焉孟子曰臣聞郊關之內有囿方四十里殺其麋鹿者如殺人之罪築囿以為鹿區此孟子所謂民以為阱者也其罪益甚矣己丑公薨于路寢冬楚人鄭人侵宋晉侯使士魴來乞師十有二月仲孫蔑會晉侯宋公衛侯邾子齊崔杼同盟于虛朾是盟也見晉急于圖霸忘其國之喪而又忘鄰國之喪也厲雖無道喪未踰年魯新有喪猶未葬也孟獻子請于諸侯而先歸會葬晉于是有愧矣丁未葬我君成公欽定四庫全書春秋講義卷三下宋戴溪撰襄公元年春王正月公即位仲孫蔑會晉欒黶宋華元衛寧殖曹人莒人邾人滕人薛人圍宋彭城魚石之入也彭城不書宋諸侯之圍彭城也復繫之宋何也虎牢鄭地也諸侯奪而城之故不書鄭言鄭之不能有其地也戍鄭虎牢復繫之鄭言諸侯不得有鄭地復歸之其主也彭城宋地也宋不能守而奪於楚故不得而書宋楚夷狄也奪中國之地而封其叛臣此豈得而有之書宋彭城復其舊也聖人刪詩雖衛滅邶鄘猶不忘其故國而况於春秋乎夏晉韓厥帥師伐鄭仲孫蔑會齊崔杼曹人邾人把人次于鄫按左氏晉韓厥帥諸侯之師伐鄭於是東諸侯之師次于鄫以待晉師然則韓厥身自伐鄭而諸侯不與焉亦見晉悼公圖伯之初使大夫身親其勞不敢勤諸侯之師若此宜其能成霸也秋楚公子壬夫帥師侵宋九月辛酉天王崩邾子來朝冬衛侯使公孫剽來聘晉侯使荀罃來聘左氏曰衛子叔晉知武子來聘禮也凡諸侯即位小國朝之大國聘焉繼好結信謀事補闕禮之大者也歷考十二公即位之初朝會聘問講于鄰國者有之矣而鄰國未有先來聘者獨襄公為然蓋晉悼圖霸屈己以交諸侯當次鄫之役也晉侯衛侯實次於戚以為之援故謀而聘魯此左氏所以特言其為禮也二年春王正月葬簡王鄭師伐宋夏五月庚寅夫人薑氏薨六月庚辰鄭伯睔卒晉師宋師衛寧殖侵鄭春秋惡伐人之喪故晉宋皆稱師衛獨何以書將穀梁曰衛侯速卒鄭人侵之故特書寧殖明其能復怨也然則春秋許人復怨乎君父之讎臣子所當報也秋七月仲孫蔑會晉荀罃宋華元衛孫林父曹人邾人于戚己丑葬我小君齊薑叔孫豹如宋冬仲孫蔑會晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢左氏曰秋七月會于戚謀鄭故也孟獻子曰請城虎牢以逼鄭知武子曰善冬復會于戚遂城虎牢鄭人乃成公羊曰虎牢者何鄭之邑也其言城之何取之也取之則曷為不言取之為中國諱也曷為為中國諱諱伐喪也曷為不繫乎鄭為中國諱也大夫無遂事此其言遂何歸惡於大夫也穀梁曰若言中國焉內鄭也虎牢鄭地也如左氏之言則晉嘗取之矣如公羊之言則晉於今始取之也虎牢何以不言鄭如公羊之言則以為諱伐喪如榖梁之説則以為內鄭鄭人服罪故諸大夫為之城虎牢也以經意考之榖梁之説殆非公羊亦未免求之太過使鄭人果服罪而諸大夫城之則他日何以復戍虎牢諸大夫實會於戚未嘗伐鄭春秋亦安得為中國諱蓋諸侯連年伐鄭侵逼虎牢其取之有漸矣屬之鄭耶則鄭不能守已非其地矣屬之晉耶則非晉所得有也舉而歸諸其公若莫適為主然此春秋謹分守正名實之意也昔者桓文之霸鄭嘗不服矣未至於城險以逼之出此下䇿悼霸衰矣不特此也齊桓經營霸業雖不敢勤諸侯而率以身親之悼公以圖鄭之功付之諸大夫益見其不逮矣楚殺其大夫公子申三年春楚公子嬰齊帥師伐吳按左氏楚子重伐吳克鳩兹至於衡山使鄧廖侵吳吳人要而擊之獲鄧廖吳人伐楚取駕由左氏言之吳楚交相伐迭為勝負楚人之失為多春秋何以不書吳伐楚楚人告命行於中國久吳方自通於上國告命之不及春秋不得而書也公如晉夏四月壬戌公及晉侯盟于長樗公至自晉襄公年在幼沖往朝於晉悼公喜於親魯出盟公於外前此公之朝晉盟於國有之矣未聞其在外也用見悼公圖霸之謀急於得魯若此也六月公會單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤陳侯使袁僑如會戊寅叔孫豹及諸侯之大夫及陳袁僑盟秋公至自會是盟也見悼公急於得鄭幸鄭人之乍服不暇論其情偽而亟為是盟也上連單子以為同盟而又欲援引吳人以為誇當桓文之圖霸也亦既勞矣悼欲成功於三年之間宜乎未久而鄭復叛也昔者踐土之盟陳侯如會今者袁僑實來文之霸不及桓悼之霸不及文益下益衰矣悼公不特急於得鄭也亦急於得陳袁僑之來已出望表况敢望其君之至乎諸侯既盟復使大夫盟之懼無以結陳人之心不憚煩瀆以懷來者悼之志迫矣文之霸也其君如會而不與之盟悼之霸也大夫如會而汲汲然盟之其功業之相去甚逺春秋書諸侯之大夫及陳袁僑盟及以及外之也若曰吾中國之諸侯久於從夷今兹來會其君不至而大夫實來是未可內也公榖皆以為與袁僑也非矣袁僑未足與也冬晉荀罃帥師伐許昔者齊桓之霸也召陵之師許男在焉實卒於師他日許嘗與會楚人圍許諸侯救之亦由許之能自強而桓公粗足以服許也晉文既為溫之會移諸侯之師以圍許晉悼復霸修文故事雞澤既盟僅遣荀罃以伐許用見晉文之德不及齊桓而悼公圖霸之謀其茍簡於文也多矣四年春王三月己酉陳侯午卒夏叔孫豹如晉秋七月戊子夫人姒氏薨葬陳成公八月辛亥葬我小君定姒冬公如晉陳人圍頓五年春公至自晉夏鄭伯使公子發來聘叔孫豹鄫世子巫如晉仲孫蔑衛孫林父會吳于善道秋大雩楚殺其大夫公子壬夫公會晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚公至自會冬戍陳公羊曰孰戍之諸侯戍之曷為不言諸侯戍之離至不可得而序故言我也榖梁曰內辭也城戍中國類非魯所自為諸侯皆與焉而春秋書城戍者多獨書魯非掠美以専功也諸侯受命于霸主各共乃事不相告命春秋不得而悉書也公羊言離至者是榖梁言內辭者非按杜預左傳注云諸侯在戚受命各還國遣戍不相告命故獨書魯與公羊合楚公子貞帥師伐陳公會晉侯宋公衛侯鄭伯曹伯齊世子光救陳十有二月公至自救陳書戍陳於前書救陳於後見戍陳初無所益而徒勞諸侯之師也桓文之霸皆嘗得陳楚不敢爭悼公之霸陳僅服耳而不免被兵諸侯之師既戍之矣猶不免於救此可以見晉悼之霸不及桓文逺矣辛未季孫行父卒六年春王三月壬午杞伯姑容卒夏宋華弱來奔秋葬把桓公滕子來朝莒人滅鄫穀梁曰立異姓以蒞祭祀滅亡之道也據左氏言之則莒固亡鄫矣非立異姓也二傳之説未知其孰是然以春秋考之鄫請屬於魯則鄫人之勢迫矣莒既滅鄫季孫宿如晉見魯之不能救鄫也邾莒二國與鄫為仇昔者邾人執戕鄫子矣今莒人滅鄫勢所必至也嗟夫王政不行強弱相虐亦已甚矣鄫為一國之君邾人執而用之如犧牲然尚為有人道乎他日又戕而殺之有人心者宜於此焉變矣諸侯晏然不問至於莒人滅鄫晉不能恤反貽責於魯茍為諸侯者皆不免於罪况於霸主乎以莒而敢於滅鄫在晉而不敢問莒然則以齊而滅萊晉人其敢問齊乎此聖人之所傷也冬叔孫豹如邾季孫宿如晉十有二月齊侯滅萊七年春郯子來朝夏四月三卜郊不從乃免牲按左氏孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也夫卜而後郊郊而後耕此天子祈榖之禮也魯豈得而用之使卜筮而有知凡魯之郊無一卜之可從豈特數四而已哉然後知魯卜筮之無知也小邾子來朝城費前卜郊而不從則無以祈穀也後八月螽則無禾矣中間城費見大夫之強而不恤民力如此也凡春秋書城築之事比文觀之其罪不可逃矣莊公築臺而書不雨新延廄而書有蜚僖公作南門而書西宫災文公城諸及鄆而書正月不雨若此類皆是也秋季孫宿如衛八月螽冬十月衛侯使孫林父來聘壬戌及孫林父盟前者季孫宿如衛衛未嘗盟宿今者衛孫林父來聘魯何以盟林父左氏曰季武子如衛報子叔之聘且辭緩報非二也按子叔之聘在元年及今而始報魯有歉於心矣宿之聘衛未移時而林父復來魯且愧且德故汲汲盟之所以結衛也楚公子貞帥師圍陳十有二月公會晉侯宋公陳侯衛侯曹伯莒子邾子于鄬鄭伯髠頑如會未見諸侯丙戌卒于鄵陳侯逃歸公羊曰未見諸侯其言如會何致其意也榖梁曰致其志也鄭伯未至於會曷為以如會書內之也陳侯已至於會曷為以逃歸書外之也春秋之于諸侯本非有內外也咸其自取焉耳君子之與善也觀其始故有向善之心者雖未至而已録之其惡惡也觀其終故有違義之心者雖已至而猶絶之此鄭伯所以書如會陳侯所以書逃歸也雖然春秋非私陳鄭也當齊桓首止之盟鄭伯逃歸晉文踐土之盟陳侯如會春秋即實而書之猶其書鄬也八年春王正月公如晉夏葬鄭僖公鄭人侵蔡獲蔡公子燮季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢丘左氏曰公如晉朝且聽朝聘之數會於邢邱以命朝聘之數使諸侯之大夫聽命大夫不書尊晉侯也榖梁曰見魯之失正也公在而大夫會也魯公如晉季孫在會由左氏之言見悼公之屈已而尊諸侯也由榖梁之言見襄公之失正而大夫強也悼公之意欲尊魯爾而不知適以卑君而強臣也蓋其意以善為之而不知其非義者悼公是也襄公亦既長矣親如晉朝將聽朝聘之數顧不得與於會使其大夫偃然與諸侯並列是尚為有君乎書季孫宿而不書諸侯之大夫惡季孫而貶列國之大夫豈曰尊晉侯乎哉公至自晉莒人伐我東鄙秋九月大雩冬楚公子貞帥師伐鄭晉侯使士丐來聘九年春宋災夏季孫宿如晉五月辛酉夫人薑氏薨秋八月癸未葬我小君穆薑冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光伐鄭十有二月己亥同盟于戲春秋書同盟多矣皆諸侯既會而自盟也今兹伐鄭而同盟春秋不言鄭夫安知鄭之與盟也不言至自伐鄭則諸侯既盟矣不言至自會則鄭人未服可知也按杜預云伐鄭而書同盟鄭受盟可知講義全駁此説疑戴氏原引杜説于此條之首而永樂大典脫之楚子伐鄭十年春公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光會吳于柤夏五月甲午遂滅逼陽公至自會穀梁曰會又會外之也甲午遂滅逼陽其曰遂何也不以中國從吳人也公至自會會吳人不致惡事不致此其致何也存中國也往者嘗殊會吳已而同於諸侯矣今曷為復殊會也聖人之意傷矣以中國之君而會南蠻固已非矣又相與滅人之國春秋之意若曰諸侯之會吳遂滅逼陽爾其實諸侯滅之而其文則在吳也范寧不明聖人之意故直言吳實會諸侯以滅逼陽其實非也聖人於是會也三致意焉始殊會吳中也間以甲午末也書公至自會若諸侯常盟會然聖人之意傷矣惟榖梁子知之楚公子貞鄭公孫輒帥師伐宋晉師伐秦左氏曰晉荀罃伐秦報其侵也杜氏曰荀罃不書不親兵也秦晉之戰亟矣聖人略之耳非其不親兵也秋莒人伐我東鄙公會晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯把伯小邾子伐鄭冬盜殺鄭公子騑公子發公孫輒春秋書盜多矣其大者能殺諸侯其次者能殺衛侯之兄又其次也能一朝而殺三卿彼竊寶玉而奔者猶未足怪也蓋賤之賤者不足乎書上之人寵待太過自貽伊禍春秋痛戒有位之人使之防微杜漸彼盜賊者何足以汚史册左氏以為盜欲求名而不得春秋豈與盜賊論名也哉戍鄭虎牢榖梁以不書鄭為內鄭其書鄭者外之也非也夫諸侯土地受之天子傳之先君奪而去之顧以為內復而歸之反以為外何耶天下之物取非其所有雖一時之力足以得之久而未有不復其故者衛奪邶鄘而有之聖人刪詩猶存邶鄘之風而况虎牢鄭地始雖奪於諸侯終復歸於鄭安得不繫之鄭乎楚公子貞帥師救鄭公至自伐鄭十有一年春王正月作三軍公羊曰三軍者何三卿也作三軍何以書譏何譏爾古者上卿下卿上士下士穀梁曰古者天子六師諸侯一軍作三軍非正也周禮六軍之制昭然具在公榖之論其異如此蓋不特論軍制然也凡議禮皆然以此類推之公榖殆漢儒秦火之後未見全書也魯次國當有二軍故詩人稱僖公曰公徒三萬舉成數言也三家專魯人征一軍故增為三軍爾公羊以司馬有二卿其於官制增矣榖梁以諸侯例為一軍其於兵制損矣夏四月四卜郊不從乃不郊鄭公孫舍之帥師侵宋公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭秋七月己未同盟于亳城北公至自伐鄭榖梁曰不以後致盟後復伐鄭也春秋之法不觀諸前而要諸其後同盟未幾鄭復被伐其前之盟不足信而後之伐不可掩也直書公至自伐鄭著其實也楚子鄭伯伐宋公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭會于蕭魚公至自會按左氏晉趙武入盟鄭伯鄭子展出盟晉侯十二月會于蕭魚公羊曰此伐鄭也其言會于蕭魚何蓋鄭與會爾如左氏之言晉鄭二國固相盟矣春秋不書者見晉悼不煩諸侯而兩國自相為盟也既盟之後鄭與諸侯同會于蕭魚晉赦鄭囚納斥候禁侵掠是舉也可以為春秋盛德事矣比於召陵有光焉春秋伐國多矣既服而盟未有言會者獨蕭魚為然兹不謂之盛德乎桓文之霸先服楚而後服鄭悼公之霸止服鄭而不急於服楚此成功所以異也楚人執鄭行人良霄按左氏九月諸侯悉師復伐鄭鄭人使良霄如楚告將服于晉楚人執之如左氏之説楚執良霄在九月會于蕭魚在十有二月春秋何以書執良霄于蕭魚之下蓋悼公十年經營服鄭至此而後成功書楚執良霄服鄭之功於此乎訖事矣用見鄭人之心已服楚人之力不競晉悼之功為不爭也冬秦人伐晉按左氏秦庶長鮑庶長武帥師伐晉以救鄭士魴禦之少秦師而弗設備己丑戰于櫟晉師敗績易秦故也杜氏曰晉恥易秦而敗故不告也殆不然秦晉之戰已亟故略之也十有二年春王三月莒人伐我東鄙圍台公羊曰伐而言圍者取邑之辭也榖梁曰伐國不言圍邑舉重也夫春秋之法伐則言伐圍則言圍取則言取其曰伐不言圍者非也取邑之辭亦非也春秋紀實之書也誠使侵伐圍取紛紜不定則亦何以信來世哉季孫宿帥師救台遂入鄆夏晉侯使士魴來聘秋九月吳子乘卒冬楚公子貞帥師侵宋公如晉十有三年春公至自晉夏取邿秋九月庚辰楚子審卒冬城防十有四年春王正月季孫宿叔老會晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人會吳于向左氏曰十四年春吳告敗于晉會于向為吳謀楚故也范宣子數吳之不德以退吳人杜氏曰魯使二卿會晉敬事霸國晉人自是輕魯幣而益敬其使故叔老雖介亦列于會也齊崔杼宋華閲衛北宫括在會惰慢不敬故貶稱人吳來在向諸侯會之故曰會吳如左氏之言吳來告敗晉合諸侯之大夫為吳謀楚事之倒置莫此為甚魯二卿並列見魯大夫之強非敬事霸國也齊宋衛三卿不書見三國之慢晉罪不止于三卿也殊會吳者見中國之弱坐為南蠻所致聖人傷焉故離而外之豈曰吳來在向諸侯往會故稱會吳乎屈中國為南蠻謀晉之始計已失矣既會之後始數其不德而退之晉計亦晚矣悼公末年以此謀國不已踈乎二月乙未朔日有食之夏四月叔孫豹會晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人伐秦夫秦晉有積怨伐秦大事也晉侯親出諸侯之大夫從焉見諸侯之慢晉也三國之大夫惰於會向衛北宫括攝於伐秦春秋豈較一時勤惰以為書法哉志諸侯之慢侮傷悼公之霸業自是不復振也己未衛侯出奔齊莒人侵我東鄙秋楚公子貞帥師伐吳冬季孫宿會晉士丐宋華閲衛孫林父鄭公孫蠆莒人邾人于戚戚之會謀衛故也一年之間大夫三會皆中國之大事其一曰會夷狄其二曰伐夷狄其三曰謀中國悉使大夫專之習見其事以為當然故踵而行之不以為怪亦可以見春秋之季矣十有五年春宋公使向戌來聘二月己亥及向戌盟于劉劉夏逆王后于齊夏齊侯伐我北鄙圍成公救成至遇季孫宿叔孫豹帥師城成郛成孟氏之邑齊圍成而公親救既而二卿城成郛用見孟氏之強公雖有所畏於齊不敢不出三卿和睦合比以弱公室也秋八月丁巳日有食之邾人伐我南鄙冬十有一月癸亥晉侯周卒十有六年春王正月葬晉悼公三月公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于湨梁戊寅大夫盟晉人執莒子邾子以歸公羊曰諸侯皆在是其言大夫盟何信在大夫也何言乎信在大夫遍刺天下之大夫也曷為遍刺天下之大夫君若贅旒然榖梁曰湨梁之會諸侯失正矣諸侯會而曰大夫盟正在大夫也諸侯在而不曰諸侯之大夫大夫不臣也晉悼公踰月而葬既葬之後平公遂會諸侯于湨梁其始之欲得諸侯何其速也及諸侯在會使大夫盟又何其怠也二傳以為大夫不臣春秋遍刺天下之大夫是則然矣甫踰月而葬既葬而會會而宴諸侯使大夫舞其天理已亡矣何以責臣子之專命乎內失權於大夫外用威於諸侯謹始如此天下其誰畏之此晉霸所以衰於平公也齊侯伐我北鄙按自此至襄公三十一年永樂大典並闕夏公至自會五月甲子地震叔老會鄭伯晉荀偃衛寧殖宋人伐許許男請遷於晉許大夫不從許之勢甚迫許之請可念也晉人歸諸侯而獨使大夫伐許猶未甚怒也獨許鄭有宿怨鄭伯身從諸侯甘心於許故以鄭序晉上為鄭主乎是師也按自此以下講義十二條並從黃震日抄檢補秋齊侯伐我北鄙圍郕大雩冬叔孫豹如晉十有七年春王二月庚午邾子牼卒宋人伐陳夏衛石買帥師伐曹秋齊侯伐我北鄙圍桃高厚帥師伐我北鄙圍防九月大雩宋華臣出奔陳冬邾人伐我南鄙十有八年春白狄來夏晉人執衛行人石買秋齊師伐我北鄙冬十月公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子同圍齊曹伯負芻卒于師春秋未有書同圍者而此獨書見齊之得罪者多而諸侯之同心者衆也楚公子午帥師伐鄭十有九年春王正月諸侯盟于祝柯晉人執邾子公至自伐齊取邾田自漷水季孫宿如晉葬曹成公夏衛孫林父帥師伐齊秋七月辛卯齊侯環卒晉士丐帥師侵齊至榖聞齊侯卒乃還八月丙辰仲孫蔑卒齊殺其大夫高厚鄭殺其大夫公子嘉冬葬齊靈公城西郛叔孫豹會晉士丐于柯城武城二十年春王正月辛亥仲孫速會莒人盟于向夏六月庚申公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子盟于澶淵秋公至自會仲孫速帥師伐邾蔡殺其大夫公子燮蔡公子履出奔楚陳侯之弟黃出奔楚叔老如齊冬十月丙辰朔日有食之季孫宿如宋二十有一年春王正月公如晉邾庶其以漆閭丘來奔昔莒僕以寶玉來奔季文子使出諸境甚矣季武子之有愧于其祖也夏公至自晉秋晉欒盈出奔楚九月庚戌朔日有食之冬十月庚辰朔日有食之曹伯來朝公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任左氏曰錮欒氏也按欒盈實奔楚非晉所得錮也商任之會非徒無益而又害之按此條從黃震日抄補詳其文義應引左傳作案故節録于前二十有二年春王正月公至自會夏四月秋七月辛酉叔老卒冬公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于沙隨公至自會楚殺其大夫公子追舒二十有三年春王二月癸酉朔日有食之三月己巳杞伯丐卒夏邾畀我來奔葬杞孝公陳殺其大夫慶虎及慶寅陳侯之弟黃自楚歸于陳晉欒盈復入于晉入于曲沃秋齊侯伐衛遂伐晉八月叔孫豹帥師救晉次于雍榆己卯仲孫速卒冬十月乙亥臧孫紇出奔邾晉人殺欒盈齊侯襲莒二十有四年春叔孫豹如晉仲孫羯帥師侵齊豹之如晉賀克欒氏羯之侵齊為晉復怨夫當事而救不能致力既事而聘何益于晉當齊伐晉不能擊齊既退而侵何損於齊君子是以知其為文具也夏楚子伐吳秋七月甲子朔日有食之既齊崔杼帥師伐莒君子是以知崔杼有異志助其君為虐矣大水八月癸巳朔日有食之公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀會于夷儀欲伐齊不克乃使楚人伐鄭以牽制中國冬楚子蔡侯陳侯許男伐鄭公至自會陳針宜咎出奔楚叔孫豹如京師大飢二十有五年春齊崔杼帥師伐我北鄙夏五月乙亥齊崔杼弒其君光公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀六月壬子鄭公孫舍之帥師入陳秋八月己巳諸侯同盟于重丘左氏曰齊成故也舍崔氏之大罪復莊公之小怨况又納賂焉何以示諸侯按此條亦從黃震日抄補詳文義應引左傳並為録入公至自會衛侯入于夷儀楚屈建帥師滅舒鳩冬鄭公孫夏帥師伐陳十有二月吳子遏伐楚門于巢卒二十有六年春王二月辛卯衛寧喜弒其君剽衛孫林父入于戚以叛甲午衛侯衎復歸于衛夏晉侯使荀吳來聘公會晉人鄭良霄宋人曹人于澶淵秋宋公殺其世子痤晉人執衛寧喜八月壬午許男寧卒于楚冬楚子蔡侯陳侯伐鄭葬許靈公二十有七年春齊侯使慶封來聘夏叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋衛殺其大夫寧喜衛侯之弟鱄出奔晉秋七月辛巳豹及諸侯之大夫盟于宋弭兵之功小大夫專盟之罪大大夫固嘗盟于湨梁矣當是時諸侯皆在會憚于一盟遣大夫以為盟是諸侯之怠非大夫之專也大夫專盟未有如宋者也春秋書宋之盟特言諸侯者明君臣之義特先晉人者正夷夏之分冬十有二月乙亥朔日有食之二十有八年春無冰夏衛石惡出奔晉邾子來朝秋八月大雩仲孫羯如晉冬齊慶封來奔十有一月公如楚率天下朝楚明告于晉晉不得而辭也尚得以宋之盟為晉趙武之功乎十有二月甲寅天王崩乙未楚子昭卒二十有九年春王正月公在楚夏五月公至自楚當正月之吉身在夷狄之國左氏以為釋不朝正於廟公羊以為存君榖梁以為閔公皆得之矣庚午衛侯衎卒閽弒吳子餘祭仲孫羯會晉荀盈齊髙止宋華定衛世叔儀鄭公孫段曹人莒人滕人薛人小邾人城把晉侯使士鞅來聘把子來盟吳子使札來聘秋九月葬衛獻公齊髙止出奔北燕冬仲孫羯如晉三十年春王正月楚子使薳罷來聘夏四月蔡世子般弒其君固五月甲午宋災宋伯姬卒天王殺其弟佞夫王子瑕奔晉秋七月叔弓如宋葬宋共姬鄭良霄出奔許自許入于鄭鄭人殺良霄良霄不稱大夫者出奔已絶於鄭冬十月葬蔡景公晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人把人小邾人會于澶淵宋災故三十有一年春王正月夏六月辛巳公薨于楚宫秋九月癸巳子野卒己亥仲孫羯卒冬十月滕子來會葬癸酉葬我君襄公十有一月莒人弒其君密州
