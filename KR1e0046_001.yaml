body:
  text: 春秋講義卷一上宋戴溪撰隱公元年春王正月元年者一年也謂一為元自堯舜以來未之有改也其曰春王正月聖人之特筆也天有四時春為之首三代異正夏數得天今首之以春若曰此時者天之所為也次之以王又次之以正者若曰此正朔者王之所為也王者班正朔以奉天道則天下萬事莫不得其正矣君之始年當書即位隱公不書即位何也隱攝而不行即位之禮故也春秋之法一年之內必備四時四時之中或無事可書必書首月所以備天道而成嵗功也按黃震日抄云胡文定謂春秋以夏時冠周月朱子疑之岷隱戴氏在東宫進講常以夏正為說於時事亦未見其甚背竊意三代雖有改正朔之事而天時恐無可改故所抄依戴氏焉之又按日抄云隱公不書即位戴氏以經之所無付不言今考講義隱攝云云實依左氏為說黃氏讀之不審耳三月公及邾儀父盟于蔑按講義稱邾稱盟蔑是戴氏録經文從左氏之證春秋之法書時書月書日有月而無日者史之闕文也邾者中國之附庸儀父者邾君之字也中國之附庸例稱字其曰公及盟何也及者內為志隱公即位欲求好於邾故是盟也出於公之志邾之與魯壤地相接數㑹屢盟非不善也然而人情利害相及則嫌隙易生其後或侵或伐紛然而不定卒之哀公入邾執邾子益以歸觀始焉盟蔑之好終焉入邾之役則知屢盟之無益人情之可畏如此也夏五月鄭伯克段于鄢叔段者鄭伯同母之弟也曷為不以弟書見叔段不以弟事其兄鄭伯不能友愛其弟也書曰于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟其鄭伯叔段之謂歟稱鄭伯克段若途之人然親親之義絶矣克者力勝之辭也以鄭國之力施之叔段沛然有餘矣其曰力勝何也段多才而好勇外為邑人所歸內有姜氏之助繕甲兵具卒乘將為襲鄭之謀其力固未易勝也鄭伯命公子呂出車二百乘以伐之其用力亦少勞矣段本在京而出奔鄢無能為矣使鄭伯緩追逸賊猶可以全親親之義克之於鄢其迫之為已急矣春秋書鄭伯書克書于鄢探鄭伯之志而著其罪也秋七月天王使宰咺來歸惠公仲子之賵加天於王之上此春秋之特筆也先書王正月次書天王此尊王之大義聖人作春秋之本㫖也當是之時周室既衰自儕於諸侯聖人作春秋援周室於千仭之淵稱天王於諸侯之上見王者在上其尊如天而諸侯之衆其卑如地一字之嚴凛然而不可犯其功用可謂大矣然而王者奉若天道賞曰天命刑曰天討有一不當則失其所以為天矣今也宰咺來歸惠公仲子之賵揆之典禮容有未安仲子者桓公之母非惠公之夫人也天子不當歸賵宰咺者天子之冢宰以道佐王非所當使於諸侯就使仲子之卒禮所當賵宰咺不當遣也禮天子之宰當稱爵周公是也今也宰咺書名用見冢宰之自輕也春秋書此所以重典禮而敬大臣也九月及宋人盟于宿盟者國之大事也邦國有疑㑹同則盟之諸侯自相為盟苟非大事猶曰不可况國之微者乎及宋人盟內不書其人外不書其名其微者可知矣隱公聲子所自出於宋有甥舅之親即位而修好固人情所當然也三年之久公始與宋公遇于清魯之於宋未汲汲然也不知兩國微者相與為盟果為何事耶宿者國也盟於其國則宿亦與焉意者其為宿盟乎觀宋人遷宿之事則宿之服屬於宋亦已久矣冬十有二月祭伯來祭者畿內之國也凡蔣邢茅胙祭皆周公之裔也特未知祭伯者亦公之後乎若是則與魯親矣書來者見祭伯之自出非有王命也今年之秋天王使宰咺歸賵於魯未幾而祭伯來必非王命也來者來朝也其不言朝者何也畿內諸侯不當朝於列國蓋內外尊卑之分所當然也祭或稱公或稱叔其稱公者嘗受命為三公其稱叔者未受爵者也公子益師卒二年春隱公在位十有一年獨元年書春王正月餘十年不書正月說者曰隱十年無正隱不自正也古者諸侯受正朔於天子故月正元日朝正於廟隱不書正自謂居攝不行朝正之禮故也隱公十年不書正桓公十四年不書王二年不書秋冬此又春秋言外之深㫖也按此條講義永樂大典原本在十一年十一月經文下今移正公㑹戎于潛古者戎狄種落間與中國雜處近於魯者為徐戎多為魯患當伯禽之時徐戎並興東郊不開伯禽至於治戎器以伐之具版築以備之今也隱公與戎㑹于潛左氏以為修惠公之好魯與戎好其來久矣未幾復盟於唐至於桓公盟唐再書戎魯會盟遂為故事夫戎狄非盟㑹可結也莊公之時親追戎於濟西盟果何益哉春秋安得不謹而志之書及盟者魯公之志也夏五月莒人入向按左氏莒子娶於向向姜不安莒而歸故莒人入向夫婦之不諧正家之道未至也何至以干戈相向入之為言不順之辭也造人之國都幾有其地矣觀宣公之時伐莒取向則知向為莒之邑久矣不知入向之後莒何時復取之以為莒邑耶大要書入者雖未至盡有其地然既入之後日侵月削積久而取之者亦多矣無駭帥師入極無駭者展無駭也何以不氏未賜族也其稱帥師者將尊而師衆也極小國也命將出師直入其國魯之怙彊亦甚矣自無駭入極之後終春秋之世極無聞焉意者卒見取於魯耶春秋之初小國尚多至於末年寂寥幾盡魯秉禮之國也取根牟取鄟取邿取鄫其所取者不止一國而况於諸侯强大者乎漢陽諸姬楚實盡之晉自武獻以下兼國多矣可勝嘆哉秋八月庚辰公及戎盟于唐九月紀裂繻來逆女冬十月伯姬歸于紀按戴氏所釋經文多從左氏春秋觀講義中亦稱裂繻可見婚禮人之大倫也為國君者合二姓之好以為宗廟社稷主故冕而親迎不以為重今也紀裂繻來逆女書於春秋傳者以為逆女當親行使大夫非正也是則然矣然考之昏義壻迎婦於其家御輪授綏三周而先歸俟於門外相去蓋不逺矣有如國君之尊逺適他國以行親迎之禮則國事少廢矣說者以為文王娶於莘莘之國在渭之涘故文王親迎於渭然文王是時為世子猶可以逺出也韓侯娶於蹶父之女韓侯迎止於蹶之里此諸侯親迎之禮也然蹶父為天子卿士韓侯入覲於天子故因迎於蹶里非專為親迎行也其理恐或然春秋內女適列國者多矣其事不盡書於春秋伯姬之歸紀其事甚可念也紀亡而伯姬不能葬使齊侯得以葬之故春秋書伯姬之歸於前又書伯姬之葬於後所以志伯姬之終始也紀子帛莒子盟于密紀子帛其義不可曉說左氏者曰子帛者紀裂繻之字也書外大夫於諸侯之上春秋無是也公穀二傳帛皆作伯義亦不通帛之一字非羡文則字誤也聖人存而不削史之舊文不敢改也十有二月乙卯夫人子氏薨鄭人伐衛按左氏叔段之亂段之子滑出奔衛衛人為之伐鄭取廩延鄭伯以王師虢師伐衛又請師於邾邾私於魯公子豫豫帥師㑹伐其事可謂重矣春秋削之而不書今兹復伐衛討滑之亂也夫鄭伯不容其母弟逐其弟及其子又不能容之於衛請師於王以伐之春秋以為王師之重非鄭伯所得用也故沒而不録觀鄭伯前日之所以伐衛者如此其重今兹再伐必非輕用微者春秋以鄭人書蓋貶鄭伯之無親也三年春王二月己巳日有食之春秋之法祥瑞不書有變異則書故日食書於春秋者三十有六凡日之食必書朔其不言朔者或在朔之前或在朔之後也說者謂日食之日隂陽有定數無與於災異是大不然隂陽薄蝕天道有虧代天作子適當天變惡可不恐懼修省以回天譴譬如父母有疾為人子者當引咎歸已請命于天庶幾父母之可安也三月庚戌天王崩夏四月辛卯尹氏卒按戴氏釋此一經獨從公穀見成十六年公㑹尹子昭二十三年尹氏立朝講義秋武氏子來求賻八月庚辰宋公和卒冬十有二月齊侯鄭伯盟于石門春秋書諸侯相盟始於密次則石門厥後瓦屋之盟則諸侯參盟之始也人愈衆則志愈分志愈分則盟愈不可信矣癸未葬宋穆公四年春王二月莒人伐杞取牟婁莒在春秋不得為大國前年入向固已甚矣今兹伐人之國取人之邑狃於前日之勝而忘其國之微無乃太甚乎書伐書取甚之也異時莒牟夷以牟婁及防兹來奔以不義得之以不義失之徒為叛人之資爾背義以求利果何益哉戊申衛州吁弒其君完夏公及宋公遇于清諸侯相與之禮有朝有聘有㑹有盟而又有遇禮焉遇之禮造次簡略有邂逅適願之意春秋謹而志之譏失禮也曲禮曰諸侯未及期而相見曰遇其簡略可知也宋公陳侯蔡人衛人伐鄭秋翬帥師㑹宋公陳侯蔡人衛人伐鄭按左氏衛州吁之立也使告於宋曰君若伐鄭以除君害君為主敝邑以賦與陳蔡從然則伐鄭之謀衛實先之春秋以宋公主兵何也州吁衛之亂臣賊子也衛人不以為君宋公怵於州吁之邪說帥師以伐鄭則是師也非宋公誰實主之書宋公於其上書衛人於其下聖人之深意也衛人者州吁也不與州吁之為君故以衛人書翬者公子翬也不書公子惡之也宋公請師於魯魯公不許公子翬固請帥師隱公之禍翬實為之怙彊專政有自來矣春秋之辭貴乎簡嚴不曰翬帥師㑹伐鄭而再書宋陳蔡衛者詳其辭所以甚其罪也九月衛人殺州吁于濮冬十有二月衛人立晉州吁之罪天子所當討也衛晉之立天子所當命也今也不然討有罪立嗣君皆出於衛人之意聖人直書之曰人言權之不出於上也州吁稱名晉不稱公子其辭嚴矣五年春公矢魚于棠左氏曰矢魚公穀曰觀魚矢之為言陳也陳魚而觀之其實一也說者謂矢魚者射魚也其說亦通靈臺之詩曰王在靈沼於牣魚躍言文王有仁德而其民樂之也使隱公知此意能與民同樂則民樂其有鳥獸魚鱉矣何至逺去國都陳魚而觀之禮失地逺春秋雨譏之夏四月葬衛桓公秋衛師入郕春秋之法將卑師衆稱師將卑師少稱人故衛師入郕與莒人入向書法不同郕衛同姓之國也衛君方立桓公始葬首興報復之師無乃太早計乎九月考仲子之宫初獻六羽仲子非惠之夫人故仲子既葬不祔於惠之廟隱公為仲子别立宫考者宫既成而祭之名也六羽者舞之名也舞者執干而舞謂之武舞執羽而舞謂之文舞天子之舞用八人為一列凡八列共六十有四人故總名曰八佾魯僭用天子之禮舞八佾於羣公之廟久矣今焉考仲子之宫不敢用八而用六故曰初獻六羽何以不言六佾婦人無武事故有羽舞而無干舞是禮也其隱公之失歟仲子既非夫人宫不當立祭不當舞原隱公之意欲立桓公為君尊其母為夫人故委曲遷就若此不知典禮之壞有以啓人之姦心異日之禍皆失禮有以基之也邾人鄭人伐宋左氏曰宋人取邾田邾人告於鄭鄭人以王師㑹之伐宋入其郛宋人使來告命公聞其入郛也將救之問於使者曰師何及對曰未及國公怒乃止邾附庸之國也是時未列於諸侯何以書於鄭人之上伐宋之謀邾實啓之鄭實輔之故以邾主兵也伐宋入郛宋不以實告故春秋書伐而不書入螟春秋於螽螟水旱皆書所以重農事也重農事所以愛民命也人君一念及此必不敢違天以病民矣冬十有二月辛巳公子彄卒宋人伐鄭圍長葛穀梁曰伐國不言圍邑說春秋者多用之其實未必然也伐人之國其事不一固有造其國都門焉而還者春秋當以伐書若築壘堙塹環而守之春秋豈得不以圍書若楚子圍鄭之類是也苟非造其國都而直圍人之邑春秋不先以伐書則未知其為誰之邑也今書伐鄭圍長葛者記事之體當然也宋鄭未有舊怨止因交兵之故結怨不已長葛之圍久而不去經一年之久不取不止春秋惡其黷兵書圍長葛於前書取長葛於後不待貶而罪可見矣六年春鄭人來輸平按此條經文戴氏從公穀觀下講義中屢稱輸平可見左氏曰渝平公穀曰輸平渝之為言更也言更前之怨而為今之平也輸之為言納也言納今之欵以求平於我也其辭雖不同其義則一矣鄭人與魯有舊怨今焉既與宋人交惡懼魯之謀已也故易仇怨而為和平凡平者春秋之所喜也然鄭伯之意非出於真情異時歸祊假許田之事皆於此乎始故春秋謹而志之見鄭伯之為諼也夏五月辛酉公㑹齊侯盟于艾左氏曰始平于齊也隱公初與鄭平及今又與齊平可以為美矣然而齊魯鄭在春秋之初俱為大國苟能同心合力以撫鄰國則是平也君子與之自鄭人輸平齊人始平之後三國㑹於中邱者謀伐宋也㑹於時來者謀伐許也已而入許之師三國皆與焉摟諸侯以伐諸侯何取於平哉秋七月冬宋人取長葛非其有而攘奪之其名曰取長葛之圍志在必取罷民日久不遺餘力所謂宋殤公立十年十一戰而民不堪命者蓋如此其得禍也宜哉七年春王三月叔姬歸于紀叔姬者伯姬之媵也伯姬歸於紀在隱之二年今叔姬始歸何也待年於國也易曰歸妹愆期遲歸有時象曰愆期之志有待而行也若叔姬者所謂有待而行者歟其書於春秋者為入於酅書也入於酅者叔姬之賢行也滕侯卒夏城中丘中邱魯之邑也魯方無事非有疆場之虞中邱不必城也就使當城夏之月非所當役也穀梁曰城為保民為之也民衆城小則益城益城無極凡城之志皆譏也蓋王公設險以守其國城郭溝池以為固先王所不廢也故民衆城小則可以益城苟不計民之多寡益城無極則凡城之志於春秋者皆譏也有如城其所不必城役其所不當役其譏益甚矣齊侯使其弟年來聘原注弟年來聘凡兩書一見桓公三年春秋書法其稱兄若弟者親親之禮當然也然而寵愛過則傷義刑罰加則傷恩隨事而觀褒貶見矣聘問之禮國有大夫兄弟之親何煩聘使有如行人失辭則國家不可屈法齊僖公寵其母弟故弟年來聘兩見於春秋異日無知之禍其亦寵愛之過歟秋公伐邾魯與邾為鄰國儀父始與隱公盟邾未嘗得罪於魯何為隱公親自伐邾不惟輕於用兵其自卑屈亦已多矣冬天王使凡伯來聘戎伐凡伯于楚丘以歸凡伯出使非有徒兵之衆戎人無道掩而執之直易事爾春秋何以書伐大天子之使也不書執而曰以歸避其名也左氏曰戎朝于周發幣于公卿凡伯弗賔楚邱之執凡伯固有以自取然天子之使則不可以不重也凡伯聘魯為戎所執魯方與戎盟不暇問戎之罪道過楚邱衛獨不能救乎戎不足責也魯衛之罪其又奚辭八年春宋公衛侯遇于垂昔也宋公魯侯遇于清今宋公衛侯遇于垂非禮之禮習而安焉尤而效焉不以為異也三月鄭伯使宛來歸祊庚寅我入祊古者天子有事於泰山諸侯之從祀者有湯沐之邑諸侯時朝天子故天子之郊有諸侯朝宿之邑焉祊者鄭湯沐之邑許田者魯朝宿之邑也周室既衰侯服不朝時巡不講故諸侯朝宿湯沐之邑皆廢而無用祊近於魯許田鄰於鄭鄭伯利在得許田未敢直取之魯故先使人歸祊以為異日取許田之地魯隱不悟其計受而有之故春秋書曰我入祊其曰我入者受而歸於已有德色焉大抵鄭詐而魯愚自鄭人輸平之後魯多墮鄭計而不自知曰輸平曰以歸者有卑遜屈下之義焉用見鄭伯之詐也按黃震日抄云趙鵬飛經筌謂魯要鄭而得祊以前此魯不救鄭也戴氏則謂鄭詐魯而歸祊以後此鄭假許田也二說不同而皆精於考究夏六月己亥蔡侯考父卒辛亥宿男卒秋七月庚午宋公齊侯衛侯盟于瓦屋諸侯之參盟始於此自時厥後聨合列國數㑹屢盟者何其多也可勝罪哉八月葬蔡宣公九月辛卯公及莒人盟于浮來入春秋以來莒人入向已而伐杞取牟婁頗有自大之意今兹魯公親與莒人盟人微者之稱莒彊魯弱益可知矣左氏曰以成紀好也向者紀莒二君嘗盟於密魯大國也何乃汲汲然與莒之微者盟乎螟冬十有二月無駭卒九年春天王使南季來聘天子之大夫例稱字隱公即位之初天王來歸仲子之賵於今九年聘魯者再隱公不惟不朝亦未嘗有報聘之使說春秋者猶以隱公為遜國之賢君賢者而若是乎春秋之法責臣子者重責君父者輕天子下聘於諸侯固失體矣諸侯未嘗報聘於天子如不臣何春秋未暇責周深責魯矣三月癸酉大雨震電庚辰大雨雪春秋紀天道之變上自日月星辰次及風雨雷電莫不具載蓋欲人君省災戒懼隂陽之差各以類應既有震電則不當雨雪蓋震電者陽氣發泄而雨雪者隂氣凝沍故也八日之間隂陽交錯其變甚矣挾卒夏城郎秋七月冬公㑹齊侯于防是㑹也魯與齊謀伐宋按左氏宋公不王鄭伯以王命討之來告於魯魯㑹齊於防明年㑹於中邱盟於鄧皆以伐宋故也夫奉王命以討不王此天下之大義也當特書於春秋防與中邱以常事書鄧之盟削而不書其故何也蓋春秋原情之書也隱公實以怒宋之故借公議以釋私憾春秋方以為罪又烏足以為義乎十年春王二月公㑹齊侯鄭伯于中丘夏翬帥師㑹齊人鄭人伐宋六月壬戌公敗宋師于菅辛未取郜辛巳取防魯去年之冬㑹齊于防今年㑹齊鄭于中邱合謀以伐宋亦已久矣曷為而夏五月公子翬帥師㑹齊鄭伐宋而公不與乎翬怙權自恣專命先行雖公不得而制也伐宋者齊侯鄭伯也而春秋以人書不與翬之㑹諸侯也六月公㑹齊侯鄭伯于老桃春秋削而不書敗宋師者三國之兵皆在焉取郜取防者鄭也而皆以我書何也蓋伐宋者非齊人之意魯怵於鄭齊逼於魯故也及其敗宋師取二邑齊不與其謀鄭人特歸於魯用見魯隱之愚鄭莊之詐推其利於魯而歸其罪於隱公隱公莫之悟是亦歸祊之餘智歟直書曰敗又書曰取春秋之意深矣秋宋人衛人入鄭宋人蔡人衛人伐戴鄭伯伐取之詳觀左氏所傳鄭人伐宋取其二邑師未反國宋約衛人乘虛入鄭鄭人還在郊宋衛之師不敢在鄭遂偕蔡人為伐戴之行鄭人掩其不備伐三國而取其師焉鄭莊亦巧於用兵矣春秋書三國伐戴於上書鄭伯伐取於下不言取三師焉其惡鄭伯之詐也明矣隱公十一年之中鄭莊用兵於諸侯者不一役甚矣鄭莊之佳兵也冬十月壬午齊人鄭人入郕左氏曰討違王命也鄭伯為王卿士借王命以討諸侯一則曰宋公不王二則曰郕違王命當時諸侯不知有天子者豈直二國而已哉異時蔡衛陳從王伐鄭其違王命也不亦大乎郕小國也昔年衛師入郕今焉齊鄭又入之弱小之國不能以自存若此亦可見王道之衰矣十有一年春滕侯薛侯來朝古者諸侯俱朝於天子於是有旅見之禮諸侯雖曰世相朝然兩君相見分庭抗禮安有旅見於庭哉滕薛與魯皆列國也來朝於魯固已卑矣隱公安得偃然旅見之連書滕薛譏其僭也夏公㑹鄭伯于時來秋七月壬午公及齊侯鄭伯入許古者諸侯相㑹非有天子之事則有四方之禁也春秋以來凡諸侯之㑹大抵為伐國設也時來之㑹謀伐許也乘三國之力而直造人之國都言其甚易也向也三國伐宋魯取其邑今也三國入許鄭有其地齊皆無與焉然而伐宋入許之師皆以齊先鄭何也齊在當時最為大國魯鄭非假齊之力未能必勝也聖人探其事而書之則罪有所歸矣按左氏鄭伯入許既有其地春秋不以滅許書蓋鄭伯處許叔于許西偏後十五年許叔入于許則許既復國矣故春秋書入不書滅冬十有一月壬辰公薨桓公元年春王正月公即位人君踰年即位故於元年之春行即位之禮春秋從而書之然而春秋之法繼故不言即位隱公鍾巫之禍桓公實為之則桓之繼隱是繼故也何以言即位桓公志在得國諱隱公之故偃然行即位之禮春秋即其實而書之所以原其情而重其罪也三月公㑹鄭伯于垂鄭伯以璧假許田夏四月丁未公及鄭伯盟于越鄭莊公自歸祊之後志在許田久矣久而未言固將有待也一旦桓公嗣位得罪於諸侯莊公乘其恐懼迫脅而取之然而莊公多詐非曰直取之也以璧而暫假之也夫天下之物直假於人謂之假以物相易謂之易今以璧易田而名之曰假諱易地之名而託辭於假此莊公之詐也㑹于垂以謀之盟于越以固之其為許田之計也密矣秋大水冬十月二年春王正月戊申宋督弒其君與夷及其大夫孔父滕子來朝隱公十一年書膝侯來朝今而曰滕子何也說春秋者謂時王所黜也夫周王之賞罰不行於諸侯久矣豈能黜滕侯之爵以為子乎先儒謂其在喪故曰子終春秋之世稱子豈其皆有喪乎又言桓公得罪於王法滕首朝之故貶而書子是則然矣後之稱子者獨何罪乎大抵春秋之諸侯其輕重皆自為之小國有爵尊而貢重者多自貶黜以從其卑若杞侯之或稱伯或稱子之類是也春秋從而書之不沒其實也按黃震日抄取戴氏此論又云自貶之說朱子主之以子産爭承為證三月公㑹齊侯陳侯鄭伯于稷以成宋亂夏四月取郜大鼎于宋戊申納于大廟何謂郜大鼎是鼎也郜實為之宋嘗取之鼎雖在宋猶郜鼎也宋取之郜魯取之宋則是鼎為諸侯所重久矣華氏之亂魯柦公與諸侯㑹於稷以成之亂可治也其可成耶書成亂於前書取鼎於後不待貶絶而惡自見矣然而宋以鼎賂公春秋不書賂而書取嚴其事而正其罪也大廟者周公之廟也取其鼎而薦之大廟周公其受之乎納之為言義弗受也秋七月杞侯來朝杞夏后氏之後其爵稱公今稱侯者杞弱而以侯禮至也七月來朝九月見入魯之無道甚矣亦杞之卑弱有以自取之也蔡侯鄭伯㑹于鄧三國為㑹始懼楚也入春秋之初楚最先稱王其彊可知矣此三國者地與楚近先有懼心焉未幾而楚滅鄧久之而楚復滅蔡鄭雖僅存異日牽羊之逆鄭亦幾亡矣然楚雖無道隨侯懼而修政楚不敢伐其後子産相鄭執玉帛以抗楚而楚亦不能加焉弱小之國能自彊於政治猶可以自保三國之㑹徒有懼楚之心而無自彊之實春秋惜之九月入杞公及戎盟于唐冬公至自唐隱公嘗與戎盟於唐桓復行之修故事也然隱不書至而桓書至何也為其告至於廟而後書耶凡君行告至於廟禮之常也隱獨不告至耶春秋之法㑹而不至者安之也㑹而書至者危之也桓公得罪於王法亦戎之所得問也使戎人思隱公之盟問隱公之事則桓公是行也豈不甚危乎危其往所以幸其歸也三年春正月公㑹齊侯于嬴春秋之法加王於正月之上其正月無事則二月三月亦然桓公即位十有八年稱王者四不稱王者十有四原注元年稱王二年稱王十年稱王十八年稱王桓公得罪於王法天子之所當討也元年即位至於二年而天討不加聖人猶有待也三年之久而王法卒不行焉聖人曰是終無王矣於是稱正月而不稱王數周於十不可無王故十年復書曰春王正月猶建亥之月六隂用事不可以無陽故十月稱為陽月也十有八年桓公於是終矣烏可以無王哉故復書曰春王正月聖人誅亂臣賊子之意既嚴而扶持王道之意尤切焉魯之與齊婚姻之國也魯娶於齊非一公也獨文姜之婚載於春秋甚詳其曰㑹于嬴者謀婚於齊也公子翬如齊者逆女也送姜氏于歡者齊侯也㑹齊侯于歡者魯公也姜氏既至致夫人者齊侯之弟仲年也自㑹嬴而至於成婚何其為禮之厚也春秋備書其事辭繁而不殺深惡姜氏之亂由齊侯寵愛之大過桓公之禍亦有以自取焉爾夏齊侯衛侯胥命于蒲春秋之法㑹而為盟者陳牲㰱其血為載書而要諸神堅守誓約不敢違越今也齊衛二君胥命于蒲牲不㰱書不載彼此相諭謹言而退此春秋所無有也二百四十二年之間胥命之書止此而已故曰春秋惡屢盟善胥命六月公㑹杞侯于郕魯入杞杞求成於魯故㑹杞侯于郕甚矣杞之可念也桓公之時杞侯來朝歸而見入左氏曰杞不敬也僖公之時杞子來朝歸而見入左氏曰杞不共也夫杞行朝禮卑遜有餘豈其不敬不共自貽憂禍良由微弱之國不能備禮貢獻有闕貽怒於魯身雖行禮而不免見伐于人尤可念也比事而觀春秋抑彊扶弱之意可見矣秋七月壬辰朔日有食之既既之為言盡也日之食也由陽氣之微也日食有多寡之殊則陽氣之微有輕重之異今也食而至於盡幾于無陽矣故日食一也正陽之食比于他月尤重謂陽氣之甚微也公子翬如齊逆女九月齊侯送姜氏于歡公㑹齊侯于歡夫人姜氏至自齊冬齊侯使其弟年來聘有年春秋二百四十二年其有年亦多矣苟其無年民何以生獨桓公書有年宣公書大有年豈羣公皆無年耶曰非也桓宣二君得罪於王法天道所不恕也即其戾氣所感宜降之罰饑饉薦臻天道不僭矣然而民何辜焉幸其有年喜而書之此聖人助天愛民之意四年春正月公狩于郎四時之田惟冬狩為盛蓋農隙之時不至於踐傷禾稼兼肅殺之後萬物衆多非三時比也正月而狩非其時矣于郎之逺非其地矣夏天王使宰渠伯糾來聘宰冢宰也渠國也伯爵也糾名也天子之上士書名今渠伯以畿內之君為天子之冢宰何以稱名為其聘桓也桓公之罪天子不能討又從而聘之賞罰無章甚矣冢宰奉命來使詔王誅賞之權當如是乎書宰書爵以見其尊書名書來聘以見其罪待之尊者責之重也責之重者罪之深也桓公四年無秋冬春秋之法四時具然後為年故四時無事必舉首月獨桓公之時四年無秋冬七年無秋冬聖人之意傷矣桓公之罪天子不能討聖人固已不書王矣王法不能誅聖人豈無望於天乎越四年之久桓公假息如故既又三年而猶自若焉聖人曰天之道或幾乎息蓋賞以春夏刑以秋冬天之道也今天道失刑無秋冬矣此又聖人言外之意五年春正月甲戌己丑陳侯鮑卒夏齊侯鄭伯如紀二國同時朝紀本以襲紀也紀人知之故因以如紀欺諸侯春秋從其告而書之蓋不如是則無以顯其詐也書如紀於前書紀侯去國於後二君之情不可得而掩矣天王使仍叔之子來聘王者不忘大臣之德故仕者世祿詩人賢之不以官職私大臣之親故官人以世君子罪之天子聘問於諸侯當擇賢而行豈得使其大夫之子且父在而子代任其將何稱故書曰仍叔之子其名字不獲載於春秋求名而名亡垂戒逺矣葬陳桓公城祝丘秋蔡人衛人陳人從王伐鄭此聖人之特筆也鄭伯不朝天子親行討罪三國從焉聖人書蔡衛陳三國從王伐鄭見諸侯擁衛天子以行天討天子甚尊諸侯甚微鄭伯無所逃罪矣如左氏所載戰於繻葛王卒大敗春秋不以戰書不可言也戰不可言况於敗乎敗績於茅戎猶可言也敗績於鄭其可言乎王不言天褒貶之意略寓其間矣大雩禮記月令仲夏之月天子雩帝用盛樂謂之大雩諸侯雩境內之山川而已蓋雩者祈雨也先事而祈王者重農之意也原注常祀祈雨者謂之雩遇旱而祭者亦謂之雩傳者專以雩為旱祭特知其一爾魯僭用天子之禮故大雩郊禘率與天子同使春秋悉書之將不勝其書也故因事而書以示戒也今大雩之所以書者非時也夏當雩而秋行之時已晚矣凡書大雩者其義同螽冬州公如曹州公者天子畿內之諸侯嘗為三公者也外相如不書於春秋此何以書左氏曰淳于公如曹度其國危遂不復此奔也以如告於魯春秋傷之畿內諸侯不能自存逃於他國此春秋之大事也安得而不書六年春正月實來按三傳皆以實為州公之名按左氏曰書曰實來不復其國也杜氏注曰實實也不言州公者承上五年冬經省文公羊曰猶言是人來也穀梁曰是來也皆不以實為州公名來者來朝於魯也州公失國故名之不言朝者不與其朝也春秋書此以為失國者之戒夏四月公㑹紀侯于成齊侯有圗紀之心紀人懼而咨謀於魯當此之時魯與齊紀婚姻之國也紀侯告情於魯求成於齊必可得也今也既㑹之後復朝於魯欲請王命以求成於齊情意懇切而桓公恬然不顧受紀之朝卒無救於滅紀之禍夫親仁善鄰救災恤患賢者之事也桓公豈其人乎求非其人秖無益耳秋八月壬午大閲仲冬教兵名曰大閲既閲之後因以田狩故冬之田名曰狩桓公四年嘗狩于郎今年復行大閲之禮蓋前日之狩止於田獵而已未嘗有所閲也兹焉大閲選徒簡車其禮盛矣夫大閲者非諸侯所得為也况以秋八月行之故春秋因其失時以垂戒焉蔡人殺陳他陳他得罪於其君奪其國而有之國人不以為君觀墓門之詩指以為梟則國人之情可知一旦蔡人取而殺之如盜賊然書蔡人者討賊之辭也以討賊與蔡人其不能討者罪有所歸矣九月丁卯子同生春秋十二公惟莊公為嫡夫人長子桓公以太子生之禮舉之故得書於春秋此義明則嫡庶之分辨矣冬紀侯來朝七年春二月己亥焚咸丘焚咸邱者焚林而田也古者昆蟲未蟄不以火田仲春之月蟄蟲已啓萬物孳生豈容以火田耶桓公不仁亦已甚矣夏穀伯綏來朝鄧侯吾離來朝諸侯不生名穀伯綏鄧侯吾離何以名朝於桓公故貶之也去年紀侯來朝何以不貶紀有亡國之憂不得已而朝於魯穀鄧未嘗通於上國一旦無故來朝惡得不貶故曰春秋原情之書八年春正月己卯蒸天王使家父來聘桓公即位八年矣天子之使三至於魯周之無政魯之不臣不亦甚乎家父何以無譏宰渠伯糾既以名書於前仍叔以下無譏焉譏之將不勝譏從其初也責及冢宰大夫無與此又春秋正本之意也夏五月丁丑蒸蒸之為言衆也冬祭曰蒸故四時之祭冬祭為盛言萬物之衆多也春正月蒸已非時矣况五月而又蒸乎失時黷禮聖人譏焉按程端學春秋或問云釋書再蒸之義戴氏最善秋伐邾伐邾不言其人微者也向焉隱公嘗親伐邾故以公書今焉伐邾雖大夫不行益又卑邾矣其後僖公卑邾而不設備遂有升陘之敗匹夫不可輕况國乎按黃震日抄謂戴氏此說可為鑒戒冬十月雨雪孟冬之月隂氣始凝驟有雨雪隂氣盛也按黃震日抄云諸家多以冬十月為今之八月戴氏獨以夏正言之理亦未嘗不明知聖人之不書秋為冬矣祭公來遂逆王后于紀公羊曰使我為媒可則因是往逆故祭公之逆后春秋以遂書夫婚姻重事也先期未嘗告諸紀一旦祭公來使魯為媒而遂逆之揆諸人情不應率略若此天王下婚於紀計已有成約矣祭公至魯遂往逆后此天王之命非祭公自為之也紀魯甥也祭公過魯咨謀於魯而行則有之矣使魯為媒而遂逆后無是理也按黃震日抄云戴氏此說以情言過於諸家之專主譏詆者九年春紀季姜歸于京師諸侯之女歸于京師亦多矣而紀季姜獨書因祭公之來季姜之歸魯實與聞之非他王后比也方其逆也稱曰王后由王命言之也其歸也稱以季姜由父母家言之也按程端學春秋或問云此史氏立言之法戴氏最得其意夏四月秋七月冬曹伯使其世子射姑來朝來朝諸侯之事也世子不得而行之射姑之來曹伯實使之於是失正矣曹伯何以使其世子來朝當食而射姑歎逾年而終生卒意曹伯將託其子於魯乎不然何其急也射姑承父命而行朝禮幾於僭矣魯以待國君之禮待人之子幾於屈矣三者咸譏焉十年春王正月庚申曹伯終生卒夏五月葬曹桓公秋公㑹衛侯于桃丘弗遇㑹之為言彼此有成約矣此往㑹而彼不來非有他故則中變而背約爾今也魯㑹衛侯而弗遇衛背約也春秋何以弗遇書弗內辭也若曰彼之來也我弗與遇則其為辱不在我矣此春秋存魯之意也冬十有二月丙午齊侯衛侯鄭伯來戰于郎春秋諸侯加兵於魯或侵或伐或圍春秋即其實而書之未有言來戰者今而曰來戰于郎何也齊與魯為婚姻鄭以許田之故與魯相好今年之春衛侯與魯約㑹於桃邱一旦以鄭忽怒魯之故相與率師來戰人之稱斯師也其諸無名之師歟春秋惡之直書曰來戰如入無人之境若曰魯不受兵而三國自為戰爾左氏曰我有辭也其義得之主兵者鄭也何以首齊齊人以鄭忽有功之故忘婚姻之好合師以伐魯齊侯之罪也使齊侯遜辭以謝鄭則必無來戰之師矣十有一年春正月齊人衛人鄭人盟于惡曹三國之師以去年十二月來戰於郎今年正月三國之人盟于惡曹相去甚邇故說者謂是盟也三國之君在焉貶而稱人是固然矣然三國之君迫嵗而歸留其大夫使為此盟亦未可知也三國來戰已無名矣既戰之後復為此盟其意欲以謀魯也向使鄭莊無恙魯之被患猶未已爾貶而書人春秋之意可見矣夏五月癸未鄭伯寤生卒秋七月葬鄭莊公九月宋人執鄭祭仲突歸于鄭鄭忽出奔衛祭仲鄭之相也命大夫故不名鄭莊為王卿士故其臣得請命於天子以為大夫夫以大夫而為國相宋人得誘而執之其為人不足憚矣宜於廢忽立突制命於宋而莫敢爭也突公子也其不稱公子者言突之不當立也鄭忽未踰年之君也其以國氏者言忽之當有鄭國也突歸而忽去一出一歸無難辭焉用見權臣之專制舉國聽命而不敢違也釋春秋者猶以祭仲為賢豈其然乎柔㑹宋公陳侯蔡叔盟于折柔者魯大夫之未賜族者也春秋之初猶有如無駭翬挾柔者其後周室益衰列國之大夫自專故無未賜之族矣桓公方得罪於齊衛鄭今將與三國為好而以大夫盟其君可乎公㑹宋公于夫鍾冬十有二月公㑹宋公于闞夫鍾與闞之㑹傳者不言其故以穀邱虛龜之盟觀之知魯之欲平宋鄭也以紀鄭之戰觀之知宋人之責賂於鄭也意者宋人立突之後責賂於鄭鄭不能如宋所欲故宋鄭有隙魯將平之故數與宋㑹宋公不厭其欲故辭平於魯魯以故怒宋率鄭與宋戰已而鄭人不堪復與宋戰其本末當如此按程端學春秋或問云觀經文此說未可據突之入於鄭義所不當立也宋人責賂於鄭魯所不當與也身負不義而欲黨不正之人春秋惡其以亂治亂詳書其事而桓公之罪顯然矣十有二年春正月夏六月壬寅公㑹杞侯莒子盟于曲池說春秋者謂是盟也以平杞莒隱公四年莒人伐杞取牟婁至今始平魯之功也秋七月丁亥公㑹宋公燕人盟于穀丘八月壬辰陳侯躍卒公㑹宋公于虛冬十有一月公㑹宋公于龜丙戌公㑹鄭伯盟于武父丙戌衛侯晉卒十有二月及鄭師伐宋丁未戰于宋魯數與宋盟㑹欲平宋鄭宋公辭平故桓公怒而與鄭盟共謀伐宋夫魯之平宋鄭非也宋人之辭平亦非也兩國各懷其私心不得所欲怒而至於伐伐而至於戰春秋之法戰者不言伐今戰伐並書何也惡宋魯之爭也書及而不言其人書伐而復言其戰皆所以惡之也十有三年春二月公㑹紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績左氏曰宋人責賂於鄭鄭不堪命故主乎是戰者鄭也公羊曰得紀侯鄭伯然後能為日則主乎是戰者魯也穀梁曰其不地於紀也則主乎是戰者紀實為之也三者之說宜何從先儒以為內以紀為首外以齊為首則齊紀之事於三說為勝是固然矣然合謀以伐人者非先有釁隙則其謀不合齊欲滅紀紀安得而不自救乎宋多責賂於鄭鄭安得而不怒乎魯與齊衛有戰郎之怨於宋有辭平之嫌故自相糾合以營其私然大要齊紀之爭為多紀不度德不量力而欲徼幸於一戰之問齊雖敗績紀終不免於亡由是知浪戰之無益也三月葬衛宣公夏大水秋七月冬十月十有四年春正月公㑹鄭伯于曹無冰七月之詩曰二之日鑿冰沖沖三之日納于凌隂四之日其蚤獻羔祭韭左氏曰古者日在北陸而藏冰西陸朝覿而出之此二說者皆藏冰之道也然而微有不同二之日者今十二月也三之日者今正月也如是則十二月取冰正月藏之左氏所謂日在北陸而藏冰蓋十有二月也四之日者今二月獻羔祭韭所以出冰也如是則二月固出冰矣左氏所謂西陸朝覿而出之也者今三月也藏冰先一月而出冰後一月雖早晚不同大要十二月取冰且取且藏至正月而畢二月出冰出而未用至三月而後用之其實一也今桓公春書無冰者無藏冰也去年十二月時燠而無冰今年之春無冰可出春秋於是時而書之夫藏冰之用亦重矣朝之祿位賔食喪祭下至老疾無不受冰一嵗無冰為害滋甚不惟此也藏冰不時隂陽失節風不越而殺雷不發而震菑霜雨雹莫之能禦其為害也大矣春秋安得不謹而書之按程端學春秋或問云月令季冬冰方盛水澤腹堅命取冰周禮正嵗十二月令斬氷即詩所謂鑿冰沖沖者也十二月無冰可鑿來年春遂無冰仲尼録之以見人事縱弛夑理失道則冬行春令當寒而燠是以萬物失宜疫癘將作若十一月無冰則十二月猶有冰可鑿何害於事而書之哉以此言之可為三代不改月數之證戴氏謂書無冰於正月謂無藏冰義有未盡特識見正大逺勝諸說考戴氏本主夏正立義而程氏推闡尤暢故附録焉夏五夏五之必有月衆人所共知也夏五而不書月聖人所不敢增也由聖人之筆削而不敢增衆人之所共知其不如聖人者乃欲增改疑似之闕多見其不知量也鄭伯使其弟語來盟魯公既以宋為怨故一意與鄭為好既㑹鄭伯于曹越數月鄭又使其弟來盟何謂來盟魯與諸侯盟約既定不親相為盟內遣大夫往盟於彼謂之涖盟外遣大夫來盟於此謂之來盟夫盟國之重事也親自為盟猶懼不信而况遣大夫以盟乎大夫猶不可而况遣其弟以行乎秋八月壬申御廩災乙亥嘗古者天子諸侯親耕籍田取其米藏之御廩以供粢盛今焉魯之御廩災則御廩之藏煨燼之餘也三日之間遽行嘗祭君子謂未易災之餘而嘗志不敬也火戒不䖍時祭不敬春秋並譏之冬十有二月丁巳齊侯祿父卒宋人以齊人蔡人衛人陳人伐鄭宋人責報於鄭怒猶未息故復借四國之師以求多於鄭此春秋之所惡也其書以者何也夫諸侯合兵以伐人各聽命於其主故有同於伐國獨不欲戰者非主兵所得制也今而書以者謂列國帥師以從左右前後惟主兵所用而不敢有二焉其為謀也專矣其為力也大矣此尤春秋之所深惡也以諸侯而從天子制命於一人可也糾合列國而聽命於諸侯其為僭也不亦甚乎十有五年春二月天王使家父來求車古者天子錫有功諸侯於是有車馬之賜故在詩曰何以贈之路車乘馬未聞天子求車於諸侯也昔者夫子正取假之名於季氏今天子責貢於諸侯而書之曰求何也王室微弱諸侯彊大即求車一事觀之則庭實之貢其不至久矣不書求則無以知王室之日卑而諸侯久無所貢也直書其實不避其名責諸侯也三月乙未天王崩夏四月己巳葬齊僖公五月鄭伯突出奔蔡鄭世子忽復歸于鄭諸侯不生名失地則名突之入五年矣故稱鄭伯其名者失地故也鄭忽之立才四月爾未成其為君故書鄭忽出奔衛及其入也稱世子稱復歸明忽之當立也突之出奔未及數月復歸于櫟稱突稱入者明突之不當立也自是而後稱鄭伯者皆突也忽雖立為君不通於諸侯亦可以見忽之弱而突之彊矣許叔入于許公㑹齊侯于艾隱公末年魯與齊鄭同入許鄭莊公據許而有之莊公既卒鄭國方亂許叔者許侯之弟也自許東偏復歸于許向也魯齊二國同為伐許之謀今焉自知其非復為定許之㑹聖人許其能改過矣許叔何以稱入內無所因外無所自獨以其力復其國都其難若此故稱曰入邾人牟人葛人來朝列三國而稱來朝旅見故也邾牟葛三國雖至微小然桓公非所當朝也旅見非所當謀也貶而稱人言其至微而不足責也秋九月鄭伯突入于櫟冬十有一月公㑹宋公衛侯陳侯于袲伐鄭春秋之法地而後伐者疑辭也于袲伐鄭于棐林伐鄭于召陵侵楚是也伐鄭之師助突而伐忽也助突伐忽于理不順于心有愧疑而未敢前故地而後伐也十有六年春正月公㑹宋公蔡侯衛侯于曹夏四月公㑹宋公衛侯陳侯蔡侯伐鄭秋七月公至自伐鄭鄭突以不義得國王法所不貸也諸侯合謀以伐鄭將以助突也始焉㑹于袲猶有所疑而後伐今焉㑹于曹定其謀而再伐同惡相濟不遺餘力春秋詳書其事則舍順助逆之罪不待貶絶而自見矣去年伐鄭不書公至今兹書之何也春秋之法書至者危之也不義之師連年不已此危道也冬城向十有一月衛侯朔出奔齊朔之立也不以其正內得罪於國人天子召而不往且不能使衛小衆又得罪於天子失地出奔惡得而不名十有七年春正月丙辰公㑹齊侯紀侯盟于黃紀侯之事迫矣娶于魯結婚於王室借助於諸侯而與齊師戰假寵於魯公而與齊侯盟皆不能回齊侯之心以紓滅國之禍春秋詳書其事紀為可哀而齊為大可罪矣二月丙午公㑹邾儀父盟于趡隱公初年曽與邾儀父盟于蔑其後躬自伐邾春秋固已非之桓公之時邾復來朝邾儀父復與桓公盟于趡其事魯之禮亦至矣盟未數月魯與宋衛伐邾何其無信義若此也春秋書及宋人衛人伐邾不言其人隱之也儀父自是以後得列于諸侯春秋遂以邾子書終春秋之世數數與魯戰爭一勝一負迭為客主推原所自實隱桓有以基之夏五月丙午及齊師戰于奚齊侵魯疆疆吏來告桓公有命事至而戰若是則奚之戰疆吏為之也書及而不書其人微之也疆場之爭一彼一此春秋備書于策重兵爭而惜民命也六月丁丑蔡侯封人卒秋八月蔡季自陳歸于蔡按左氏蔡桓侯卒蔡季自陳歸于蔡杜預曰桓侯無子故召季而立之及莊公十年荆敗蔡師于莘以蔡侯獻舞歸杜預曰獻舞即蔡季也先儒以為不然曰蔡季自陳歸然獻舞已立矣蔡季力足以得國而不有故春秋賢而字之然則蔡季之歸與季子來歸其事正同此二人者皆其國之賢國人欲其歸故春秋亦從而嘉之稱歸稱來歸者雖易辭也亦喜辭也癸巳葬蔡桓侯及宋人衛人伐邾冬十月朔日有食之十有八年春王正月公㑹齊侯于濼公與夫人姜氏遂如齊按左氏曰㑹齊侯于濼遂與姜氏如齊則是㑹也公與夫人俱既㑹之後因以如齊春秋當書曰遂與夫人姜氏如齊今再書公又曰與夫人姜氏匹敵而並書之見文姜之抗桓公不得而制也春秋書法嚴矣哉夏四月丙子公薨于齊丁酉公之喪至自齊秋七月冬十有二月己丑葬我君桓公欽定四庫全書春秋講義卷一下宋戴溪撰莊公元年春王正月莊何以不言即位桓公不得其終莊公不行即位之禮故也三月夫人孫于齊內諱奔曰孫不稱姜氏者絶之也如公榖所言夫人固在齊久矣莊公接父之練録母之變於是有念母之心焉故春秋探莊公之心而書之其說恐未必然桓公之喪歸自齊姜氏必與之俱久而不安於魯故逃歸于齊春秋即實而書明示大義非由莊公念母之故也夏單伯送王姬秋築王姬之館于外杜預注左傳稱單伯為天子卿公榖稱單伯為魯之大夫也故稱逆王姬以魯事考之魯無單伯其為周之卿明矣古者天子嫁女於諸侯使諸侯之同姓者主之謂之公主今也天子使卿送女至魯俾魯主之以嫁于齊魯築館以待之禮記所謂由魯嫁是也春秋書送王姬築王姬之館王姬歸于齊明年書王姬卒詳書其事若此何也魯之與齊有不共戴天之讎况莊公方有三年之戚天子不當使之主婚魯亦不當主婚于齊此禮之大失君臣皆不得其正矣冬十月乙亥陳侯林卒王使榮叔來錫桓公命錫命有二有生而錫者若平王錫晉文侯是也有既死而錫者若榮叔來錫桓公命是也生而褒寵其功以䇿命之死則褒贈共功以追䇿焉生榮死哀所以為諸侯之勸也今也魯桓公得罪於王法生不能討死又追命之所謂天命有德天討有罪宜不若此王不書天失天道矣王姬歸于齊齊師遷紀郱鄑郚齊侯志在滅紀不滅不止故先遷紀之三邑遷之為言徙其民而虛其邑也三邑既虛則紀國之勢孤矣用師而遷邑言齊之逼紀也齊之於紀亦虐矣二年春王二月葬陳莊公夏公子慶父帥師伐於餘丘公羊曰於餘邱者何邾婁之邑也曷為國之君存焉爾誠如是也則於餘邱者邾之國都也春秋何不直以伐邾書乎杜預注曰於餘邱國名也然而於餘邱之為國諸夏未有聞焉意者東夷之小國乎稱公子慶父帥師言其將尊而師衆也以貴將重師伐一小國然則於餘邱亦已彊矣按程端學春秋本義引戴氏云孟氏之孽基于此永樂大典失載秋七月齊王姬卒冬十有二月夫人姜氏㑹齊侯于禚前者夫人孫于齊未有復歸之文一旦遽與齊侯㑹于禚何也姜氏歸矣春秋不書明國人不與其歸也以夫人而㑹諸侯豈當書於春秋文姜之事人倫之變也曰㑹曰享特書而不貸有不容以常理論者觀敝笱之詩言齊子歸止其從如雲其從如雨則魯之臣子豈得為無罪哉乙酉宋公馮卒三年春王正月溺㑹齊師伐衛溺不稱氏未賜族也齊讎國也衛同姓也㑹仇讎而伐同姓不待貶而見矣左氏曰疾之也疾溺者所以疾魯也夏四月葬宋莊公五月葬桓王秋紀季以酅入于齊紀季者紀侯之弟也酅者紀季之邑也自齊師遷紀三邑之後紀不可以為國矣紀季知紀之將亡也以酅入齊奉幣而委質焉請後五廟以存姑姊妹其辭亦可哀矣春秋原情之書也季不書名哀之也冬公次于滑公次于滑欲救紀而卒不能也自桓公以來數數謀紀卒無尺寸之功今也紀之亡已形而勢已迫矣豈次滑所能救哉莊公特不過借此名以自欺非真欲救紀也春秋不書救紀而止書次滑亦原情之意也四年春王二月夫人姜氏享齊侯于祝丘甚矣文姜之惡也始焉孫于齊猶有所愧中焉㑹齊侯已無所懼終焉享齊侯于祝邱其無忌憚益甚矣犧象出門嘉樂野合偃然用盛禮于十手十目之地蓋不但疾驅于通道大都而已榖梁曰饗齊侯所以病齊侯也齊侯不足病也享齊侯所以病魯侯也三月紀伯姬卒夏齊侯陳侯鄭伯遇于垂紀侯大去其國六月乙丑齊侯葬紀伯姬桓公五年齊侯鄭伯如紀欲襲紀而不能自後齊人謀紀幾二十年至是與陳侯鄭伯遇于垂固將以入紀也紀侯度不能自全故一旦大去其國大去者棄其國之所有盡室而逃焉紀侯二十年間謀所以存其國不遺餘力卒不能回齊人滅紀之念則未知其大去之後其諸人民之從者久而不忍去歟抑亦逃奔于無人之地假息以偷生歟不然則歸酅奉祭祀以終其身歟其事可矜其情可哀矣書紀侯而不言其名哀之也按程端學春秋或問云戴氏此說即本公榖而少變者春秋謹嚴書去其國書矣何必書大去哉于文為支矣苟紀侯盡室逃焉則必葬伯姬而後去擕叔姬以偕行今棄伯姬而齊葬之棄叔姬而歸于酅于義為窒矣大者紀侯之名非大去之謂按程氏之說本于伊川可以參考紀侯之去似太王之去邠而無太王之德紀季以酅事齊如微子之適周而不遇武王之聖此其所以可嘆也齊人志在滅紀使其出師以伐之紀固不能支也而用計深密遷延若此其故何也託復讎以為名曰吾非利紀而有之也讎恥不復齊紀並存將無以自立於世故日夜迫紀使其不能以自存而自去焉則吾有辭於天下以此欺諸侯故諸侯坐視而不敢救又從而助之不特此也存紀季葬伯姬不窮追紀侯縱其自去皆所以欺諸侯而掩其罪也秋七月冬公及齊人狩于禚夫人姜氏享齊侯莊公不能制猶曰迫於母之命也公及齊人狩於禚獨不可已乎莊公有威儀技藝詩人曰終日射侯不出正兮今也與齊人狩嫻於騎射曾是以為樂乎興念及父凡有人心者宜於此焉變矣春秋書及者明是狩也出於莊公之志與公狩者齊侯也共曰齊人何也與齊人狩猶可也與齊侯狩可乎五年春王正月夏夫人姜氏如齊師齊侯出師在外姜氏往㑹之故春秋書曰如齊師婦人在兵間施面目於三軍之中豈容以人道責哉秋郳犂來來朝郳者何夷狄之附庸也與介葛盧相類故皆以名書焉邾儀父以中國之附庸自附於諸侯知有盟㑹之禮故其後受王命得稱為邾子今郳以夷狄之附庸自附於中國知有朝聘之禮故其後受王命得稱為小邾子禮之有益於人也大矣冬公㑹齊人宋人陳人蔡人伐衛魯桓公十六年衛侯朔出奔齊今兹伐衛者所以納朔也朔在齊故齊侯主之是時四國之君皆在焉不書爵而書人者惡其逆天王之命伐衛以納朔也榖梁曰人諸侯所以人公也其義得矣六年春王正月王人子突救衛夏六月衛侯朔入于衛春秋之法王朝之下士不書名其得書於春秋者曰王人今子突之書既曰王人矣又加之子突何也嘉其救衛而名之也何以嘉之天子之賞罰不行於諸侯久矣今衛朔得罪于天子出奔於齊亦既久矣一旦諸侯伐衛以納之天子出王人以救衛其事雖微其義則大子突書名大天子之命因以嘉子突也衛朔藉諸侯之力以入其國其歸也易爾春秋以入書之者言其理之不順也稱名者正其罪也秋公至自伐衛螟冬齊人來歸衛俘齊人曷為來歸衛俘齊為主乎是戰故衛朔既入國之後使齊為主分俘獲於諸侯也其書來歸者正齊魯之罪也伐衛而諸侯稱人救衛而子突稱名入衛而以衛朔書歸衛俘而以齊人書則諸侯之罪昭然矣七年春夫人姜氏㑹齊侯于防夏四月辛卯夜恆星不見夜中星隕如雨經星在天遇夜不見至於夜中星隕如雨其異甚矣夫星辰失行古或有此不見而隕何異如之天者積氣所為日月星辰麗焉故常與是氣流轉於其間今列星之隕衆多如雨則氣之消散可知矣春秋書此比他異為尤重秋大水無麥苗大水者隂氣之盛也秋大水則霖雨可知矣洪範庶徴有雨暘而無水旱蓋常雨則多水常暘則多旱矣莊公之時秋無麥苗冬無麥禾並書於春秋說者疑焉以為麥成於夏禾成於秋曷為以秋冬書夫無麥猶可也重以無苗無禾民何以食乎七八月之間雨而苗壞於水十月築場圃而納禾稼而禾且不登聖人於是時也併禾麥而書之記灾之甚也冬夫人姜氏㑹齊侯于榖春㑹于防猶魯地也冬㑹于榖則齊之地一嵗再㑹稔惡已極無知之禍行且及矣八年春王正月師次于郎以俟陳人蔡人甲午治兵夏師及齊師圍郕郕降于齊師秋師還以左傳考之自次于郎至于秋師還莊公皆在焉春秋始終稱師沒公而不書何也師者存亡所係也非有不得已之事輕于用師三時而後反危國亡師之本也春秋危其出而幸其歸不書公諱之也師次于郎何以俟陳人蔡人其諸陳蔡出師待其至而邀之歟抑亦有所約未至而待之歟以春秋書人書俟之意觀之知其有所約矣師次于郎猶未久也是月甲午即為治兵之舉用見公之倉卒出師既出之後始行簡閲何其急也至其及齊師圍郕也則未知先約齊師歟抑亦偶遇齊師以俱往歟以春秋書及之法觀之知圍郕者莊公之志也兩國之師同時圍郕郕降于齊而不降于魯魯人之愧不亦甚乎齊師方鋭魯師已老遷延日久不還何待引咎自歸其亦莊公之不得已也春秋何善焉冬十有一月癸未齊無知弒其君諸兒九年春齊人殺無知公及齊大夫盟于蔇夏公伐齊納子糾齊小白入于齊秋七月丁酉葬齊襄公八月庚申及齊師戰于乾時我師敗績九月齊人取子糾殺之冬浚洙公及齊大夫盟謀納子糾也是時齊無君與公盟者非止一人故以齊大夫目之公親與齊大夫結約而外以兵送子糾其歸特易爾良由小白先入其事中變故外拒魯師於是敗魯而殺子糾春秋書曰齊人取子糾殺之言魯人拱手聽命齊人取之猶一夫耳不惟此也退師之後方且浚洙以備齊其懷懼若此而欲納人於國宜其不濟也亂未作而小白入莒亂未定而小白歸齊鮑叔之知也亂既作而子糾奔魯亂既定而納子糾於齊魯則失時矣管仲其無謀乎十年春王正月公敗齊師于長勺公子糾者小白之兄也小白之立未定魯人伐齊而納之未為過也魯師既敗齊殺子糾亦可以已矣今兹帥師伐魯何其復怨若此也公用曹劌之䇿乘其三鼓之衰一戰而逐之不言戰而言敗者直敗之也魯之辭亦稍直矣二月公侵宋三月宋人遷宿魯隱公之初年求成于宋嘗與宋人盟于宿則宿者宋之與國也一旦宋人徙其國都驅其人民雖未至于滅國其服屬聽命之不暇亦幾于亡矣故春秋書遷者惡之也夏六月齊師宋師次于郎公敗宋師于乘丘莊公正月敗齊二月侵宋衆其敵以為國患故齊宋二師同次于郎將以伐魯也莊公乘其無備敗宋以拒齊魯雖不為直而齊宋二國帥師以次人之境亦取敗之道也秋九月荆敗蔡師于莘以蔡侯獻舞歸荆楚也自是始見于經其在殷武之詩曰奮伐荆楚采芑之詩曰蠻荆來威或稱荆或稱楚其來久矣至是稱荆者始以荆之名通于中國也其後改而從楚春秋因而書之猶於越之與越始以於越書而終以越書也其曰先書荆聖人狄之者非也自桓公二年蔡侯鄭伯㑹于鄧已有懼楚之心至是而敗蔡師于莘不勞兵力竟執蔡侯以歸告于中國以示強大自是而與中國爭衡矣名蔡侯所以著諸侯之失不言執所以抑楚人之暴夷夏之義兩得之矣冬十月齊師滅談談子奔莒齊桓公將以圖霸而首以無禮滅談不三年而又滅遂其用心之初已謬矣異時存亡繼絶特矯揉而為之爾齊桓反國以無禮滅談晉文反國以無禮侵曹伐衛霸者用心類若此况望其能以公滅私乎談子不書名滅非其罪也十有一年春王正月夏五月戊寅公敗宋師于鄑莊公狃於再勝之故未陳而薄宋師敗之于鄑宋之侵魯固已非矣魯之敗宋不亦甚乎屬辭比事其義見矣秋宋大水外灾不書此何以書宋人告灾魯人弔灾故得書於春秋冬王姬歸于齊原注莊元年王姬歸于齊襄公之夫人也今年王姬歸于齊桓公之夫人也王姬下嫁於諸侯亦巳多矣其書於春秋者魯主之也十有二年春王三月紀叔姬歸于酅紀侯去其國至是七八年矣不知紀叔姬從紀侯而出奔歟抑紀侯自去而叔姬不從歟其未歸于酅也與紀侯俱歟抑亦歸于魯歟其既歸于酅也其諸紀侯之已卒歟抑其尚在歟不然則紀侯有子其父既卒而率其子歸于叔歟是皆未可知也以春秋書法觀之既書其歸又書其卒又書其葬勤勤懇懇若有哀於叔姬者君子是以知叔姬之賢也按此可正師氏譏叔姬之說夏四月秋八月甲午宋萬弒其君捷及其大夫仇牧冬十月宋萬出奔陳十有三年春齊侯宋人陳人蔡人邾人㑹于北杏北杏之㑹齊桓圖霸之始也前此諸侯未有稱霸者而圖霸始於桓公五霸桓公為盛衣裳之㑹十有一而北杏實為之首是時齊侯與四國之君皆在焉春秋爵齊侯而人四國其意若曰從齊侯於㑹者特四國之人爾惡足以言霸嚴其始所以防其終也霸圖既盛諸侯並從雖聖人亦末如之何也已矣夏六月齊人滅遂齊既以無禮滅談今兹復以期㑹不至而滅遂彼獨何罪哉不過借威小國以恐動諸侯爾春秋特書曰人微之也微之則不足以為威矣秋七月冬公㑹齊侯盟于柯齊桓圖霸其先結宋其次結魯蓋宋魯當時之大國也宋魯從而小國皆從矣魯自乾時之戰與齊有怨至是桓公欲圖霸故修好於魯而為盟于柯自是以後齊魯益親自柯之盟始焉春秋重是盟也故二國皆稱爵十有四年春齊人陳人曹人伐宋夏單伯㑹伐宋宋數與齊㑹齊曷為伐宋左氏曰宋背北杏之㑹蓋㑹以結之伐以威之而後宋之從齊益固矣單伯曷為㑹伐宋左氏曰齊請師于周故單伯㑹之取成于宋而還挾天子以令諸侯桓公之本謀也其不言㑹齊人陳人曹人者尊單伯故不言其人也若曰單伯㑹于伐宋而非列國所能屈也是年之冬單伯復㑹諸侯于鄄齊宋衛鄭皆在焉藉天子之重以鎮服諸侯而諸侯之從者亦多矣秋七月荆入蔡前日荆敗蔡師于莘今焉竟入之如蹈無人之境楚益強蔡益弱矣北杏之㑹蔡人在焉齊桓不能救蓋方有中國之㑹力未足以及逺故也冬單伯㑹齊侯宋公衛侯鄭伯于鄄十有五年春齊侯宋公陳侯衛侯鄭伯㑹于鄄左氏曰十四年冬㑹于鄄宋服故也十五年春復㑹焉齊始霸也齊侯圖霸在北杏而始霸在鄄自冬徂春兩㑹于鄄勤動諸侯莫敢或違此其所以為霸歟夏夫人姜氏如齊秋宋人齊人邾人伐郳宋人何以序齊人之上左氏曰諸侯為宋伐郳宋主兵故也鄭人侵宋宋鄭兩㑹于鄄鄭人間宋伐郳遽有侵宋之師用見齊桓之信未孚於諸侯而其力猶未足以庇宋也冬十月十有六年春王正月夏宋人齊人衛人伐鄭宋人主兵復序于齊上左氏曰諸侯伐鄭宋故也鄭人侵宋故齊桓為之㑹諸侯以伐鄭其用力于宋亦勤矣秋荆伐鄭荆至此三加兵于中國矣不稱師不稱人者狄之也終春秋之世蔡服屬於楚鄭奔命之不暇二國之患實基於此春秋安得不深拒痛絶于其初耶冬十有二月㑹齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽說者以為同盟者同心以為盟也或同心以尊周或同心以外楚春秋皆以同盟書之夫人之結信莫大于盟既盟矣惡有不同心者哉誠如是說則自同盟之外凡書盟者皆不同心乎考之周官有朝觀㑹同之禮殷見曰同先儒以為同盟用是禮也周室既衰是禮不講齊桓始霸僣用天子之禮春秋謹其始而書之罪其僣也其不書公㑹者為公諱也自是而後同盟書公春秋亦不得而諱矣按戴氏以同盟為殷同之盟本于劉敞邾子克卒十有七年春齊人執鄭詹左氏曰鄭不朝也先儒以為鄭詹者鄭之執政也執其一國之政而被執于齊如一夫然何也昔者宋人執鄭祭仲于時祭仲出行道過于宋宋人誘而執之今齊人執鄭詹將執于其國歟抑誘而執之耶觀鄭詹自齊逃來其為人輕脫無恥可略見矣况公榖皆以佞人目之其柔媚不立且不能自重其身宜乎見執于齊也然齊桓以此服鄭亦豈足為伯討乎夏齊人殲于遂齊人滅遂遣人戍之遂人飲戍者酒醉而盡殺之此遂人殱齊人也春秋直書齊人殱于遂若曰齊人自取也遂何罪焉滅人之國戍人之地自殱其師圖霸若此亦可羞矣秋鄭詹自齊逃來冬多麋春秋之紀灾異也鳥獸之害人者悉書于春秋其未嘗有而忽有者名之曰有若有蜚有蜮是也略有而不足以為害多則為害則書之曰多若冬多麋也多則害稼矣若螽之類有一物則有一物之害故直以螽螟書之皆所以謹灾異重民命也十有八年春王三月日有食之夏公追戎于濟西隱桓之世再與戎盟則戎之狎習於魯而無忌憚也久矣此未有言伐者其言追何公羊曰大其未至而豫禦之也誠使其未至也驅而去之則有之矣其又何追焉先儒以為魯不覺其來已去而追之夫戎蠻種落倐去忽來不可常也今一旦驟至驟去而魯人亦驟追之故春秋不言其伐然自是而後魯伐戎戎終不能為魯患追戎伐戎不可謂無功矣治戎之道使之畏威則逺遁豈可以盟誓結哉秋有􅈮􅈮之為物含沙射人南方多有之非魯所宜有也世之治也地氣自北而南及其衰也自南而北蟲魚禽鳥隨地氣而遷焉有􅈮有鸜鵒皆紀地氣之變也冬十月十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟媵陳人之婦者公子結之私行也其事淺其辭略不足乎書也因其及盟而記其事之所由始也公子結之是行也殆聞齊宋之將伐魯而遂自求盟以排難解紛歟不然何其專也誠使是盟也果能排難解紛如弦髙之存鄭君子猶以為誕而况無救於伐西鄙之師乎夫人姜氏如莒冬齊人宋人陳人伐我西鄙是師也其謂之何豈公子結之盟不足以救難歟抑亦公子結輕為盟激怒於齊宋而致師歟書及盟於前而書伐我於後則罪有所歸矣春秋之書魯事也其初也擁衛其國以外禦諸侯其漸也不可復禦其終也蕩然無復限節矣故諸侯之伐魯也其初日來戰其次日敗某師其次日伐鄙鄙之為言逺也不以難邇我國也又其次日伐鄙而圍邑及其甚也直書伐我而已二十年春王二月夫人姜氏如莒文姜之惡豈容以人道責哉昔年如齊猶託名歸宗國連年如莒獨何名哉文姜不足道也獨莊公為可恨爾夏齊大灾秋七月冬齊人伐戎齊桓至是始用師于戎然猶未得其要領曽未數年戎敢于侵曹使曹君出奔于外其怙彊亦可知矣及桓公親伐山戎來獻戎捷然後始不為中國患蓋桓公圖伯之初猶未暇逺略故也二十有一年春王正月夏五月辛酉鄭伯突卒秋七月戊戌夫人姜氏薨冬十有二月葬鄭厲公二十有二年春王正月肆大眚肆赦也眚灾也故虞書曰眚灾肆赦春秋二百四十二年獨莊公書肆大眚蓋春秋豫之赦有二義時有大灾害及百姓則君赦之有憃愚老弱則特赦之非此二者無故而大赦海內非帝王之法也癸丑葬我小君文姜陳人殺其公子御冦夏五月秋七月丙申及齊髙傒盟于防盟髙傒者公也何以不稱公是盟也其將求昏于齊歟莫重其與讎昏也故沒公而不書榖梁曰不言公髙傒伉也夫髙傒之伉何足較哉冬公如齊納幣莊公即位二十餘年矣至是而求昏于齊說者謂娶齊女者文姜之意也齊女尚幼故待年而後聘然則莊公之圖昏于齊何其庸愚不武如此也意者莊公不知其父之所以死與其母之所以罪歟盟防結昏如齊納幣前此昏禮未之有也况三年之制未畢而可以圖昏乎二十有三年春公至自齊祭叔來聘祭叔者畿內之大夫也親來聘魯祭叔之私交也非有王命故不稱使禮諸侯之大夫束修之問不出境畿內之王人不得出㑹諸侯不正其外交也此義明則人臣合黨植私之患息矣夏公如齊觀社公至自齊國主社故諸侯為百姓立社曰國社自為立社曰侯社大夫以下成羣立社曰置社自諸侯大夫以至于百姓莫不有社唯為杜事單出里唯為社田國人畢作蓋取禽以祭社則國人皆與閭里皆出其禮可觀矣然齊有社魯亦有社莊公棄國之社而觀齊之社其怠於國政不恤民事可知矣榖梁曰以是為尸女也其說得矣荆人來聘荆入春秋三以兵加中國春秋不稱人不稱師者狄之也今兹來聘何以稱人非進之也幸而知有聘問之禮人道未息猶有望於其終也向使荆人能世守是禮交聘於中國則晉楚之爭庶幾少釋而中國之民庶幾少息肩乎公及齊侯遇于榖蕭叔朝公遇者禮之簡者也榖之遇莊公之意亦知數㑹之煩擾故簡禮以自便云爾然而觀社之行方至何事之急而倉卒若此也魯以邂逅遇齊蕭以邂逅朝魯失禮之招有以致此也古者朝聘之事賓主行禮於廟示不敢輕也春秋書蕭叔朝公魯之與蕭皆失之矣秋丹桓宫楹殷武之詩祀髙宗也其詩曰松桷有梴旅楹有間寢成孔安言寢廟之制取其松柏以為楹桷有間有梴享焉而安今也丹桓宫之楹刻桓宫之桷加非禮之飾於宗廟固己非矣而况修飾宗廟以待夫人之至乎瀆禮違制可謂甚矣冬十有一月曹伯射姑卒十有二月甲寅公㑹齊侯盟于扈莊之媚齊不遺餘力二年之間親如齊者再遇齊者一盟齊者一其切于昏姻之好若此然是年也祭叔荆人來聘蕭叔來朝逺近歸慕皆以齊人昏姻之故莊公自以為計之善矣君子以為假人之彊為重者非自彊之道也二十有四年春王三月刻桓宫桷葬曹莊公夏公如齊逆女秋公至自齊八月丁丑夫人姜氏入戊寅大夫宗婦覿用幣莊公生於桓之六年至是三十有七矣求昏於齊如恐失之親如齊納幣再嵗而後逆親如齊逆女既歸而後至何其難也春秋書夫人姜氏入入者難辭也不順之辭也內弗受之辭也娶仇人之女以奉宗廟其不順大矣宗廟其受之乎在禮私見曰覿夫人始至大夫郊迎明日執贄以見則既行公禮矣又使其大夫之妻執幣帛以行私覿之禮違越禮制以為媚悅無所不至甚矣莊公之庸謬不武也向也桓公娶于齊致文姜之淫亂桓公不免其身今也莊公娶于齊致哀姜之逆亂魯又幾亡其國春秋備書於䇿辭繁而不殺所以為萬世永戒也大水莊公即位三十餘年書大水者三於羣公為最甚大水隂氣之盛也魯自文姜之後繼之以哀姜夫婦道失隂盛陽微故在莊公屢有大水之應不特此也多麋有蜮皆隂盛之所致也冬戎侵曹曹羈出奔陳赤歸于曹公羊以曹羈為曹大夫杜預以曹羈為世子二說杜氏為長曹莊公之葬久矣曹羈之位猶未定也戎人乘間侵曹意將以納赤耶羈倉卒無備懼而出奔赤歸于曹用見羈之柔弱不能自有其國而制命于戎若此也是時齊桓方霸而戎人之微得與聞中國之事桓公亦少愧矣郭公說春秋者曰郭公者郭亡也其稱郭公闕文也其說有二證齊桓公嘗問管仲曰郭何故亡則郭之亡也正在齊桓之時况春秋嘗書梁亡矣今稱郭亡者亦其類也二十有五年春陳侯使女叔來聘左氏曰始結陳好嘉之故不名夫諸侯大夫例書名春秋豈以始結陳好而獨私於女叔哉公子友如陳葬原仲彼原仲亦以字書豈嘉之乎天子之命大夫稱字故鄭祭仲陳女叔原仲皆命大夫也古者大國三卿二卿命於天子一卿命於其君故命於天子者謂之命大夫春秋之時諸侯強大往往自命其卿陳鄭之所以有命大夫者鄭伯嘗為王卿士陳蔡嘗從王伐鄭意者其國之大夫嘗受命於天子也春秋抑強扶弱齊晉之大夫多書名陳鄭小國大夫間或稱字者所以尊天子而重王命也夏五月癸丑衛侯朔卒六月辛未朔日有食之鼓用牲于社日食之灾瞽奏鼓所以充其陽也用牲于社則非禮矣大水之灾用牲于社所以致禱也伐鼓于朝用牲于門則非禮矣春秋常事不書非禮則書莊公三十年日有食之鼓用牲于社按故事而行魯不以為異也聖人謹禮之始失蓋懼其沿襲之誤而不反也伯姬歸于杞逆伯姬不書逆之道微也杞國微弱兼用夷禮故來朝于魯多以非禮獲譴今兹逆女禮必不備也秋大水鼓用牲于社于門冬公子友如陳公子友如陳報聘也原仲相陳季友相魯兩相好也故女叔來聘公子友躬自往報聘其意可謂厚矣二十有六年春公伐戎夏公至自伐戎追戎之役伐戎之師莊公皆親行蓋攘夷之道不得不若是也觀費誓之書知伯禽之用力勤矣其後子孫狃於宴安以盟誓為可信而不知外裔之不可以信義結也一大創而終身創矣曹殺其大夫不言名氏所殺者非一大夫也公羊曰衆是也自曹莊公既沒之後其事不見於春秋羈出而赤歸曹之大夫必有不與赤同心者故至是而殺之云爾秋公㑹宋人齊人伐徐先儒以為是年之春魯常伐戎蓋戎在徐州謂之徐戎今兹伐徐者戎必與徐合兵表裏以為魯患其說固善矣然宋序齊上以宋為主宋與徐近或者得罪於宋乎是伐也以書公書人觀之則主兵者魯也以宋序齊上觀之則主兵者宋也意者宋魯合謀而齊人助之乎冬十有二月癸亥朔日有食之二十有七年春公㑹杞伯姬于洮以夫人而㑹諸侯古無是事也文姜數㑹齊侯不以為異杞伯姬援之以為故事踵而行之莊公亦安然受之曾無留難其冬伯姬歸魯繼以杞伯來朝至僖公五年伯姬復來朝其子由此觀之若夫若子皆聼命於伯姬其與聞外事亦可知矣先儒謂伯姬莊公女恐非也以春秋書法觀之若齊髙固逆子叔姬者稱子者公女也其不稱子者公之姊妹也莊公二十五年伯姬始嫁遲歸愆期意必有為或者擇對而有行乎叔姬之嫁復遲再嵗或者待伯姬而後行乎是皆未可知也夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽齊桓至是再與諸侯同盟狃前事而不以為僣故尋舊盟不以為黷春秋始書同盟猶沒公而不書今焉同盟公與諸侯並書霸業已成諸侯聽命雖春秋亦末如之何也已矣秋公子友如陳葬原仲冬杞伯姬來莒慶來逆叔姬杞伯來朝公㑹齊侯于城濮城濮衛地也按此五字永樂大典無之從黃震日抄補幽之盟衛侯不與㑹于城濮謀伐衛也大要魯自結昏之後事齊甚謹盟幽之後魯獨與齊謀伐衛諸侯不與焉二十有八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績齊桓自圖霸以來其侵伐諸侯未嘗用大衆故書曰齊人伐衛然而伐衛者齊也其書曰衛人及齊人戰以衛主戰何也齊人以甲寅至衛衛人以甲寅交戰有輕齊之心無禦敵之備倉皇疾戰至於敗績衛自取之也按左氏言衛人立王子頽王命齊侯伐衛誠如是齊侯當率諸侯之師聲罪致討豈容率略如此既勝人之後取賂而還衛雖敗績而齊侯之功不足觀矣夏四月丁未邾子瑣卒秋荆伐鄭公㑹齊人宋人救鄭荆之來聘固嘗稱人矣夷狄貪婪復還舊習故春秋復以荆書之齊宋皆以人救鄭公獨親行蓋魯之事齊獨厚於列國故也冬築郿城之與築不但有大小之别而已春秋書築館築囿謂其役之小也其書築臺有增髙益下之義焉此書築郿者言其增髙益下特其所包者小爾當無麥禾之時而為築郿之舉不待貶而義自見矣大無麥禾臧孫辰告糴于齊按豳風十月納禾稼時既冬矣而禾稼無可納者况無蓄麥乎故聖人併而書之言無禾屬爾匆匆告糴何其急也倉廪虛竭國非其國矣不曰臧孫辰如齊告糴而曰臧孫辰告糴于齊言其事之急也二十有九年春新延廄春秋之法改創曰作修舊曰新今日新延廄者向焉有廄改而新之也築郿於無麥禾之時新廄於無麥禾之後猶匆匆焉告糴于人人其恤之乎夏鄭人侵許自許叔入許之後中間鄭人伐許纍纍不已其後卒滅許者鄭也貪人土地不滅不已鄭亦不仁矣哉秋有蜚冬十有二月紀叔姬卒城諸及防去年大無麥禾正使今兹少稔民力猶未蘇也何至連城兩邑乎左氏曰書時也以十有二月築城時則時矣以年饑之後薦城抑豈天時乎三十年春王正月夏師次于成秋七月齊人降鄣按此條經文戴氏從公榖榖梁曰次止也有畏也欲救鄣而不能也向也齊人迫紀侯以去其國莊公次于滑欲救紀而不能今焉齊人降鄣鄣者紀之遺邑也魯師次于成欲救鄣而不能此二事正相類然以時事考之向也次滑莊公猶有救紀之意今焉次成莊公其敢救鄣乎莊之事齊也不愛其力齊欲降鄣魯願效力者也安敢言救乎杜預以設備為言恐或是也不然則次師為齊聲援爾紀之滅久矣而紀遺邑猶未盡服于齊齊桓既霸卒以兵威迫脅而降之用見義理之在人心服人不以道雖彊而猶難也八月癸亥葬紀叔姬九月庚午朔日有食之鼓用牲于社冬公及齊侯遇于魯濟齊人伐山戎魯親于齊故齊之國事多咨謀于魯城濮之㑹謀伐衛也魯濟之遇謀伐山戎也伐山戎者齊侯也其稱人何也賤山戎而貴桓公不使桓公敵乎戎也說者謂稱人貶之非春秋攘夷之意也三十有一年春築臺于郎莊公晚年荒于土木之功築郿之後城諸及防今一年之間三築臺于逺地其荒甚矣左氏載莊公築臺臨黨氏春秋不書然則公之築臺不亦多乎夏四月薛伯卒築臺于薛六月齊侯來獻戎捷齊侯親來獻捷非威我也魯濟之謀莊公與焉捷獲而過我因歸功于魯云爾敵愾獻功諸侯事天子之禮也魯與齊皆失之秋築臺于秦冬不雨春秋書不雨與書旱之義不同旱之為灾也大不雨之害猶未至於太甚也三十有二年春城小榖左氏曰城小榖為管仲也蓋小榖者管仲之邑也何以不繫之齊管仲相桓公霸諸侯威行於列國故莊公為管仲城之然而為鄰國之大夫城其賜邑非莊公所當為也書曰城小榖若莊公自城其邑然蓋諱之也城楚邱而不言衛惡其專也城小榖而不言齊諱其卑也按范寧榖梁注云小榖魯邑考齊地别有榖非小榖也戴氏用左氏之說似誤夏宋公齊侯遇于梁丘齊桓之霸惟宋與魯最為親密故遇于榖遇于魯濟者魯也遇于梁邱者宋也梁邱在曹邾之間去宋近去齊逺桓公不憚勤勞親與宋遇君子是以知桓公圖霸之勤也秋七月癸巳公子牙卒八月癸亥公薨于路寢冬十月己未子般卒公子慶父如齊狄伐邢
