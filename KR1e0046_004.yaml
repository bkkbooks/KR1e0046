body:
  text: 春秋講義卷四上宋戴溪撰昭公元年春王正月公即位叔孫豹㑹晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢虢之㑹宋之盟為之也夫天下之事惡其始之不正也不明天下之大義徒狥一時之美名其意以善為之而不知其非義卒貽患於後人若宋之盟是也彼趙武之意豈不欲弭天下之兵少紓中國之患故合楚之大夫為宋之盟至于虢之㑹而後知其事之窮也楚公子圍以僭侈無君之心偃然欲專中國之盟㑹假借宋之盟告于諸侯中國不得而却也尋宋之盟復居晉上趙武無以為辭至是獨不足悔乎榖梁之言以為天下無侵伐者八年晉趙武楚屈建之力也夫天下兵爭勢不能免嘗聞聖人修德於內使逺人服從於外故無兵革之禍不聞俯首從人委中國之權於外裔而偷安於數年自以為功也其亦可謂無策之尢者矣三月取鄆魯有兩鄆其一魯邑其一本莒邑也書城鄆者魯邑也書楚人入鄆者莒邑也今兹書三月取鄆謂其為魯邑耶則邑固屬我矣何以取為謂其為莒邑耶則上文不言伐莒何以知其莒邑也是以知莒魯爭鄆為日久矣疆場紛紜莫適為主故魯因莒亂正其疆界在魯書取在莒不言其邑聖人之意深矣夏秦伯之弟針出奔晉六月丁巳邾子華卒晉荀吳帥師敗狄于大原按戴氏釋此條經從公榖見後叔弓敗莒一條講義秋莒去疾自齊入于莒莒展輿出奔吳叔弓帥師疆鄆田葬邾悼公冬十有一月己酉楚子麇卒楚公子比出奔晉二年春晉侯使韓起來聘夏叔弓如晉秋鄭殺其大夫公孫黑冬公如晉至河乃復季孫宿如晉榖梁曰恥如晉故著有疾也公如晉而不得入季孫宿如晉而得入惡季孫宿也昭公凡五如晉皆不得入獨二十三年經書有疾是真有疾也使公恥於不得入託疾以求反則前之不恥者多矣季氏之罪春秋蓋不勝其惡矣非惡季孫宿惡晉也當昭公即位二年首朝于晉未嘗得罪也晉却之而不見何哉却其君而納其臣晉之罪不可勝責矣乾侯之事其兆于此乎春秋直書至河乃復昭公之弱季氏之彊晉人之無識具見於此矣三年春王正月丁未滕子原卒夏叔弓如滕五月葬滕成公秋小邾子來朝八月大雩冬大雨雹北燕伯欵出奔齊四年春王正月大雨雹夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申楚人執徐子秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳執齊慶封殺之遂滅賴宋之盟窮於虢極於申昔者楚莊之霸也滅陳入鄭其勢張矣然猶未敢專主中國盟㑹及楚靈之始立也偃然欲為桓文之事㑹中國之諸侯執中國之君伐人之國滅人之邑為中國討罪而執其叛臣此其用意不淺也晉人恬然若不聞者亦可以觀世變之盛衰矣九月取鄫左氏曰言易也莒亂著邱公立而不撫鄫鄫叛而來故曰取公羊曰其言取之何滅之也滅之則其言取之何內大惡諱也如左氏之說鄫叛而來當書以叛如公羊之說魯滅鄫當以滅書今書取鄫二說皆未為當昔者魯嘗屬鄫未幾而莒滅鄫晉人以咎魯然則莒人以不義而滅鄫豈得遂為莒邑今者莒人有亂魯乘勢而取之是可為鄫復國而非取莒人邑也春秋惡莒之滅鄫惡魯之不能復鄫不書莒邑不言滅直以取言之其意深矣冬十有二月乙卯叔孫豹卒五年春王正月舍中軍左氏曰卑公室也初作中軍三分公室而各有其一季氏盡征之叔孫氏臣其子弟孟氏取其半焉及其舍之也四分公室季氏擇二二子各一皆盡征之而貢于公公羊曰復古也榖梁曰貴復正也如左氏之言初作中軍三分公室今舍中軍四分公室名雖為舍而實增之也季氏執國柄外示其弱防大國之多求內私其彊弱公室而自衛公羊以為復古榖梁以為復正是惑其名而不察其實也楚殺其大夫屈申公如晉夏莒牟夷以牟婁及防兹來奔左氏曰牟夷非卿而書尊地也公羊曰莒無大夫此何以書重地也榖梁曰以者不以者也來奔者不言出莒無大夫其曰牟夷何也以其地來重地也三傳皆以三叛人不當書于春秋其得書者重地故也夫三叛人之賤誠不足以書于春秋然春秋非為重地而書也明矣春秋之法明大分正大義也人臣以其地叛此君臣之所同惡也招納叛亡貪其土地大分失大義亡矣春秋安得而不悉書之如其以土地為可重而得書于春秋是教天下為利也春秋豈直為諸侯正疆理而已哉秋七月公至自晉戊辰叔弓帥師敗莒師于蚡泉榖梁曰狄人謂賁泉失台號從中國名從主人榖梁於善道之㑹大原之敗皆有是辭其意以為中國與外裔名號不同故號之大者從中國而書之不曰伊緩而曰善道不曰大鹵而曰大原此其意是也獨於賁泉之書則異是矣吳與狄皆夷也伊緩吳地大鹵狄所居也春秋豈得舍中國之號而從外裔之名乎莒非夷也蚡泉魯地也榖梁子復舉狄人之說以釋賁泉之義其亦未之察乎按善道穀梁本作善稻戴氏所引稍疏秦伯卒冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳說公羊者曰吳未服慶封之罪故也越稱人者俱助義兵意進于淮夷故加人以進之甚矣何休之妄也楚靈無道連年伐吳夷狄相攻乃其常爾豈得謂楚人義舉越人助義乎越不當人而稱人者非進越也越之與楚均之為夷也楚人主㑹越人從之使越不得稱人則是尊楚而賤越也其可乎以夷狄而㑹夷狄其君稱爵其大夫稱人此豈春秋得己之意乎六年春王正月杞伯益姑卒葬秦景公夏季孫宿如晉葬杞文公宋華合比出奔衛秋九月大雩楚薳罷帥師伐吳冬叔弓如楚齊侯伐北燕七年春王正月暨齊平左氏曰六年冬十二月齊侯伐北燕將納簡公七年春王正月次于虢燕人行成盟于濡上燕人歸燕姬賂以瑶罋玉櫝斝耳不克而還榖梁曰平者成也暨猶暨暨也暨者不得已也以外及內曰暨如左氏之說則燕暨齊平如榖梁之說則暨齊平者魯也春秋之法間無異事則承上文貴簡辭也若今年之冬齊伐北燕明年春燕暨齊平春秋去燕而不書將以簡文也無乃紀事不明非所以示來世乎左氏之說殆不足信也定十年書及齊平與今年書暨齊平其事正相類獨定之平出於我欲昭之平出於不得已爾惟其出於我欲故既平之後公㑹齊侯于夾谷惟其出於不得已故既平之後叔孫婼僅如齊涖盟而已三月公如楚昔者襄公如楚仲孫羯如晉告將朝焉是猶有懼於晉也不特魯也鄭伯如楚使游吉如晉告今者昭公之行遵襄公之故事若當然者不以為異也君子是以惡宋之盟而嘆謀始者不可以不謹也叔孫婼如齊涖盟夏四月甲辰朔日有食之秋八月戊辰衛侯惡卒九月公至自楚冬十有一月癸未季孫宿卒十有二月癸亥葬衛襄公八年春陳侯之弟招殺陳世子偃師夏四月辛丑陳侯溺卒叔弓如晉當昭公八年楚靈經營中夏一歲之間陳亂擾擾卒也楚師滅陳晉不復問乃成虒祁之宫魯復遣使賀虒祁之成甚矣中國之不競也楚人執陳行人干徵師殺之陳公子留出奔鄭秋搜于紅左氏曰秋大搜于紅自根牟至于商衛革車千乘榖梁曰正也因搜狩以習用武事禮之大者也釋左氏者曰不言大者闕文也釋榖梁者曰後比年大搜失禮故因此以見正周禮四時治兵之法獨仲冬曰大閲蓋農隙之時大講武事法度號令與三時不同故春秋嘗書大閲搜狩矣而未嘗言大搜至昭公十一年始書大搜于比蒲惡其始為僭侈也如使紅之搜其果為大搜也則聖人固將致意焉而春秋獨闕此何哉釋榖梁者以秋搜為得禮之正固未敢知也論大搜之非正而知秋搜之近正為得之矣陳人殺其大夫公子過大雩冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐葬陳哀公甚哉楚靈之無道也楚之稱霸始於莊故靈僭侈之心欲倣而為之宣公十有一年楚嘗縣陳殺夏徵舒納公孫寧儀行父今者靈復滅陳放公子招殺孔奐其事略同春秋於莊之縣陳也書曰入靈之滅陳也直書以滅莊能改過縣陳而復封之靈為無道罪極惡盈自取夷滅至平始復封陳春秋安得不與莊而惡靈乎雖然陳已滅矣葬陳哀公猶不廢於春秋其與宣公十二年葬陳靈公無以異焉春秋存亡繼絶不與夷狄滅人之國其意均爾九年春叔弓㑹楚子于陳許遷于夷許自隱公之時已見滅于鄭及哀公之世許國尚存其遷徙不常者屢矣豈非終始從楚迫於彊令委曲惟命而後僅獲存耶孟子曰天下無道小役大弱役强斯二者天也順天者存逆天者亡其斯之謂歟夏四月陳災春秋之法外災不志其來告于魯者亦或志之陳已亡矣火作其國其無有告于魯者審矣春秋何以書之嗟夫此春秋之特筆也楚滅中國人不能救也天作之災逐楚而建陳聖人傷之存其國而志其災所以恭承天意興滅而繼絶也其㫖深矣秋仲孫貜如齊冬築郎囿十年春王正月夏齊欒施來奔秋七月季孫意如叔弓仲孫貜帥師伐莒左氏曰季平子伐莒取郠杜氏曰三大夫皆卿故書之季孫為主二子從之春秋之法使舉上客而不稱介侵伐者以帥師為主文公十八年如齊之役公子遂叔孫得臣並書說者曰惡其同倫而相介也成公二年伐齊之役魯四卿並書說者曰惡其內虛國家悉出用兵也今者伐莒之役誠使季孫為主則二子固將聽命於主帥春秋豈得而列書之誠使三大夫皆卿得並書於春秋則晉之軍帥皆卿也奚主兵者獨書昔者邲之役晉惟六卿不同心故敗兵惡其權之不一也當昭公之時三家彊大莫能相下也故三卿並出莫適為主聖人即其實而書之哀公二年季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田叔孫州仇仲孫何忌及邾子盟于句繹釋者曰三人伐而二人盟何也各盟其得也由此觀之則三卿並出各取其所有而各盟其所自得也其不主於一人也審矣戊子晉侯彪卒九月叔孫婼如晉葬晉平公十有二月甲子宋公成卒十有一年春王二月叔弓如宋葬宋平公夏四月丁巳楚子䖍誘蔡侯般殺之于申先王之法諸侯失地名滅同姓名蔡侯得罪於君父其罪不止於失地楚子亦一蔡侯也誘蔡侯而殺之是以賊討賊也其罪豈止滅同姓而已哉昭公十六年楚子誘戎蠻子殺之二者皆不書名蠻夷相執殺春秋固不暇責也楚公子棄疾帥師圍蔡五月甲申夫人歸氏薨大搜于比蒲左氏舉叔向之言曰魯公室其卑乎君有大喪國不廢搜當昭公八年秋搜于紅未始書大搜也今有夫人之戚不踰月而大搜何其速也釋榖梁者曰人衆器械有踰常禮又何其僭也彼魯誠不恤其夫人之戚矣而亦未至無道若此也意者魯畏楚特甚凡楚人有事于中國魯常往㑹今楚子誘蔡侯殺之楚棄疾圍蔡魯實懼焉故不暇顧禮大簡車徒將以警備也兹亦可見其謀國之無䇿矣仲孫貜會邾子盟于祲祥秋季孫意如㑹晉韓起齊國弱宋華亥衛北宫他鄭罕虎曹人杞人于厥憖甚矣晉之謀國者無識也當楚之滅陳也陳未有大罪晉為盟主熟視而不救蔡侯般得罪于君父中國不能討使夷狄借其名誘而殺之中國固當愧赧羞縮而晉之大夫方謀救蔡是何其倒置若此也義不足以蓋楚力不足以庇蔡厥憖之會徒以重蔡世子見執之禍爾九月己亥葬我小君齊歸冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之十有二年春齊髙偃帥師納北燕伯于陽榖梁曰燕伯之不名何也不以髙偃挈燕伯也公羊曰伯于陽者何公子陽生也北燕伯之出奔與其入國其本末甚明公羊何所見而以公子陽生釋之如公羊之言夫子於其所不知蓋闕如也公羊乃以不可知者為知其亦異于夫子也已矣三月壬申鄭伯嘉卒夏宋公使華定來聘公如晉至河乃復五月葬鄭簡公楚殺其大夫成熊秋七月冬十月公子憖出奔齊楚子伐徐晉伐鮮虞左氏曰晉荀吳僞㑹齊師者假道於鮮虞遂入昔陽榖梁曰其曰晉狄之也其狄之何也不正其與夷狄交伐中國故狄稱之也釋之者曰鮮虞姬姓白狄也地居中山故曰中國夫外裔以所居之地邇于中國遂得與中國並稱則陸渾伊雒之戎較鮮虞尢近而可乎謂鮮虞為中國謂晉為狄春秋褒貶若此毋乃非乎如左氏之言晉荀吳假道於鮮虞遂入其國以中國之卿而行盜竊之計鮮虞不足道也而晉之事為可恥矣故聖人略而書之非進鮮虞也亦非遂狄晉也當荀吳之圍鼓也鼓人或請以城叛荀吳不欲也君子亟稱焉及鼓人叛晉而從鮮虞也荀吳略東陽使師僞糴者負甲以息於昔陽之門外遂襲鼓滅之是殆用入鮮虞之策也夫何前日能行義於鼓而今者復自為掩襲之計乎君子是以知荀吳圍鼓之事出於勉彊其入鮮虞與滅鼓也是殆荀吳之真情乎十有三年春叔弓帥師圍費費季氏之邑也南蒯以費叛春秋直書叔弓圍費若待鄰國然季氏不有公室自絶于魯久矣今家臣以其邑叛是天絶之也不書蒯之叛而直書圍費非外魯也外季氏也嘗觀公山弗擾以費叛召子欲往竊為之說曰公山弗擾叛季氏非叛魯也南蒯之辭亦曰吾出季氏而歸其室于公子更其位我以費為公臣凡叛季氏者皆欲以張公室為名其意雖未必然其辭則正矣夫子之告子路曰夫召我者而豈徒哉如有用我者吾其為東周乎聖人之意蓋有在矣因其名而正其實尊魯以及於周則天下其庶幾乎是蓋春秋書圍費與墮費之意也夏四月楚公子比自晉歸于楚弒其君䖍于乾溪楚公子棄疾殺公子比秋公會劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘八月甲戌同盟于平丘公不與盟晉人執季孫意如以歸公至自㑹公羊曰公不與盟者何公不見與盟也公不見與盟大夫執何以致㑹不恥也曷為不恥諸侯遂亂反陳蔡君子不恥不與焉榖梁曰公不與盟者可以與而不與譏在公也其日善是盟也榖梁之說不如公羊之精也晉自宋之盟未嘗出㑹諸侯諸侯皆有二心故大會於平邱以威諸侯數十年間未有若此盛也上會王臣下率列國晉有甲車四千乘治兵于會告之以文辭董之以武師大懼諸侯之二已也然後郤魯之君執魯之臣欲藉此以威諸侯而不知晉事之失亦未有若此甚也昔者桓文之霸也最先得魯屈意以交之今者平公欲復霸最先治魯厲志以威之何其悖也且魯未有大罪也邾莒之爭疆場之常事也假此以罪魯其何以服魯人之心聖人于沙隨之會書曰不見公者當僑如之譖魯猶未有罪也若平邱則無罪矣直書曰公不與盟言公之不與而非晉之不使與也不特此也書曰公至自㑹飲至策勳如平居無事然用見魯無愧晉之心而有自安之道抑彊扶弱之義于是乎在公羊不恥之說得之矣蔡侯廬歸于蔡陳侯吳歸于陳左氏曰楚平王即位封陳蔡而皆復之隱太子之子廬歸于蔡悼太子之子吳歸于陳禮也公羊曰此皆滅國也其言歸何不與諸侯專封也榖梁曰善其成之會而歸之故謹而日之此未嘗有國也使如失國辭然者不與楚滅也榖梁以平邱之會有復陳蔡之功左氏以楚平之復陳蔡為有禮二者皆非也公羊不與諸侯專封之語幾是矣然不能力言夷狄之僭而使得與齊桓同罪亦非也蔡侯廬陳侯吳皆以太子出奔未嘗有國也春秋書之若二子嘗有國而復歸然榖梁如失國之辭善矣其書歸也上不命于天子中不禀于霸主下不屬于夷狄若陳蔡自失國而自歸然春秋致意於此三者深矣冬十月葬蔡靈公公如晉至河乃復吳滅州來十有四年春意如至自晉三月曹伯滕卒夏四月秋葬曹武公八月莒子去疾卒冬莒殺其公子意恢十有五年春王正月吳子夷末卒二月癸酉有事于武宫籥入叔弓卒去樂卒事禮有出於人情之變者雖先王未之有可以義起也若此去樂卒事是也故三傳皆以為得禮然公榖之言竊有疑焉昔者衛獻公之臣曰栁莊寢疾公曰若疾革雖當祭必告由此語觀之是君有祭祀大夫之喪不以告也公榖之意皆以為叔弓卒在外當祭而告獨左氏以為叔弓涖事籥入而卒其言為有理春秋書曰籥入叔弓卒是叔弓行禮于廟遽然而卒也審矣蓋君有事于宗廟雖有大夫之喪不當以告惟與執事而卒者則因事制宜此禮之變也若夫既祭之後聞大夫之喪則繹祭可廢故春秋書曰壬午猶繹猶者可以已而不已其義明甚夏蔡朝吳出奔鄭六月丁巳朔日有食之秋晉荀吳帥師伐鮮虞冬公如晉十有六年春齊侯伐徐楚子誘戎蠻子殺之左氏曰楚子聞蠻氏之亂與蠻子之無質也使然丹誘戎蠻子嘉殺之遂取蠻氏既而復立其子焉禮也公羊曰楚子何以不名夷狄相誘君子不疾也曷為不疾若不疾乃疾之也誘其君而取其國不義孰甚焉取其國而還其子君子猶以為有禮甚矣聖人待人之恕而望人以改過若此也楚子不書名之意其殆以悔過乎如曰夷狄相誘君子不疾則亦不書於春秋矣夏公至自晉秋八月己亥晉侯夷卒九月大雩季孫意如如晉冬十月葬晉昭公十有七年春小邾子來朝夏六月甲戌朔日有食之秋郯子來朝八月晉荀吳帥師滅陸渾之戎冬有星孛于大辰公羊曰孛者何彗星也榖梁曰一有一亡曰有孛之為言悖其次也不言某星之入而曰有星猶書日有食之知其不可知之也公羊以為彗星聖人不敢言也榖梁一有一亡之說亦非也有蜚有􅈮可以言一有一亡有星不可以有亡言也楚人及吳戰于長岸公羊曰詐戰不言戰此其言戰何敵也榖梁曰兩夷狄曰敗中國與夷狄亦曰敗此進楚子故曰戰春秋之法凡書外裔其法與中國同者非進外裔也傷中國也傳者不察類以為進外裔蓋不特此一事也今楚與吳戰勝負相當均之為可罪也春秋獨進楚子何哉蓋外裔相攻伐其始也不書於春秋其中也以外裔之法書之其末也待以中國之法皆春秋傷中國之意也於外裔何與焉十有八年春王三月曹伯須卒夏五月壬午宋衛陳鄭災公羊曰何以書記異也何異爾異其同日而俱災也外異不書此何以書為天下記異也榖梁曰其志以同日春秋記外災異多矣宋大水梁山崩非為天下記異也來告則書紀天變之非常所以重交鄰之義也六月邾人入鄅秋葬曹平公冬許遷于白羽十有九年春宋公伐邾夏五月戊辰許世子止弒其君買己卯地震秋齊髙發帥師伐莒冬葬許悼公二十年春王正月夏曹公孫㑹自鄸出奔宋公羊曰奔未有言自者此其言自何叛也叛則曷為不言其叛為公子喜時之後諱也春秋為賢者諱何賢乎公子喜時讓國也春秋之法莫重乎君臣之義也臣以其君之邑叛春秋以其先世之賢也而諱之則春秋之法廢矣鄸非叛也據邑以自歸於鄰國謂之叛可也舍邑而出奔豈得謂之叛乎然奔未有言自者此獨言自何也自國出奔故不言自自邑出奔惡得不以自書之榖梁曰言其以貴取之而不以叛非也挾公子公孫之貴而取其邑以叛春秋不以叛書是貴者義之賊也豈春秋之意乎按范寧榖梁注云㑹以公孫之貴而得鄸既而不以之叛故書公孫以善之則榖梁之意正褒其不挾貴而取邑以叛也戴氏之駁自誤讀耳秋盜殺衛侯之兄縶榖梁曰盜賤也按左氏殺縶者齊豹也齊豹為衛司冦則非賤矣左氏曰欲求名而不得也夫春秋成而亂臣賊子懼者畏其名也世豈有欲求險危大人之名而不可得者以左氏考孟縶之死由於宗魯魯為孟驂乘與聞公孟之死故夫子以宗魯為齊豹之盜而孟縶之賊原情定罪歸惡於宗魯非齊豹欲求名而不得也冬十月宋華亥向寧華定出奔陳十有一月辛卯蔡侯廬卒二十有一年春王三月葬蔡平公夏晉侯使士鞅來聘宋華亥向寧華定自陳入于宋南里以叛榖梁曰叛者直叛也說者曰言不作亂也昔者欒盈入于晉入于曲沃不言叛何也盈本欲入晉不勝而走曲沃其無君之罪大矣非直據邑以叛也臧武仲以防求為後于魯夫子罪其要君謂其據邑以請後也晉趙鞅入于晉陽春秋以叛書謂其據邑以誅叛也况于宋華亥之徒介于鄰國入據宋邑其為罪也大矣說穀梁者猶謂其不作亂何也有子曰不好犯上而好作亂者未之有也古人以犯上為作亂之漸焉有既叛而不為作亂者乎秋七月壬午朔日有食之八月乙亥叔輒卒冬蔡侯朱出奔楚公如晉至河乃復左氏曰公如晉及河鼓叛晉晉將伐鮮虞故辭公杜氏曰將有軍事無暇于待賓且懼泄軍謀也夫公之如晉其不得入也屢矣晉豈懼泄軍事而辭魯且無以待賓乎季氏之强昭公之弱晉助其臣不有其君其為日久矣可勝嘆哉二十有二年春齊侯伐莒宋華亥向寧華定自宋南里出奔楚榖梁曰自宋南里者專也夫宋華亥之徒既入于南里以叛矣專何足言乎春秋書宋南里者嫌其自宋出奔也豈罪其專乎大搜于昌間榖梁曰秋而曰搜此春也其曰搜何也以搜事也榖梁知春之不當搜是也而不知魯之不當大搜也失時之罪小僭禮之罪大由是以往魯以大搜為故事連年而屢舉多在夏秋之間禮既失矣豈復以失時為非乎夏四月乙丑天王崩六月叔鞅如京師葬景王王室亂劉子單子以王猛居于皇秋劉子單子以王猛入于王城冬十月王子猛卒春秋之書或曰京師或曰王室何也由諸侯言之故曰京師由天子言之故曰王室蓋京師以臨天下為言王室以家天下為言也或曰成周或曰王城何也遷九鼎之地曰王城遷頑民之地曰成周王城在西成周在東也今周室之亂生于兄弟之間故以王室言之王猛既為君矣何以稱名未踰年之君也前言王猛見其已為君後言王子猛見其未踰年也自入春秋以來周室蓋三亂矣其禍皆生于父子兄弟嫡庶不明惠王寵子帶幾危世子齊桓公盟世子于首止而位定襄王復寵帶出居於鄭晉文納王王室遂定向微二霸周室之亂豈減景王之時然則春秋書王室亂者固以憫周室之微弱而嘆桓文之不復有也悲夫十有二月癸酉朔日有食之二十有三年春王正月叔孫婼如晉癸丑叔鞅卒晉人執我行人叔孫婼春秋之法因使而被執者皆以行人書內外同辭重使也然既書叔孫婼如晉則固知其為行人矣復書行人不以辭為贅何也夫行人將命者也虐執行人討非其罪此春秋之所惡也故正其名而特書之兩國交兵行人猶不可執也况使命之往來乎以此教天下兵禍其少瘳矣晉人圍郊公羊曰郊者何天子之邑也曷為不繫于周不與伐天子也晉圍天子之邑其罪大矣春秋宜明正其罪何書辭之略也非也子朝在郊實亂王室晉圍子朝非伐天子也然則晉之大義正矣春秋宜特書其功何書辭之略也嗟夫此春秋之意也子朝之亂今踰年矣晉為盟主不能糾合諸侯同討亂略以奬王室顧以微者僅圍一邑是尚足以為義乎明正其罪則遏諸侯勤王之意特書其功則非諸侯奬王室之義微其罪而略其功春秋豫奪之意深矣夏六月蔡侯東國卒于楚秋七月莒子庚輿來奔戊辰吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧公羊曰不與夷狄之主中國則其言獲陳夏齧吳少進也春秋之法未陳曰敗某師中國與外裔戰皆言敗今吳敗蔡陳許之師以勾吳而敗中國何也嗟夫胡沈之君不足道也蔡陳許三國淪於夷狄久矣今兹從楚而與吳戰是率其類自相攻也春秋安得以中國之法待之昔者秦楚固嘗撓中國矣猶未至如吳之甚也兩君死敗一大夫被獲春秋以來未之有也公羊猶曰吳少進焉何哉天王居于狄泉周室之亂踰年矣敬王之立在去年十一月己丑館于子旅氏亂離之際雖未成其為君然猶在王城之內天下猶有所宗主也及子朝入王城敬王居于狄泉春秋正其名而特書之示天下有君也昔者襄王出居于鄭春秋以出書天子以四海為家其曰出者志襄王不能有其家也敬王之立周已亂矣非其罪也况在王城之側乎尹氏立王子朝春秋惡世卿於是為信矣尹氏世執周柄自幽王之時固已為詩人所惡入春秋之初書尹氏卒惡其始者所以慮其終也卒也立王子朝幾亡周室者尹氏也春秋於王朝之卿未有書氏者而始終以尹氏書其意深矣八月乙未地震冬公如晉至河有疾乃復二十有四年春王二月丙戌仲孫貜卒婼至自晉夏五月乙未朔日有食之秋八月大雩丁酉杞伯郁釐卒冬吳滅巢葬杞平公二十有五年春叔孫婼如宋夏叔詣㑹晉趙鞅宋樂大心衛北宮喜鄭游吉曹人邾人滕人薛人小邾人于黃父黃父之㑹謀王室也見世變之衰人情之薄而天理之猶在也昔者桓文之霸周室皆有亂二公勤王之意厚矣今子朝之亂王室岌岌若此而列國之大夫為㑹以謀王室亦可謂世變之衰而人情之薄矣然而君父之心人皆有之卒不能自已為㑹以謀之相率以城之是豈非天理之不可磨滅乎有鸜鵒來巢鸜鵒不踰濟此齊魯所無也蓋地氣自南而北則世將衰亂禽鳥動物得地氣之先今南方之禽見於北方者世衰之兆也鸜鵒鵲屬也非穴於地者公榖二傳皆以為宜穴而巢非中國之禽是殆未之識也秋七月上辛大雩季辛又雩左氏曰秋書再雩旱甚也公羊曰又雩者非雩也聚衆以逐季氏也前年魯嘗大雩矣今年再雩魯固旱矣再雩之意不在旱也公羊聚逐季氏之言粗為可信夫人之舉事懼其泄也必託於集事而行之故嘗於都試田獵之中舉事焉意者魯因旱而雩因雩而欲逐季氏不知舉事而至于再其謀固已泄矣安得而不敗乎古人以為投機之會間不容髮今雩之又雩魯未嘗有是也而驟行之寧無使人之疑已乎昔者哀公問社于宰我說者以哀公有誅季氏之意是亦昭公大雩之意乎九月己亥公孫于齊次于陽州陽州在齊魯境上公次陽州是未嘗至齊也春秋曷為以孫于齊書嗚呼此春秋正名之義也堂堂魯國臣逐其君至於出奔其辱甚矣不敢至齊而次于陽州其辱尤甚故昭公雖次于陽州而以孫齊書國之者大之也先書公孫于齊以正其名繼書次于陽州以紀其實春秋雖不廢其實而有尊君之義焉昔者周之襄王越在鄭地泛春秋以出居于鄭書曰居于鄭者尊之也是亦公孫于齊之義齊侯唁公于野井昭公次于陽州齊侯唁公于平陰公先至于野井是齊侯無奔走救難之心而有忽略待魯之意君子觀野井之唁而後知齊侯之不足與有謀也昔者狄人迫逐黎侯黎侯寓於衛衛不能修方伯連帥之職黎之臣子以責於衛昭公始謀之不善見幾之不早忽子家羈如晉之言不用宜乎淹恤於外而卒不克歸也悲夫冬十月戊辰叔孫婼卒十有一月己亥宋公佐卒于曲棘十有二月齊侯取鄆鄰國取內邑直書其事而莫之諱不言其國之名若取諸他國然此春秋悲傷之意也夫齊侯取鄆以居公其名正其言順故春秋不忍言其國之名所以存魯而直書其事者所以存君而不使季氏得有魯然則何以不書取鄆居公也鄆我邑也我公居之豈使齊侯得以居公哉此又春秋存君屢致意也二十有六年春王正月葬宋元公三月公至自齊居于鄆公之出也實未嘗至齊之都公之入也實未嘗至魯之廟春秋之書公至自齊其與如齊而至廟者同辭焉嗚呼此春秋存君之意也傷其出也吾何忍言其不能至齊幸其歸也吾未暇論其未能告廟其曰居于鄆何也非吾國也故言次苟吾國也亦可以言居矣天子以天下為家故天王在鄭可以言居諸侯得有其國故昭公在鄆始可以言居陽州乾侯書次而已尊卑之義明矣哉夏公圍成成魯邑也魯公圍之春秋書法若施諸他國然何也夫君有其國誰得而奸之棄其國而不有越在他竟是自絶於其國也以大夫之邑而隱然如敵國不臣之罪不待貶絶而見以其國之君而圍其大夫之邑其不能於君亦可愧矣成孟氏邑也季孟同惡相濟而叔孫氏獨賢書圍成以見孟氏之黨惡書叔孫婼卒以見叔孫之勤於君也深矣哉雖然春秋其不言與齊同圍成何也夫齊人取鄆以居公猶可言也今公以齊師圍成春秋尚忍言之哉秋公㑹齊侯莒子邾子杞伯盟于鄟陵併見後公至自會居于鄆公至自會居于鄆鄟陵之盟謀納公也君子謂是盟也齊侯欺魯而昭公不能覺卒遷延於齊久而後去也齊侯納梁邱據之言固已無意于納昭公師挫于成意沮而歸懼昭公之去已也故為是盟以要之特昭公莫之悟當時從公之臣亦莫之悟也致㑹之書義雖不外公意則責當時之臣子相與得意而不悟齊之欺也悲夫九月庚申楚子居卒冬十月天王入于成周昔者襄王之居於鄭也言出而不言入今者敬王之居狄泉也言入而不言出為榖梁之說曰周有入無出也夫王者以天下為家不可以言出則亦不可以言入也襄王之入晉侯納之春秋不得言其入敬王之立實在狄泉春秋不得言其出春秋寓悲傷之意于一出一入之間使人讀其傳因其所不書求其所以書在臣子有存君父之意而天子不能有其家亦可愧矣尹氏召伯毛伯以王子朝奔楚二十有七年春公如齊公至自齊居于鄆夏四月吳弒其君僚楚殺其大夫郤宛秋晉士鞅宋樂祁犂衛北宮喜曹人邾人滕人會于扈扈之㑹令戍周且謀納公也夫戍周大義也納公重事也使大夫主之不成其為盟主矣以晉文之勤王春秋猶謂其不能盡忠以齊桓之存國春秋猶謂其不能盡義而况以大夫謀之乎夫樂祁犂北宫喜其在宋衛非華向孫寧比也故猶利納公若士鞅則六卿專晉久矣同惡相濟宜乎其不肯也冬十月曹伯午卒邾快來奔公如齊公至自齊居于鄆二十有八年春王三月葬曹悼公公如晉次于乾侯昭公實次陽州而春秋以齊書實次乾侯而春秋以如晉書雖尊公也亦傷公也往者昭公之在國也屢如晉而猶不得入及今出亡也欲一至晉之國都其可得乎諸侯失位越在他國禮猶謂之寓公昭公如兩國次于野而不得入豈不重可悲夫夏四月丙戌鄭伯寧卒六月葬鄭定公秋七月癸巳滕子寧卒冬葬滕悼公二十有九年春公至自乾侯居于鄆齊侯使髙張來唁公夫天下之事莫重於謀始始之不謹猶望其能圖終難也若昭公之如齊其始謀亦不謹矣遷延于齊久而如晉則既棄齊矣自晉復歸于鄆齊侯其謂之何髙張之唁止以納侮是何其不能圖終若是耶公如晉次于乾侯夏四月庚子叔詣卒秋七月冬十月鄆潰觀鄆之潰也知季氏之暴而舉魯國皆非臣子也棄其一國而居其一邑猶不能容也相率而叛之豈非畏季氏之暴蔑棄君臣之義而不顧乎三户可以亡秦匹夫可以存齊鄆之臣子無一人敢抗季氏者悲夫三十年春王正月公在乾侯左氏曰三十年春王正月公在乾侯不先書鄆與乾侯非公且徵過也昭公淹恤于外不朝正于廟六年矣春秋何以始書公在乾侯左氏以為非公公之可非其已久矣不待其六年而後譏也春秋方存公未暇徴過左氏之言失矣夫公之居鄆猶可言也不越魯竟猶望君之還也公在乾侯越在他國不復歸矣此春秋之所悲也故拳拳焉一歲之首必記之始之言次暫焉可也中之言居已即安矣末之言在是終焉而已矣坤之上六曰龍戰于野為其嫌於無陽也故稱龍焉公在乾侯是固嫌於無君耶夏六月庚辰晉侯去疾卒秋八月葬晉頃公冬十有二月吳滅徐徐子章羽奔楚三十有一年春王正月公在乾侯季孫意如㑹晉荀躒于適歷夏四月丁巳薛伯榖卒晉侯使茍躒唁公于乾侯人情之厚薄視其禮之輕重昔者齊侯親唁于野井猶不能納公晉侯使荀躒先㑹季孫而後唁公其禮之輕若此則人情之薄可知矣昭公將何求焉先㑹其臣而謀納其君臣以為不可而遂已之亦惡在其為盟主乎是亦文具之尢者矣君子以晉為無責焉夫始有求于人者則其應也必亟不得已而求焉者人亦不得已而應之昭公始有求于齊數年而莫之得也不得已而求之晉於晉何責焉然則昭公胡為而不去也當時中國其大者唯齊晉耳齊晉莫之恤惟南走吳楚而已異時哀公出奔求哀于越君子是以傷中國之不足恃而夷狄得以執其權也悲夫秋葬薛獻公冬黑肱以濫來奔左氏曰賤而書名重地故也杜氏曰不書邾史闕文夫春秋于三叛人嚴矣其不言邾恐非闕文也當季氏之逐君也諸侯不能問是舉天下無君臣也三綱斁人倫廢矣加以黑肱叛邾而來兩叛相和同惡相濟聖人以為黑肱之無邾如季氏之無魯也故黑肱不書邾此其意傷矣夫身為大夫而至絶之于其國人臣可不鑑哉十有二月辛亥朔日有食之三十有二年春王正月公在乾侯取闞杜氏曰公别居乾侯遣人誘闞而取之不用師徒也公羊曰闞者何邾婁之邑也曷為不繫乎邾婁諱亟也昭公之出奔也齊侯取鄆以居公書曰齊侯取鄆公用齊師以圍成書曰夏公圍成如使公居乾侯而取闞則如其圍成之書矣不言公而取闞是取邿取鄟之類也公羊之義得矣夏吳伐越左氏曰始用師于越也杜氏曰自此以前雖疆事小爭未嘗用大兵昔者夷夏之爭嘗用大兵矣春秋備書之吳楚之戰至于柏舉春秋書之亦辭繁而不殺獨於吳伐越越入吳之事略而書之何也嗟夫秦楚吳越均為夷狄吳越最晚出驟致彊大卒自相斃以至於此蓋春秋事變至此窮矣尚忍詳言之哉秋七月冬仲孫何忌會晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薛人杞人小邾人城成周昔周之營洛邑其居九鼎者曰王城其遷頑民者曰成周平王東遷于王城至敬王入于成周諸侯之大夫相帥以城之蓋于是周再遷矣晚而為東西周則又遷矣當平王之遷也晉之文侯實扞王于艱惠襄之難文公猶能繼乃祖之業然視文侯不侔矣及今成周之役晉韓不信專之南面以令諸侯之大夫世變愈下事益可嘆然春秋詳書其事辭繁而不殺何也王室衰微諸侯放恣幸列國之大夫猶知有王也其事雖微其心則猶未泯也春秋安得而不與之自是而後大夫之事亦無有矣嗟夫嫠不恤緯而憂宗周之隕君子猶將與之况大夫而謀王室之難乎十有二月己未公薨于乾侯欽定四庫全書春秋講義卷四下宋戴溪撰定公元年春王公羊曰定何以無正月正月者正即位也定無正月者即位後也即位何以後昭公在外得入不得入未可知也曷為未可知也在季氏也榖梁曰不言正月定無正也昭公之終非正終定之始非正始也昭無正終故定無正始不言即位喪在外也春秋之君不書即位者四其三皆書正月而定獨不書蓋隱之攝桓宣之罪雖不當書即位然喪君有君國猶有人也若定公之初則曠正月而無君矣是與亡國無以異也其孰與承正朔乎夫隱十年無正隱不自正也春秋於隱元年猶書正謂其嫌於無君也然則定公之無正春秋二百四十二年之中聖人尢於是傷矣三月晉人執宋仲幾于京師人臣逺於君則其勢伸近於君則其事屈故諸侯之卿入天子之國稱士今晉之大夫執人於王都是逼近而不有天子也宋仲幾不受功其罪猶可言韓不信專執大夫其罪不可勝誅矣城成周美功也尊天子大義也春秋不以一時之功廢萬世之義其於君臣之際甚微而嚴夏六月癸亥公之喪至自乾侯戊辰公即位天下不可一日無君也以言乎嗣子之義則踰年而後書即位以言乎臣民之義則一日而即位禮也今昭公之喪以癸亥至定公以戊辰即位是季氏有不立定公之心蓋數日而後定也春秋以日月為義若此類是也按定公戊辰方即位程胡二傳止云為季氏所制耳不若戴氏此說尢為精核秋七月癸巳葬我君昭公九月大雩立煬宮甚矣小人之無道也嫁怨於人歸過於神公然無忌憚也昭公之出也諸侯之大夫同惡相濟以宋公之薨叔孫之卒歸於天道及昭公之薨也季氏大雩以為媚立煬宫以為報蓋昔者昭公之逐季氏也嘗兩大雩而不克濟季氏嘗致禱於煬公矣故小人得藉口以求媚而致報焉季氏旅於泰山夫子之言曰曽謂泰山不如林放乎深有望於其神也其意傷矣冬十月隕霜殺菽二年春王正月夏五月壬辰雉門及兩觀災秋楚人伐吳冬十月新作雉門及兩觀魯之僣久矣子家羈言於昭公曰設兩觀乘大路朱干玉戚此皆天子之禮也夫禮樂征伐自諸侯出然後大夫得以執國命昭公出亡有自來矣定公之立兩觀被災天蓋以警魯也不能致察於此新作兩觀視舊有加焉夫修舊謂之新始創謂之作既有雉門及兩觀矣謂之新可也曰新作者蓋明其不當作也三年春王正月公如晉至河乃復晉之不仁亦已甚矣昭公屢如晉而不得入故有季氏之難定公新立躬朝於晉至河而復不得入使定何以自立於魯乎昔者魯有慶父之難國幾亡矣賴齊桓庇之盟於落姑季子來歸齊仲孫來魯國遂定今昭公出亡晉不能納之定公新立晉不能安之尚何足以為盟主乎於是六卿専晉雖晉侯亦不能自為政矣二月辛卯邾子穿卒夏四月秋葬邾莊公冬仲孫何忌及邾子盟于拔四年春王二月癸巳陳侯吳卒三月公會劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚自鄢陵之後晉楚不復有大戰一旦有召陵之役是六七十年間無是舉也天子之老元戎啓行中國諸侯大抵皆在未有若此其盛者僅侵楚而退自相盟於臯鼬當是時楚有可亡之勢失此機㑹使吳人乘其後而收入郢之功傾天下之勢折而入於吳中國之霸於是絶矣悲夫夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之五月公及諸侯盟于臯鼬杞伯成卒于會六月葬陳惠公許遷于容城秋七月公至自會劉卷卒葬杞悼公楚人圍蔡晉士鞅衛孔圍帥師伐鮮虞葬劉文公冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績楚囊瓦出奔鄭庚辰吳入郢楚自入春秋以來倔彊漢淮之間陵犯中國蓋二百年矣中國不能制假手於吳國幾亡而僅存甚矣中國之不競失於機㑹霸圖遂絶始稱吳子幸吳猶能治楚也末稱吳吳猶楚也去楚而吳繼之此聖人之所傷也五年春王三月辛亥朔日有食之夏歸粟于蔡蔡魯非有好也蔡人未嘗告饑魯曷為而歸粟於蔡晉志也蔡中國也而虐於楚告情於中國中國莫之救也借援於吳吳人入郢諸侯相與歸蔡之粟以掩其過不書諸侯諱之也榖梁以歸粟為正左氏以為周亟矜無資此恤鄰之常禮也非所論歸粟于蔡若昔澶淵之㑹諸侯謀更宋財若是可以為正矣於越入吳公羊曰於越者未能以其名通也越者能以其名通也越得書於春秋則能以其名通矣或曰於越從其所自稱也越夷狄之賤者也最後出其常自稱曰於越驟通於中國未能遽忘其陋故以於越告若夫中國則固稱之曰越其事關於中國而中國告之則稱越非有能通與不能通之間也始也書荆非狄之也終也書楚非進之也始也稱越非能通也終稱於越非不能通也不變文身之舊以見其種落之賤爾六月丙申季孫意如卒秋七月壬子叔孫不敢卒冬晉士鞅帥師圍鮮虞六年春王正月癸亥鄭游速帥師滅許以許男斯歸許嘗滅於鄭矣二百年間屢遷國焉鄭卒因楚亂而取之甚矣其不仁也游速何以無貶書月書日書氏書名書帥師正其事而詳書之所謂不待貶絶而惡自見者許既滅矣哀公元年許復從楚圍蔡楚復之也楚亂方定未暇治鄭先復許焉不告於中國春秋不得而書也二月公侵鄭公至自侵鄭夏季孫斯仲孫何忌如晉按左氏季桓子如晉獻鄭俘也陽虎强使孟懿子往報夫人之幣晉人兼享之如左氏所載季孟二子以二事使晉則春秋當以致女納幣之例書誠使晉人賤魯兼享二卿春秋不應卑魯列數二使也蓋季孫斯仲孫何忌如晉猶公子遂叔孫得臣如齊也使舉上客而不稱介不正其同倫而相介故列而數之季孟不相下其亦同倫相介之意乎秋晉人執宋行人樂祁犂冬城中城季孫斯仲孫忌帥師圍鄆七年春王正月夏四月秋齊侯鄭伯盟于鹹齊人執衛行人北宮結以侵衛齊侯衛侯盟于沙大雩齊國夏帥師伐我西鄙九月大雩冬十月八年春王正月公侵齊公至自侵齊二月公侵齊三月公至自侵齊曹伯露卒夏齊國夏帥師伐我西鄙公㑹晉師于瓦公至自瓦秋七月戊辰陳侯柳卒晉士鞅帥師侵鄭遂侵衛葬曹靖公九月葬陳懷公季孫斯仲孫何忌帥師侵衛冬衛侯鄭伯盟于曲濮從祀先公自文公躋僖公於閔公之上更五世矣今順祀先公此魯之大典也春秋宜特書之以示後世其曰從祀先公若隱諱而不明言之何也此春秋之微意也魯之宗廟昭穆失序歷羣公不能正陪臣乃借此以求媚使春秋明書其事是於陪臣之得而罪羣公之失其可乎故略而書之若曰從祀先公之時有盜竊寶玉大弓以出非曰從祀之為順祀也其意微矣盜竊寶玉大弓榖梁曰非其所取而取之謂之盜甚矣春秋成而亂臣賊子懼其功用可畏若此也陽虎専季氏舉魯國之權盡歸焉其勢足以竊宗廟之寶器聖人書之曰盜若曰非其所取而取之其辭恕矣九年春王正月夏四月戊申鄭伯蠆卒得寶玉大弓得必有所從不言其從得之人得必有其所不言其所得之地何也聖人不忍言也宗廟之器使人得以竊而去之是不能有其宗廟也國幾亡矣故春秋之書曰得寶玉大弓若曰得而藏之非既失而復歸也其意傷矣六月葬鄭獻公秋齊侯衛侯次于五氏秦伯卒冬葬秦哀公十年春王三月及齊平夏公㑹齊侯于夾谷公至自夾谷夾谷之㑹春秋之盛事也二百四十二年間所未有也春秋書齊魯之㑹多矣未有歸田繼之者春秋書歸田有之矣未有言來歸者宣公嘗如齊既至自齊齊人歸我濟西田魯有求於齊也隱公八年鄭伯使宛來歸祊祊非魯地也鄭有求於魯也夾谷之㑹齊人謝過鄆歡龜隂齊人來歸春秋未始有此也榖梁曰夾谷之㑹危之也聖人在㑹何安如之離會不致而夾谷致㑹者喜之也非危之也聖人相魯君於㑹曾不淹時齊人懾服所謂綏之斯來動之斯和者也晉趙鞅帥師圍衛齊人來歸鄆歡龜隂田叔孫州仇仲孫何忌帥師圍郈秋叔孫州仇仲孫何忌帥師圍郈宋樂大心出奔曹宋公子地出奔陳冬齊侯衛侯鄭游速㑹于安甫叔孫州仇如齊宋公之弟辰暨仲他石彄出奔陳十有一年春宋公之弟辰及仲他石彄公子地自陳入于蕭以叛夏四月秋宋樂大心自曹入于蕭冬及鄭平叔還如鄭涖盟十有二年春薛伯定卒夏葬薛襄公叔孫州仇帥師墮郈左氏曰仲由為季氏宰將墮三都公羊曰孔子行乎季孫三月不違於是帥師墮郈帥師墮費公羊之言失之矣後之學者承舛聽訛皆言夫子欲墮三都嗟夫使聖人而欲墮三都也成卒不墮費幾生變則聖人之謀踈矣綏斯來動斯和之功果安在乎左氏之言信矣仲由為季氏宰將墮三都是果出於仲由之謀無可疑乎由勇而無謀率意之所欲為而不顧其難也故幾於亂當費人攻公及於臺下微夫子命申句須樂頎下伐之豈不甚危哉說者猶以為墮三都者聖人之謀也過矣大抵事之可疑者承襲之訛非止一事也襄公二十三年季札觀周樂固已歌王矣說者乃謂夫子降黍離於國風是何不審若此也夫聖人序書作春秋固微寓其褒貶之意若考訂舊聞廣記實録固不容自為之也謂一為元自堯舜以來未之有改也說者謂春秋之法抑亦過矣衛公孟彄帥師伐曹季孫斯仲孫何忌帥師墮費秋大雩冬十月癸亥公㑹齊侯盟于黃十有一月丙寅朔日有食之公至自黃十有二月公圍成公至自圍成十有三年春齊侯衛侯次于垂葭夏築蛇淵囿大搜于比蒲衛公孟彄帥師伐曹秋晉趙鞅入于晉陽以叛冬晉荀寅士吉射入于朝歌以叛晉趙鞅歸于晉春秋書晉趙鞅之事見君臣之際嚴矣趙鞅非叛也而以叛書為法受惡也臧武仲以防求為後於魯夫子曰雖曰不要君吾不信也况以地正國乎其曰晉趙鞅又曰歸于晉何也聖人原其心而恕之也已叛而知罪未幾而反地趙鞅之心可恕矣非春秋其誰察之按劉絢謂書晉趙鞅歸于晉國亂無刑也戴氏此條未免沿公穀之訛薛弒其君比十有四年春衛公叔戌來奔衛趙陽出奔宋二月辛巳楚公子結陳公孫他人帥師滅頓以頓子牂歸夏衛北宫結來奔五月於越敗吳于檇李吳子光卒楚人及吳戰于長岸說者曰進楚子故曰戰楚與吳一也春秋何以獨進楚楚自莊公時已見於中國駸駸彊大與中國抗矣春秋雖欲遏之不可得也吳最晚出越又在吳後兩夷狄曰敗於是而得以正其名矣公㑹齊侯衛侯于牽公至自㑹秋齊侯宋公㑹于洮甚矣齊景圖霸之亟也不度德不量力晉固失霸矣齊非得霸之君也不虞蕭墻之變而欲外求諸侯當齊桓之霸也實始結宋與魯景公襲其故智舍疆場之爭親與魯平結衛結鄭今兹復與宋公㑹于洮然卒不能成事徒擾擾焉自敝而已德之不講力之不競區區欲以智術取之亦見其惑焉而已矣天王使石尚來歸脤公羊曰石尚者何天子之士也榖梁曰石尚欲書春秋請行脤貴復正也此王室之盛禮也若君臣能率是典禮而行之周可以復王魯可以復振當周之盛也以脤膰之禮親兄弟之國及齊之霸也天子使宰孔賜齊侯胙久矣是禮之不復行也春秋侈大而特書之豈直一士得書於春秋哉衛世子蒯聵出奔宋衛公孟彄出奔鄭宋公之弟辰自蕭來奔大搜于比蒲邾子來㑹公城莒父及霄十有五年春王正月邾子來朝鼷鼠食郊牛牛死改卜牛二月辛丑楚子滅胡以胡子豹歸夏五月辛亥郊魯之僣郊自僖公始其說蓋可信僖公之前春秋未嘗書郊此其證也觀季孫行父請命於周而史克作頌則知僖公請郊於天子如其作頌也然而魯之先公猶畏天災故因災而不郊者間有之若定之終哀之始連年鼷鼠食郊牛宜可以不郊矣而卒不免郊蓋玩習既久雖天亦莫知所畏矣壬申公薨于髙寢鄭罕逹帥師伐宋齊侯衛侯次于渠蒢邾子來奔喪秋七月壬申姒氏卒八月庚辰朔日有食之九月滕子來㑹葬丁巳葬我君定公雨不克葬戊午日下昃乃克葬辛巳葬定姒冬城漆哀公元年春王正月公即位楚子陳侯隨侯許男圍蔡吳入郢之日楚昭奔隨隨人免之楚人德之使列於諸侯定公六年鄭已滅許此復見者蓋楚封之觀楚子圍蔡之事可為嘆息也已滅人之國絶人之世無不如志異時興滅繼絶封人之國亦在我而已楚靈滅陳蔡二國及平即位一旦而復之隨在漢東亦為大國役屬於楚終春秋不復見一有德於昭遽列於諸侯鄭已滅許楚實封之專行廢置中國斂袵為可歎息也已鼷鼠食郊牛改卜牛夏四月辛巳郊秋齊侯衛侯伐晉冬仲孫何忌帥師伐邾二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田癸巳叔孫州仇仲孫何忌及邾子盟于句繹左氏曰二年春伐邾將伐絞邾人愛其土故賂以漷沂之田而受盟榖梁曰取漷東田漷東未盡也及沂西田沂西未盡也三人伐而二人盟各盟其得也按三卿並將季氏最彊故以季氏主兵然二人各盟其所得之田而季氏不及何也如左氏之言邾人以田賂魯季氏先時有陽虎之難二子實救之故推其所賂以報德非二子各盟其所得季氏莫之得也夏四月丙子衛侯元卒滕子來朝晉趙鞅帥師納衛世子蒯聵于戚蒯聵雖得罪出奔靈公未嘗廢之故其出奔其入戚春秋皆以世子書况輒之立非靈公之命輒豈得以子而拒父昔者冉有發夫子為衛君之問夫子有正名之對子路死於孔悝之難夫子不以為是髙子羔不死難而奔夫子亦不以為非也其正名之意深矣秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰于鐵鄭師敗績當晉之霸也晉人朝夕加兵於鄭鄭之君臣俯首下心惟晉命是聽安有一矢之相加遺哉及其衰也兩國之臣帥師交戰此春秋所創見也春秋書帥師書敗績如大戰然鄭雖敗績晉亦少辱矣事變反覆可勝歎哉冬十月葬衛靈公十有一月蔡遷于州來蔡殺其大夫公子駟三年春齊國夏衛石曼姑帥師圍戚公羊曰齊國夏曷為與石曼姑帥師圍戚伯討也此其為伯討奈何曼姑受命乎靈公而立輒以曼姑之義為固可以距之也春秋於是編也明父子之義焉公羊之言過矣此衛事也不先曼姑言子之不可圍父邑也此衛地也不繫戚於衛言子之不得有父邑也聖人之意若曰戚非衛地齊人首兵圍之輒無與焉其於父子之義隱辟而不忍言矣公羊不惟不罪衛而推齊以為伯討曽謂天下而有無父之國哉夏四月甲午地震五月辛卯桓宫僖宫災季孫斯叔孫州仇帥師城啓陽宋樂髠帥師伐曹秋七月丙子季孫斯卒蔡人放其大夫公孫獵于吳冬十月癸卯秦伯卒叔孫州仇仲孫何忌帥師圍邾四年春王二月庚戌盜殺蔡侯申蔡公孫辰出奔吳葬秦惠公宋人執小邾子夏蔡殺其大夫公孫姓公孫霍晉人執戎蠻子赤歸于楚中國之不競未有如是甚者也楚人爭盟侵伐中國皆未足為中國甚恥執戎蠻之君而歸之於楚是京師楚也是晉為楚役也是率中國而聽命於楚人也冠履倒置莫此為甚其稱人者聖人猶為中國諱也城西郛六月辛丑亳社災秋八月甲寅滕子結卒冬十有二月葬蔡昭公葬滕頃公五年春城毗夏齊侯伐宋晉趙鞅帥師伐衛秋九月癸酉齊侯杵臼卒冬叔還如齊閏月葬齊景公六年春城邾瑕晉趙鞅帥師伐鮮虞吳伐陳夏齊國夏及髙張來奔叔還㑹吳于柤秋七月庚寅楚子軫卒齊陽生入于齊齊陳乞弒其君荼冬仲孫何忌帥師伐邾宋向巢帥師伐曹七年春宋皇瑗帥師侵鄭晉魏曼多帥師侵衛夏公㑹吳于鄫秋公伐邾八月己酉入邾以邾子益來邾魯之爭有日矣未有伐其國而執其君者不惟邾也魯於他國亦未嘗有是也哀之無道甚矣執其君以歸春秋不曰歸而曰來者非外魯也為魯諱也若曰邾子自外至爾非魯執之而歸也宋人圍曹冬鄭駟𢎞帥師救曹八年春王正月宋公入曹以曹伯陽歸吳伐我夏齊人取歡及闡歸邾子益于邾秋七月冬十有二月癸亥杞伯過卒齊人歸歡及闡九年春王二月葬杞僖公宋皇瑗帥師取鄭師于雍丘當隱公之時三國之師伐戴鄭伯伐而取之左氏以為取三師二傳以為取戴由春秋書法觀之取戴為是入春秋以來書取師者獨於哀公兩見之蓋春秋用師微有節制故不至大敗及其末年用師無法彼此得以襲取愈變愈下矣夏楚人伐陳秋宋公伐鄭冬十月十年春王二月邾子益來奔公㑹吳伐齊三月戊戌齊侯陽生卒夏宋人伐鄭晉趙鞅帥師侵齊五月公至自伐齊葬齊悼公衛公孟彄自齊歸于衛薛伯夷卒秋葬薛惠公冬楚公子結帥師伐陳吳救陳十有一年春齊國書帥師伐我夏陳轅頗出奔鄭五月公㑹吳伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書秋七月辛酉滕子虞母卒冬十有一月葬滕隱公衛世叔齊出奔宋十有二年春用田賦魯之賦斂至此極矣始也田無稅至宣公而初稅畝始也家有賦至哀公而用田賦公田之外民之私田既取稅焉又取賦焉而其家之賦不與也先王未嘗以田為賦稅也故周禮止曰夫家之征獨載師任地之法始有小都大都之征蓋民之授田乃上之田也借民耕之爾何賦稅之有履畝而稅用田為賦始於二君此固聖人之所甚惡也故曰季氏富於周公求也為之聚斂而附益之非吾徒也小子鳴鼓而攻之可也夏五月甲辰孟子卒觀春秋書孟子而不書夫人見聖人君臣之義焉春秋以褒貶為法聖人猶為其君諱陳司敗講學於聖人之門乃欲聖人顯言其君之過其亦可謂不察乎人倫矣公㑹吳于槖臯秋公㑹衛侯宋皇瑗于鄖宋向巢帥師伐鄭冬十有二月螽十有三年春鄭罕達帥師取宋師于嵒夏許男成卒公㑹晉侯及吳子于黃池公羊曰吳何以稱子吳主㑹也吳主㑹則曷為先言晉侯不與吳人之主中國也其言及吳子何㑹兩伯之辭也榖梁曰黃池之㑹吳子進乎哉遂子矣甚矣二傳之不知春秋也以及吳子為兩伯以稱吳子為進夫差其孰知聖人悲傷拒絶之意乎入春秋之末獨吳人擾亂中國幾無寧嵗聖人痛抑而力絶之其書於春秋者曰公㑹吳吳伐齊伐我而已及黃池之㑹勢極於盛不可復禦矣曰吳子傷之也曰及吳外之也且傷且外豈曰進乎哉豈曰兩伯乎哉春秋夷狄之事於是終焉悲夫楚公子申帥師伐陳於越入吳秋公至自㑹晉魏曼多帥師侵衛葬許元公九月螽冬十有一月有星孛于東方盜殺陳夏區夫十有二月螽十有四年春西狩獲麟夫子曰鳯鳥不至河不出圗吾己矣夫人事乖離聖人無所復望矣拳拳之心猶望天道之還也麟出於野為狩所獲天理人事其不相符如此是終不可為矣聖人於是絶望則春秋於是絶筆矣此聖人之深意也春秋講義卷四下考證二十頁前七行案為衛君之語冉有自問子貢正名之籌夫子自答子路戴氏合為一誤
